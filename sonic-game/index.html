<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TEMU Sonic — Green Hill</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{display:block;border:2px solid #1a3a5c;border-radius:4px;image-rendering:pixelated;box-shadow:0 0 40px rgba(20,80,200,.3)}
#hud{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:24px;color:#fff;font-size:14px;font-weight:600;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,.8);z-index:10;pointer-events:none}
#hud span{background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.1)}
#controls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:12px;letter-spacing:1px;z-index:10}
#gameOver{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:20}
#gameOver h1{font-size:48px;color:#fbbf24;text-shadow:0 0 20px rgba(251,191,36,.5);margin-bottom:8px}
#gameOver p{color:#fff;font-size:16px;margin-bottom:24px}
#gameOver button{padding:12px 32px;font-size:16px;font-weight:700;background:linear-gradient(135deg,#22d3ee,#a3e635);border:none;border-radius:8px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
#gameOver button:hover{transform:scale(1.05)}
/* Splash screen */
#splash{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a1628 0%,#1a2a4a 40%,#0f1f3a 100%);transition:opacity .8s ease;cursor:pointer}
#splash.fade-out{opacity:0;pointer-events:none}
#splash-scene{position:relative;width:960px;height:540px;overflow:hidden;border:2px solid #1a3a5c;border-radius:4px}
#splash-bg-canvas{position:absolute;inset:0}
#splash-title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5;user-select:none}
#splash-title h1{font-size:72px;font-weight:900;letter-spacing:4px;line-height:1;margin-bottom:4px;background:linear-gradient(135deg,#22d3ee,#a3e635,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;filter:drop-shadow(0 0 30px rgba(34,211,238,.4))}
#splash-title .subtitle{font-size:22px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:8px;text-transform:uppercase;margin-top:8px}
#splash-title .press-start{margin-top:40px;font-size:16px;color:rgba(255,255,255,.35);letter-spacing:3px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.8}}
#splash-rings{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:5}
.splash-ring{width:20px;height:20px;border:3px solid #fbbf24;border-radius:50%;animation:ringFloat 3s ease-in-out infinite}
.splash-ring:nth-child(2){animation-delay:.3s}
.splash-ring:nth-child(3){animation-delay:.6s}
.splash-ring:nth-child(4){animation-delay:.9s}
.splash-ring:nth-child(5){animation-delay:1.2s}
@keyframes ringFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.1)}}
</style>
</head>
<body>
<!-- Splash Screen -->
<div id="splash">
  <div id="splash-scene">
    <canvas id="splash-bg-canvas" width="960" height="540"></canvas>
    <div id="splash-title">
      <h1>TEMU SONIC</h1>
      <div class="subtitle">Green Hill Zone</div>
      <div class="press-start">Press any key or click to start</div>
    </div>
    <div id="splash-rings">
      <div class="splash-ring"></div>
      <div class="splash-ring"></div>
      <div class="splash-ring"></div>
      <div class="splash-ring"></div>
      <div class="splash-ring"></div>
    </div>
  </div>
</div>
<div id="hud">
  <span id="score">Rings: 0</span>
  <span id="lives">Lives: 3</span>
  <span id="time">Time: 0</span>
</div>
<canvas id="game" width="960" height="540"></canvas>
<div id="controls">← → Move  |  SPACE / ↑ Jump (hold higher)  |  ↓ Spin Dash (hold & release)</div>
<div id="gameOver">
  <h1 id="overText">GAME OVER</h1>
  <p id="overSub">You collected 0 rings</p>
  <button onclick="restart()">Try Again</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game state
let game = { rings: 0, lives: 3, time: 0, over: false, won: false };
let camera = { x: 0, y: 0 };
let particles = [];
let particles2 = [];
let screenShake = 0;

// Physics constants — TUNED FOR TACTILE FEEL
const GRAVITY = 0.42;
const FRICTION = 0.92;
const ACCEL = 1.2;
const MAX_SPEED = 9;
const AIR_CONTROL = 0.7;
const JUMP_FORCE = -11.5;
const SPIN_BOOST = 14;
const SPRING_FORCE = -16;
const COYOTE_TIME = 6;
const JUMP_BUFFER = 8;

// Player
let player = {
  x: 100, y: 300, vx: 0, vy: 0, w: 28, h: 36,
  grounded: false, facing: 1, spinning: false, spinTimer: 0,
  invincible: 0, animFrame: 0, animTimer: 0,
  coyoteTimer: 0, jumpBufferTimer: 0, wasGrounded: false,
  jumpHeld: false, speedTrail: []
};

// Input
const keys = {};
const justPressed = {};
const prevKeys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Audio synth — no external files needed
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let reverbNode = null;
let masterGain = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
    // Create reverb impulse response
    const rate = audioCtx.sampleRate;
    const length = rate * 1.5; // 1.5 second reverb
    const impulse = audioCtx.createBuffer(2, length, rate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
      }
    }
    reverbNode = audioCtx.createConvolver();
    reverbNode.buffer = impulse;
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.25;
    reverbNode.connect(reverbGain);
    reverbGain.connect(masterGain);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  // Dry signal
  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.7;
  osc.connect(gain);
  gain.connect(dryGain);
  dryGain.connect(masterGain);
  // Wet signal (reverb)
  gain.connect(reverbNode);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playJump()    { playTone(520, 0.12, 'square', 0.12); setTimeout(() => playTone(780, 0.08, 'square', 0.08), 50); }
function playSpinDash() { playTone(220, 0.15, 'sawtooth', 0.15); }
function playRing()     { playTone(1200, 0.08, 'sine', 0.1); setTimeout(() => playTone(1500, 0.06, 'sine', 0.08), 60); }
function playSpring()   { playTone(440, 0.1, 'triangle', 0.12); setTimeout(() => playTone(880, 0.08, 'triangle', 0.1), 70); }
function playHit()      { playTone(120, 0.2, 'sawtooth', 0.15); }
function playEnemyKill(){ playTone(600, 0.05, 'square', 0.1); setTimeout(() => playTone(900, 0.05, 'square', 0.08), 50); setTimeout(() => playTone(1200, 0.05, 'square', 0.06), 100); }
function playGoal()     { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.12), i * 120)); }
function playGameOver() { [400,300,200,100].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 'sawtooth', 0.1), i * 150)); }

// Background music — simple looping chiptune
let musicInterval = null;
const musicNotes = [
  392, 440, 494, 523, 494, 440, 392, 330,
  349, 392, 440, 494, 440, 392, 349, 330,
  294, 330, 349, 392, 440, 392, 349, 330,
  294, 330, 392, 440, 494, 523, 494, 440
];
let musicIndex = 0;
let musicPlaying = false;
function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  musicIndex = 0;
  musicInterval = setInterval(() => {
    if (game.over || game.won) { stopMusic(); return; }
    const note = musicNotes[musicIndex % musicNotes.length];
    playTone(note, 0.18, 'triangle', 0.04);
    // Bass line
    if (musicIndex % 4 === 0) playTone(note / 2, 0.25, 'sine', 0.03);
    musicIndex++;
  }, 280);
}
function stopMusic() {
  musicPlaying = false;
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

// Level data
let platforms = [];
let rings = [];
let enemies = [];
let spikes = [];
let springs = [];
let goal = null;

function buildLevel() {
  platforms = [];
  rings = [];
  enemies = [];
  spikes = [];
  springs = [];

  const groundY = 440;
  const groundSections = [
    [0, 800], [880, 1400], [1520, 2200], [2320, 3000],
    [3100, 3800], [3920, 4600], [4720, 5400], [5520, 6200]
  ];
  groundSections.forEach(([x, end]) => {
    platforms.push({ x, y: groundY, w: end - x, h: 100, type: 'ground' });
  });

  const floats = [
    [350, 340, 120], [550, 280, 100], [750, 220, 100],
    [1000, 320, 140], [1200, 260, 100], [1400, 200, 80],
    [1650, 350, 100], [1850, 280, 120], [2050, 200, 100],
    [2400, 340, 100], [2600, 260, 120], [2800, 180, 100],
    [3200, 320, 140], [3400, 240, 100], [3600, 180, 80],
    [4000, 340, 120], [4200, 260, 100], [4400, 180, 100],
    [4800, 320, 120], [5000, 240, 100], [5200, 160, 80],
    [5600, 340, 140], [5800, 260, 100], [6000, 180, 100]
  ];
  floats.forEach(([x, y, w]) => {
    platforms.push({ x, y, w, h: 20, type: 'float' });
  });

  platforms.push({ x: 1100, y: 380, w: 80, h: 60, type: 'ramp', angle: -0.4 });
  platforms.push({ x: 2250, y: 380, w: 80, h: 60, type: 'ramp', angle: -0.4 });

  const ringPositions = [
    [200, 400], [250, 400], [300, 400],
    [370, 310], [420, 310],
    [560, 250], [610, 250],
    [760, 190], [810, 190],
    [1020, 290], [1070, 290], [1120, 290],
    [1210, 230], [1260, 230],
    [1410, 170], [1460, 170],
    [1670, 320], [1720, 320],
    [1870, 250], [1920, 250], [1970, 250],
    [2060, 170], [2110, 170],
    [2420, 310], [2470, 310],
    [2620, 230], [2670, 230], [2720, 230],
    [2810, 150], [2860, 150],
    [3220, 290], [3270, 290], [3320, 290],
    [3410, 210], [3460, 210],
    [3610, 150], [3660, 150],
    [4020, 310], [4070, 310], [4120, 310],
    [4210, 230], [4260, 230],
    [4410, 150], [4460, 150],
    [4820, 290], [4870, 290], [4920, 290],
    [5010, 210], [5060, 210],
    [5210, 130], [5260, 130],
    [5620, 310], [5670, 310], [5720, 310],
    [5810, 230], [5860, 230],
    [6010, 150], [6060, 150]
  ];
  ringPositions.forEach(([x, y]) => {
    rings.push({ x, y, r: 12, collected: false, anim: Math.random() * Math.PI * 2 });
  });

  const enemyDefs = [
    [600, 410, 1], [950, 410, -1], [1300, 410, 1],
    [1750, 410, -1], [2100, 410, 1], [2500, 410, -1],
    [2900, 410, 1], [3300, 410, -1], [3700, 410, 1],
    [4100, 410, -1], [4500, 410, 1], [4900, 410, -1],
    [5300, 410, 1], [5700, 410, -1], [6100, 410, 1]
  ];
  enemyDefs.forEach(([x, y, dir]) => {
    enemies.push({ x, y, w: 32, h: 28, vx: dir * 1.5, dir, alive: true, anim: 0 });
  });

  const spikeDefs = [
    [830, 500, 40], [1450, 500, 40], [2250, 500, 40],
    [3050, 500, 40], [3850, 500, 40], [4650, 500, 40],
    [5450, 500, 40]
  ];
  spikeDefs.forEach(([x, y, w]) => {
    spikes.push({ x, y, w, h: 20 });
  });

  const springDefs = [
    [500, 420], [1150, 420], [1800, 420], [2450, 420],
    [3150, 420], [3850, 420], [4550, 420], [5250, 420], [5950, 420]
  ];
  springDefs.forEach(([x, y]) => {
    springs.push({ x, y, w: 30, h: 16, compressed: 0 });
  });

  goal = { x: 6150, y: 340, w: 20, h: 100 };
}

function resetPlayer() {
  player.x = 100; player.y = 300;
  player.vx = 0; player.vy = 0;
  player.grounded = false; player.spinning = false;
  player.invincible = 0; player.facing = 1;
  player.coyoteTimer = 0; player.jumpBufferTimer = 0;
  player.speedTrail = [];
}

function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * spread, vy: (Math.random() - 0.5) * spread - 2,
      life: 25 + Math.random() * 15, color, size: 2 + Math.random() * 4
    });
  }
}

function spawnRingParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    particles2.push({
      x, y, vx: Math.cos(a) * 4, vy: Math.sin(a) * 4 - 2,
      life: 25, color: '#fbbf24', size: 3
    });
  }
}

function update() {
  if (game.over || game.won) return;

  game.time++;

  // Input
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;

  const jumpPressed = justPressed['Space'] || justPressed['ArrowUp'] || justPressed['KeyW'];
  const spinHeld = keys['ArrowDown'] || keys['KeyS'];

  // Jump buffer — remember jump press for a few frames
  if (jumpPressed) player.jumpBufferTimer = JUMP_BUFFER;
  if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;

  // Coyote time — allow jumping briefly after leaving a ledge
  if (player.grounded) {
    player.coyoteTimer = COYOTE_TIME;
  } else {
    if (player.coyoteTimer > 0) player.coyoteTimer--;
  }

  // Spin dash — press Down to charge, release Down to launch
  if (spinHeld && player.grounded) {
    if (!player.spinning) {
      // Start charging
      player.spinning = true;
      player.spinTimer = 0;
      player.vx *= 0.9;
    }
    // While holding Down, slow down and build charge
    player.vx *= 0.92;
    player.spinTimer++;
    if (player.spinTimer === 1) playSpinDash();
  } else if (player.spinning) {
    // Released Down — launch!
    const boost = SPIN_BOOST + Math.min(player.spinTimer * 0.5, 8);
    player.vx = player.facing * boost;
    player.vy = -3;
    player.grounded = false;
    player.spinning = false;
    player.spinTimer = 0;
    playJump();
    spawnParticles(player.x + player.w/2, player.y + player.h, '#22d3ee', 12, 8);
  } else {
    // Normal movement
    if (moveX !== 0) {
      const accel = player.grounded ? ACCEL : ACCEL * AIR_CONTROL;
      player.vx += moveX * accel;
      player.facing = moveX;
    } else {
      player.vx *= player.grounded ? FRICTION : 0.98;
    }
  }

  // Jump — press Space/Up/W (works anytime, cancels spin dash charge)
  if (player.jumpBufferTimer > 0 && player.coyoteTimer > 0) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    player.coyoteTimer = 0;
    player.jumpBufferTimer = 0;
    player.spinning = false;
    player.spinTimer = 0;
    playJump();
    spawnParticles(player.x + player.w/2, player.y + player.h, '#a3e635', 6, 4);
  }

  // Variable jump height — hold Space for full hop, release early for short hop
  if (!keys['Space'] && !keys['ArrowUp'] && !keys['KeyW'] && player.vy < -2) {
    player.vy *= 0.45; // Cut jump short — big difference between tap and hold
  }

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > 12) player.vy = 12;

  // Clamp speed
  if (player.vx > MAX_SPEED) player.vx = MAX_SPEED;
  if (player.vx < -MAX_SPEED) player.vx = -MAX_SPEED;

  // Move X
  player.x += player.vx;

  // Collide X with platforms
  platforms.forEach(p => {
    if (rectCollide(player, p)) {
      if (player.vx > 0) {
        player.x = p.x - player.w;
      } else if (player.vx < 0) {
        player.x = p.x + p.w;
      }
      player.vx = 0;
    }
  });

  // Move Y
  player.y += player.vy;
  player.grounded = false;

  // Collide Y with platforms
  platforms.forEach(p => {
    if (rectCollide(player, p)) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  });

  // Speed trail effect
  if (Math.abs(player.vx) > 4) {
    player.speedTrail.push({ x: player.x + player.w/2, y: player.y + player.h/2, life: 8 });
  }
  player.speedTrail = player.speedTrail.filter(t => { t.life--; return t.life > 0; });

  // Collect rings
  rings.forEach(r => {
    if (!r.collected) {
      const dx = (player.x + player.w/2) - r.x;
      const dy = (player.y + player.h/2) - r.y;
      if (Math.sqrt(dx*dx + dy*dy) < r.r + 16) {
        r.collected = true;
        game.rings++;
        playRing();
        spawnRingParticles(r.x, r.y);
      }
    }
  });

  // Enemy collision
  enemies.forEach(e => {
    if (!e.alive) return;
    e.x += e.vx;
    e.anim += 0.1;
    let onPlatform = false;
    platforms.forEach(p => {
      if (e.x + e.w > p.x && e.x < p.x + p.w && Math.abs((e.y + e.h) - p.y) < 5) {
        onPlatform = true;
      }
    });
    if (!onPlatform) e.vx = -e.vx;

    if (player.invincible <= 0 && rectCollide(player, e)) {
      if (player.vy > 0 && player.y + player.h - e.y < 20) {
        e.alive = false;
        player.vy = -10;
        screenShake = 6;
        playEnemyKill();
        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#f80', 16, 8);
      } else if (!player.spinning) {
        player.invincible = 90;
        player.vy = -9;
        player.vx = -player.facing * 7;
        screenShake = 8;
        playHit();
        game.lives--;
        if (game.lives <= 0) {
          game.over = true;
          stopMusic();
          playGameOver();
          document.getElementById('gameOver').style.display = 'flex';
          document.getElementById('overText').textContent = 'GAME OVER';
          document.getElementById('overSub').textContent = 'You collected ' + game.rings + ' rings';
        }
      } else {
        e.alive = false;
        player.vy = -8;
        screenShake = 6;
        playEnemyKill();
        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#fbbf24', 20, 10);
      }
    }
  });

  // Spike collision
  spikes.forEach(s => {
    if (player.invincible <= 0 && rectCollide(player, s)) {
      player.invincible = 90;
      player.vy = -12;
      player.vx = -player.facing * 9;
      screenShake = 10;
      playHit();
      game.lives--;
      if (game.lives <= 0) {
        game.over = true;
        stopMusic();
        playGameOver();
        document.getElementById('gameOver').style.display = 'flex';
        document.getElementById('overText').textContent = 'GAME OVER';
        document.getElementById('overSub').textContent = 'You collected ' + game.rings + ' rings';
      }
    }
  });

  // Spring collision
  springs.forEach(s => {
    if (rectCollide(player, s) && player.vy > 0) {
      player.vy = SPRING_FORCE;
      s.compressed = 12;
      screenShake = 4;
      playSpring();
      spawnParticles(s.x + s.w/2, s.y, '#34d399', 10, 6);
    }
    s.compressed *= 0.82;
  });

  // Fall off screen
  if (player.y > 600) {
    game.lives--;
    screenShake = 12;
    playHit();
    if (game.lives <= 0) {
      game.over = true;
      stopMusic();
      playGameOver();
      document.getElementById('gameOver').style.display = 'flex';
      document.getElementById('overText').textContent = 'GAME OVER';
      document.getElementById('overSub').textContent = 'You collected ' + game.rings + ' rings';
    } else {
      resetPlayer();
    }
  }

  // Goal
  if (goal && player.x + player.w > goal.x && player.x < goal.x + goal.w) {
    game.won = true;
    stopMusic();
    playGoal();
    document.getElementById('gameOver').style.display = 'flex';
    document.getElementById('overText').textContent = 'LEVEL CLEAR!';
    document.getElementById('overSub').textContent = 'Rings: ' + game.rings + ' | Time: ' + Math.floor(game.time / 60) + 's';
  }

  if (player.invincible > 0) player.invincible--;

  // Animation
  player.animTimer++;
  if (player.animTimer > 3) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }

  // Camera follow
  const targetCamX = player.x - W / 3;
  camera.x += (targetCamX - camera.x) * 0.15;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > 5400) camera.x = 5400;

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.3) screenShake = 0;

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    return p.life > 0;
  });
  particles2 = particles2.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--;
    return p.life > 0;
  });

  // Clear just-pressed
  for (let k in justPressed) delete justPressed[k];

  // Update HUD
  document.getElementById('score').textContent = 'Rings: ' + game.rings;
  document.getElementById('lives').textContent = 'Lives: ' + game.lives;
  document.getElementById('time').textContent = 'Time: ' + Math.floor(game.time / 60);
}

function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function draw() {
  // Apply screen shake
  ctx.save();
  if (screenShake > 0) {
    ctx.translate((Math.random() - 0.5) * screenShake * 2, (Math.random() - 0.5) * screenShake * 2);
  }

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(0.5, '#1a2a4a');
  grad.addColorStop(1, '#0f1f3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Parallax background hills
  drawHills(camera.x * 0.2, 350, '#0d2818', 80);
  drawHills(camera.x * 0.4, 400, '#0f3320', 60);
  drawHills(camera.x * 0.6, 430, '#143d28', 40);

  ctx.save();
  ctx.translate(-camera.x, 0);

  // Draw platforms
  platforms.forEach(p => {
    if (p.type === 'ground') {
      ctx.fillStyle = '#2d8a4e';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#3cb371';
      ctx.fillRect(p.x, p.y, p.w, 8);
      ctx.fillStyle = '#1e6b3a';
      for (let i = 0; i < p.w; i += 32) {
        ctx.fillRect(p.x + i, p.y + 16, 16, 16);
        ctx.fillRect(p.x + i + 16, p.y + 32, 16, 16);
      }
    } else if (p.type === 'float') {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#A0522D';
      ctx.fillRect(p.x, p.y, p.w, 6);
      ctx.fillStyle = '#CD853F';
      ctx.fillRect(p.x + 2, p.y + 2, p.w - 4, 2);
    }
  });

  // Draw spikes
  spikes.forEach(s => {
    ctx.fillStyle = '#c0c0c0';
    const spikes_count = Math.floor(s.w / 12);
    for (let i = 0; i < spikes_count; i++) {
      const sx = s.x + i * 12;
      ctx.beginPath();
      ctx.moveTo(sx, s.y + s.h);
      ctx.lineTo(sx + 6, s.y);
      ctx.lineTo(sx + 12, s.y + s.h);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = '#a0a0a0';
    for (let i = 0; i < spikes_count; i++) {
      const sx = s.x + i * 12;
      ctx.beginPath();
      ctx.moveTo(sx + 2, s.y + s.h);
      ctx.lineTo(sx + 6, s.y + 4);
      ctx.lineTo(sx + 10, s.y + s.h);
      ctx.closePath();
      ctx.fill();
    }
  });

  // Draw springs
  springs.forEach(s => {
    const compress = s.compressed;
    ctx.fillStyle = '#333';
    ctx.fillRect(s.x, s.y + s.h - 6, s.w, 6);
    ctx.fillStyle = '#22d3ee';
    ctx.fillRect(s.x + 4, s.y - compress, s.w - 8, 8);
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(s.x, s.y - compress - 4, s.w, 4);
    if (compress > 3) {
      ctx.fillStyle = 'rgba(34,211,238,0.3)';
      ctx.fillRect(s.x - 4, s.y - compress - 8, s.w + 8, compress + 12);
    }
  });

  // Draw rings
  rings.forEach(r => {
    if (r.collected) return;
    r.anim += 0.08;
    const scale = 0.7 + Math.sin(r.anim) * 0.3;
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.scale(scale, 1);
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, r.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = '#fde68a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, r.r - 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(-3, -3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Draw enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    ctx.ellipse(e.x + e.w/2, e.y + e.h/2 + 2, e.w/2, e.h/2 - 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e.x + e.w/2 + e.dir * 4, e.y + 8, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(e.x + e.w/2 + e.dir * 6, e.y + 8, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333';
    const wheelY = e.y + e.h - 4;
    ctx.beginPath();
    ctx.arc(e.x + 8, wheelY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(e.x + e.w - 8, wheelY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    const rot = e.anim * 3;
    for (let i = 0; i < 3; i++) {
      const a = rot + (i * Math.PI * 2 / 3);
      ctx.beginPath();
      ctx.moveTo(e.x + 8, wheelY);
      ctx.lineTo(e.x + 8 + Math.cos(a) * 5, wheelY + Math.sin(a) * 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.x + e.w - 8, wheelY);
      ctx.lineTo(e.x + e.w - 8 + Math.cos(a) * 5, wheelY + Math.sin(a) * 5);
      ctx.stroke();
    }
  });

  // Draw goal
  if (goal) {
    ctx.fillStyle = '#22d3ee';
    ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
    ctx.fillStyle = '#a3e635';
    ctx.fillRect(goal.x - 20, goal.y, 60, 30);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText('GOAL', goal.x - 14, goal.y + 20);
    ctx.shadowColor = '#22d3ee';
    ctx.shadowBlur = 15;
    ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
    ctx.shadowBlur = 0;
  }

  // Draw speed trail
  player.speedTrail.forEach((t, i) => {
    ctx.globalAlpha = t.life / 8 * 0.4;
    ctx.fillStyle = '#22d3ee';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4 + (8 - t.life) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw player
  drawPlayer();

  // Draw particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 20);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
  particles2.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 15);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.restore();
  ctx.restore();
}

function drawHills(baseX, baseY, color, amplitude) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 4) {
    const worldX = x + baseX;
    const y = baseY + Math.sin(worldX * 0.003) * amplitude * 0.5 + Math.sin(worldX * 0.007) * amplitude * 0.3;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;
  const blink = player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0;
  if (blink) return;

  ctx.save();
  ctx.translate(px + player.w/2, py + player.h/2);
  if (player.facing < 0) ctx.scale(-1, 1);

  if (player.spinning) {
    ctx.rotate(player.animFrame * 1.5);
    ctx.fillStyle = '#1e40af';
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1e3a8a';
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 12, Math.sin(a) * 12);
      ctx.lineTo(Math.cos(a) * 20, Math.sin(a) * 20);
      ctx.lineTo(Math.cos(a + 0.3) * 12, Math.sin(a + 0.3) * 12);
      ctx.closePath();
      ctx.fill();
    }
  } else {
    // Body
    ctx.fillStyle = '#2563eb';
    ctx.beginPath();
    ctx.ellipse(0, 2, 13, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    // Belly
    ctx.fillStyle = '#fcd34d';
    ctx.beginPath();
    ctx.ellipse(2, 6, 7, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head spikes
    ctx.fillStyle = '#1e40af';
    ctx.beginPath();
    ctx.moveTo(-4, -12);
    ctx.lineTo(-18, -8);
    ctx.lineTo(-6, -6);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-4, -8);
    ctx.lineTo(-20, -2);
    ctx.lineTo(-6, -2);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-4, -4);
    ctx.lineTo(-18, 4);
    ctx.lineTo(-4, 2);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(6, -4, 6, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(8, -3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(9, -5, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(13, -2, 2, 0, Math.PI * 2);
    ctx.fill();
    // Shoes
    const legOffset = player.grounded ? Math.sin(player.animFrame * 1.5) * 3 : 0;
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    ctx.ellipse(2 + legOffset, 18, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-4 - legOffset, 18, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(0 + legOffset, 17, 6, 2);
    ctx.fillRect(-6 - legOffset, 17, 6, 2);
  }

  ctx.restore();
}

let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1000 / 60;
const TIME_SCALE = 0.5; // Half speed — tune this to feel right

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  const delta = (timestamp - lastTime) * TIME_SCALE;
  lastTime = timestamp;
  accumulator += delta;

  // Cap accumulator to prevent spiral of death
  if (accumulator > FIXED_DT * 5) accumulator = FIXED_DT * 5;

  while (accumulator >= FIXED_DT) {
    update();
    accumulator -= FIXED_DT;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

function restart() {
  game = { rings: 0, lives: 3, time: 0, over: false, won: false };
  particles = [];
  particles2 = [];
  screenShake = 0;
  buildLevel();
  resetPlayer();
  document.getElementById('gameOver').style.display = 'none';
}

buildLevel();
requestAnimationFrame(gameLoop);

// Splash screen
const splash = document.getElementById('splash');
const splashCanvas = document.getElementById('splash-bg-canvas');
const splashCtx = splashCanvas.getContext('2d');
let splashTime = 0;
let splashDone = false;

function drawSplashBg(t) {
  const W = 960, H = 540;
  // Sky
  const grad = splashCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(0.5, '#1a2a4a');
  grad.addColorStop(1, '#0f1f3a');
  splashCtx.fillStyle = grad;
  splashCtx.fillRect(0, 0, W, H);

  // Stars
  splashCtx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 137.5 + t * 0.02 * (i % 3 + 1)) % W;
    const sy = (i * 97.3) % (H * 0.5);
    const sz = 1 + Math.sin(t * 0.05 + i) * 0.5;
    splashCtx.beginPath();
    splashCtx.arc(sx, sy, sz, 0, Math.PI * 2);
    splashCtx.fill();
  }

  // Hills
  function drawHill(baseY, color, amp, speed) {
    splashCtx.fillStyle = color;
    splashCtx.beginPath();
    splashCtx.moveTo(0, H);
    for (let x = 0; x <= W; x += 4) {
      const wx = x + t * speed;
      const y = baseY + Math.sin(wx * 0.003) * amp * 0.5 + Math.sin(wx * 0.007) * amp * 0.3;
      splashCtx.lineTo(x, y);
    }
    splashCtx.lineTo(W, H);
    splashCtx.closePath();
    splashCtx.fill();
  }
  drawHill(350, '#0d2818', 80, 0.03);
  drawHill(400, '#0f3320', 60, 0.05);
  drawHill(430, '#143d28', 40, 0.07);

  // Ground
  splashCtx.fillStyle = '#2d8a4e';
  splashCtx.fillRect(0, 440, W, 100);
  splashCtx.fillStyle = '#3cb371';
  splashCtx.fillRect(0, 440, W, 8);

  // Sonic character (simplified, mid-run pose)
  const sonicX = 120 + Math.sin(t * 0.03) * 30;
  const sonicY = 390 + Math.abs(Math.sin(t * 0.08)) * -15;
  splashCtx.save();
  splashCtx.translate(sonicX, sonicY);
  // Body
  splashCtx.fillStyle = '#2563eb';
  splashCtx.beginPath();
  splashCtx.ellipse(0, 2, 13, 16, 0, 0, Math.PI * 2);
  splashCtx.fill();
  // Belly
  splashCtx.fillStyle = '#fcd34d';
  splashCtx.beginPath();
  splashCtx.ellipse(2, 6, 7, 9, 0, 0, Math.PI * 2);
  splashCtx.fill();
  // Head spikes
  splashCtx.fillStyle = '#1e40af';
  for (let i = 0; i < 3; i++) {
    splashCtx.beginPath();
    splashCtx.moveTo(-4, -12 + i * 4);
    splashCtx.lineTo(-18 + i * 2, -8 + i * 6);
    splashCtx.lineTo(-6, -6 + i * 6);
    splashCtx.closePath();
    splashCtx.fill();
  }
  // Eye
  splashCtx.fillStyle = '#fff';
  splashCtx.beginPath();
  splashCtx.ellipse(6, -4, 6, 7, 0, 0, Math.PI * 2);
  splashCtx.fill();
  splashCtx.fillStyle = '#000';
  splashCtx.beginPath();
  splashCtx.arc(8, -3, 3, 0, Math.PI * 2);
  splashCtx.fill();
  // Shoes
  const legOff = Math.sin(t * 0.15) * 4;
  splashCtx.fillStyle = '#dc2626';
  splashCtx.beginPath();
  splashCtx.ellipse(2 + legOff, 18, 7, 4, 0, 0, Math.PI * 2);
  splashCtx.fill();
  splashCtx.beginPath();
  splashCtx.ellipse(-4 - legOff, 18, 7, 4, 0, 0, Math.PI * 2);
  splashCtx.fill();
  // Speed lines
  splashCtx.strokeStyle = 'rgba(34,211,238,0.3)';
  splashCtx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    const lx = -20 - i * 15 + Math.sin(t * 0.1 + i) * 5;
    const ly = 10 + i * 5;
    splashCtx.beginPath();
    splashCtx.moveTo(lx, ly);
    splashCtx.lineTo(lx - 20 - i * 5, ly);
    splashCtx.stroke();
  }
  splashCtx.restore();

  // Floating rings
  for (let i = 0; i < 8; i++) {
    const rx = 200 + i * 90 + Math.sin(t * 0.04 + i * 0.7) * 20;
    const ry = 300 + Math.sin(t * 0.06 + i * 1.1) * 30;
    const rs = 0.7 + Math.sin(t * 0.08 + i) * 0.3;
    splashCtx.save();
    splashCtx.translate(rx, ry);
    splashCtx.scale(rs, 1);
    splashCtx.strokeStyle = '#fbbf24';
    splashCtx.lineWidth = 3;
    splashCtx.beginPath();
    splashCtx.arc(0, 0, 12, 0, Math.PI * 2);
    splashCtx.stroke();
    splashCtx.strokeStyle = '#fde68a';
    splashCtx.lineWidth = 1.5;
    splashCtx.beginPath();
    splashCtx.arc(0, 0, 9, 0, Math.PI * 2);
    splashCtx.stroke();
    splashCtx.restore();
  }
}

function splashLoop() {
  if (splashDone) return;
  splashTime++;
  drawSplashBg(splashTime);
  requestAnimationFrame(splashLoop);
}
splashLoop();

function dismissSplash() {
  if (splashDone) return;
  splashDone = true;
  splash.classList.add('fade-out');
  ensureAudio();
  startMusic();
  setTimeout(() => { splash.style.display = 'none'; }, 800);
}
splash.addEventListener('click', dismissSplash);
document.addEventListener('keydown', dismissSplash);

// Start music on first user interaction (browser autoplay policy)
const startAudio = function() {
  ensureAudio();
  startMusic();
  document.removeEventListener('click', startAudio);
  document.removeEventListener('keydown', startAudio);
};
document.addEventListener('click', startAudio);
document.addEventListener('keydown', startAudio);
</script>
