<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a12">
<title>TEMU Sonic — Green Hill</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;touch-action:none;overscroll-behavior:none}
body{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none}
#hud{position:absolute;top:env(safe-area-inset-top,8px);left:50%;transform:translateX(-50%);display:flex;gap:12px;color:#fff;font-size:12px;font-weight:600;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,.8);z-index:10;pointer-events:none;white-space:nowrap;transition:opacity .3s}
#hud span{background:rgba(0,0,0,.5);padding:4px 10px;border-radius:16px;border:1px solid rgba(255,255,255,.1)}
#controls{position:absolute;bottom:env(safe-area-inset-bottom,8px);left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:10px;letter-spacing:1px;z-index:10;text-align:center;pointer-events:none}
#gameOver{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:20;padding:20px;text-align:center}
#gameOver h1{font-size:36px;color:#fbbf24;text-shadow:0 0 20px rgba(251,191,36,.5);margin-bottom:8px}
#gameOver p{color:#fff;font-size:14px;margin-bottom:20px}
#gameOver button{padding:14px 36px;font-size:16px;font-weight:700;background:linear-gradient(135deg,#22d3ee,#a3e635);border:none;border-radius:8px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;min-width:200px;min-height:44px}
#gameOver button:active{transform:scale(0.95)}
/* Splash screen */
#splash{position:absolute;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a1628 0%,#1a2a4a 40%,#0f1f3a 100%);transition:opacity .6s ease;cursor:pointer;overflow:hidden}
#splash.fade-out{opacity:0;pointer-events:none}
#splash-bg{position:absolute;inset:0;overflow:hidden}
#splash-bg::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:radial-gradient(ellipse at 20% 20%,rgba(34,211,238,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 30%,rgba(163,230,53,0.06) 0%,transparent 50%)}
#splash-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(180deg,transparent 0%,#0d2818 30%,#1a4a2a 70%,#2d6a3e 100%)}
#splash-sonic{display:none}
#splash-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(500px,85vw);height:auto;z-index:3;animation:logoFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(34,211,238,0.4))}
@keyframes logoFloat{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.04)}}
#splash-title{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);text-align:center;z-index:5;user-select:none}
#splash-title .press-start{font-size:clamp(14px,3.5vw,20px);color:rgba(255,255,255,.4);letter-spacing:3px;animation:pulse 2s ease-in-out infinite}
#splash-rings{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:5}
.splash-ring{width:48px;height:48px;border:3px solid #fbbf24;border-radius:50%;animation:ringFloat 3s ease-in-out infinite}
.splash-ring{width:16px;height:16px;border:3px solid #fbbf24;border-radius:50%;animation:ringFloat 3s ease-in-out infinite}
.splash-ring:nth-child(2){animation-delay:.3s}
.splash-ring:nth-child(3){animation-delay:.6s}
.splash-ring:nth-child(4){animation-delay:.9s}
.splash-ring:nth-child(5){animation-delay:1.2s}
@keyframes ringFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.1)}}
/* Mobile touch controls — sidebar layout */
#touch-controls{position:absolute;top:0;bottom:0;left:0;display:none;z-index:15;pointer-events:none;width:70px;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:5px}
#touch-controls-right{position:absolute;top:0;bottom:0;right:0;display:none;z-index:15;pointer-events:none;width:70px;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:5px}
.touch-btn{width:54px;height:54px;border-radius:12px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,.55);pointer-events:auto;user-select:none;-webkit-user-select:none;transition:background .1s}
.touch-btn:active,.touch-btn.active{background:rgba(34,211,238,.35);border-color:rgba(34,211,238,.7);color:rgba(255,255,255,.9)}
#btn-left{background:rgba(34,211,238,.12)}
#btn-right{background:rgba(34,211,238,.12)}
#btn-jump{background:rgba(163,230,53,.15)}
#btn-down{background:rgba(251,191,36,.15)}
@media(pointer:coarse){
  #touch-controls{display:flex}
  #touch-controls-right{display:flex}
  #controls{display:none}
}
</style>
</head>
<body>
<!-- Splash Screen -->
<div id="splash">
  <div id="splash-bg"></div>
  <div id="splash-sonic"></div>
  <img id="splash-logo" src="Temu Sonic-Inspired Game Logo.png" alt="Temu Sonic">
  <div id="splash-title">
    <div class="press-start">Tap to start</div>
  </div>
  <div id="splash-rings">
    <div class="splash-ring"></div>
    <div class="splash-ring"></div>
    <div class="splash-ring"></div>
    <div class="splash-ring"></div>
    <div class="splash-ring"></div>
  </div>
</div>
<div id="hud">
  <span id="score">Rings: 0</span>
  <span id="lives">Lives: 3</span>
  <span id="time">Time: 0</span>
</div>
<canvas id="game" width="960" height="540"></canvas>
<div id="controls">← → Move  |  SPACE / ↑ Jump  |  ↓ Stomp in air</div>
<div id="gameOver">
  <h1 id="overText">GAME OVER</h1>
  <p id="overSub">You collected 0 rings</p>
  <button id="restartBtn">Try Again</button>
</div>
<!-- Mobile touch controls — sidebar layout -->
<div id="touch-controls">
  <div id="btn-left" class="touch-btn">◀</div>
  <div id="btn-right" class="touch-btn">▶</div>
</div>
<div id="touch-controls-right">
  <div id="btn-down" class="touch-btn">▼</div>
  <div id="btn-jump" class="touch-btn">▲</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Game state
let game = { rings: 0, lives: 3, time: 0, over: false, won: false };
let camera = { x: 0, y: 0 };
let particles = [];
let particles2 = [];
let screenShake = 0;

// Physics constants — SONIC 1 GENESIS VALUES (from Sonic Retro Physics Guide)
// Units: pixels per frame. 60fps baseline.
// const FRICTION = 0.92; — REMOVED: replaced with additive deceleration model
const GRAVITY = 0.42;              // gravity acceleration
const GROUND_ACCEL = 0.0625;       // ground acceleration (original — keep)
const AIR_ACCEL = 0.1875;          // air acceleration (original — keep)
const GROUND_DECEL = 0.5;          // ground deceleration (strong grip, stops fast)
const AIR_DECEL = 0.046875;        // air drag (light — preserves air momentum)
const SLOPE_UP_FRICTION = 0.75;    // speed loss going uphill (6x — max grip on slopes)
const SLOPE_DOWN_FRICTION = 0.125; // speed gain going downhill (unchanged)
const ROLL_FRICTION = 0.6;         // rolling deceleration (12x — no ice-skating)
const ROLL_DECEL = 1.0;            // brake / roll deceleration (8x stronger)
const STOMP_FORCE = 18;            // downward force when pressing down in air
const MAX_SPEED = 6;               // top speed (Sonic 1 = 6 px/frame)
const TOP_ROLL_SPEED = 12;         // rolling can exceed normal top speed
const AIR_CONTROL = 0.7;           // reduced air steering
const JUMP_FORCE = -11.5;
const SPIN_BOOST = 14;
const SPRING_FORCE = -16;
const COYOTE_TIME = 6;
const JUMP_BUFFER = 8;

// Player
let player = {
  x: 100, y: 300, vx: 0, vy: 0, w: 28, h: 36,
  grounded: false, facing: 1, spinning: false, spinTimer: 0,
  invincible: 0, animFrame: 0, animTimer: 0,
  coyoteTimer: 0, jumpBufferTimer: 0, wasGrounded: false,
  jumpHeld: false, speedTrail: [], stomping: false
};

// Input
const keys = {};
const justPressed = {};
const prevKeys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls — mobile
function setupTouch(id, code) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const press = e => { e.preventDefault(); keys[code] = true; justPressed[code] = true; btn.classList.add('active'); };
  const release = e => { e.preventDefault(); keys[code] = false; btn.classList.remove('active'); };
  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend', release, { passive: false });
  btn.addEventListener('touchcancel', release, { passive: false });
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
}
setupTouch('btn-left', 'ArrowLeft');
setupTouch('btn-right', 'ArrowRight');
setupTouch('btn-jump', 'Space');
setupTouch('btn-down', 'ArrowDown');

// Canvas scaling — fit to viewport (account for mobile sidebars)
function resizeCanvas() {
  const isMobile = window.matchMedia('(pointer:coarse)').matches;
  const sidebarW = isMobile ? 160 : 20;  // 70px each side + gap on mobile
  const margin = 10;
  const availW = window.innerWidth - sidebarW - margin * 2;
  const availH = window.innerHeight - margin * 2;
  const scale = Math.min(availW / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  // Center canvas between sidebars
  const canvasW = W * scale;
  const offsetLeft = isMobile ? 80 + (availW - canvasW) / 2 : (window.innerWidth - canvasW) / 2;
  canvas.style.position = 'absolute';
  canvas.style.left = offsetLeft + 'px';
  canvas.style.top = '50%';
  canvas.style.transform = 'translateY(-50%)';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', resizeCanvas);
resizeCanvas();

// Audio synth — no external files needed
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let reverbNode = null;
let masterGain = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new AudioCtx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
    // Create reverb impulse response
    const rate = audioCtx.sampleRate;
    const length = rate * 1.5; // 1.5 second reverb
    const impulse = audioCtx.createBuffer(2, length, rate);
    for (let ch = 0; ch < 2; ch++) {
      const data = impulse.getChannelData(ch);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
      }
    }
    reverbNode = audioCtx.createConvolver();
    reverbNode.buffer = impulse;
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.25;
    reverbNode.connect(reverbGain);
    reverbGain.connect(masterGain);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  // Dry signal
  const dryGain = audioCtx.createGain();
  dryGain.gain.value = 0.7;
  osc.connect(gain);
  gain.connect(dryGain);
  dryGain.connect(masterGain);
  // Wet signal (reverb)
  gain.connect(reverbNode);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playJump()    { playTone(520, 0.12, 'square', 0.12); setTimeout(() => playTone(780, 0.08, 'square', 0.08), 50); }
function playSpinDash() { playTone(220, 0.15, 'sawtooth', 0.15); }
function playRing()     { playTone(1200, 0.08, 'sine', 0.1); setTimeout(() => playTone(1500, 0.06, 'sine', 0.08), 60); }
function playSpring()   { playTone(440, 0.1, 'triangle', 0.12); setTimeout(() => playTone(880, 0.08, 'triangle', 0.1), 70); }
function playHit()      { playTone(120, 0.2, 'sawtooth', 0.15); }
function playEnemyKill(){ playTone(600, 0.05, 'square', 0.1); setTimeout(() => playTone(900, 0.05, 'square', 0.08), 50); setTimeout(() => playTone(1200, 0.05, 'square', 0.06), 100); }
function playGoal()     { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.12), i * 120)); }
function playGameOver() { [400,300,200,100].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 'sawtooth', 0.1), i * 150)); }

// Background music — DRUM & BASS with AMEN BREAKS
let musicInterval = null;
let drumInterval = null;
let bassInterval = null;
let leadInterval = null;

let musicIndex = 0;
let musicPlaying = false;
let currentBar = 0;

// Drum & Bass tempo (BPM)
const BPM = 174;
const SIXTEENTH = (60 / BPM / 4) * 1000;  // ~86ms per 16th note

// Amen break — the classic 4-bar breakbeat pattern (16th notes per bar)
// K=kick, S=snare, H=hihat, O=open hihat, F=fill, .=rest
const amenBreak = [
  // Bar 1: classic amen
  'K.H.SOH.K.H.S.H',
  // Bar 2: variation
  'K.H.SOH.K.H.SOH',
  // Bar 3: classic
  'K.H.SOH.K.H.S.H',
  // Bar 4: fill
  'K.H.SOH.KSKSSKS',
];

// Normal DnB pattern (used between amen breaks)
const dnbPattern = [
  'K.H.S.H.K.H.S.H',
  'K.H.S.H.K.H.SOH',
  'K.H.S.H.K.H.S.H',
  'K.H.SOH.K.H.S.H',
];

// Bass arpeggios — funky DnB rhythms with 16th note patterns
// Letters = note offsets from BASS_ROOT (semitones), '.' = rest, 'B' = root
// Pattern plays every 16th note for tight funky grooves
const bassPatterns = [
  // Bar 0: root-5th-octave-7th bounce (funky 16ths)
  'B.5.B.7.B.5.B.7',
  // Bar 1: chromatic walkup with syncopation
  'B.3.5.7.B.5.3.B',
  // Bar 2: octave jump with ghost notes
  'B...5...7...B.5.',
  // Bar 3: driving 16ths with rests for groove
  'B.5.7.B.3.5.B.7',
];
const BASS_NOTES = { B: 0, 3: 3, 5: 5, 7: 7, 9: 9 }; // semitone offsets from root
const BASS_ROOT = 41;  // E1 in Hz

// Green Hill Zone REVERSED melody (original by Masato Nakamura, 1991)
// Original: E G A B A G E D... played with a bouncy major feel
// Reversed: ...D E G A B A G E (dark, descending, atmospheric)
// Frequencies in Hz, played as 8th notes
// 'd' suffix = dotted (1.5x duration), 'h' = half note (2x), 'q' = dotted quarter (1.5x)
// Every 6th note is dotted. 3 random half notes + 1 dotted quarter sprinkled in.
const ghvMelody = [
  // Phrase 1 (reversed original phrase 4)
  0, 784, 698, 0, 587, '523d', 0, 440,           // G5 . C#5 . A4(dotted) . E4
  // Phrase 2 (reversed original phrase 3)
  '880h', 0, 784, '698d', 0, 587, 523, 0,         // A5(half) . E5(dotted) . C#5 . G4
  // Phrase 3 (reversed original phrase 2)
  0, 880, '824d', 0, 698, 659, 0, '523q',          // B5 . G5(dotted) . B4 . G4(dotted quarter)
  // Phrase 4 (reversed original phrase 1 — the iconic opening)
  1047, 0, '880h', 824, 0, '698d', 659, 0,        // C6 . A5(half) . E5(dotted) . B4
];

// Walking bassline — moves stepwise, not oompa-pedal
// Follows the chord progression with passing tones
const ghvBass = [
  165, 175, 165, 147,  // E3 F3 E3 D3
  165, 175, 165, 196,  // E3 F3 E3 G3
  175, 196, 175, 165,  // F3 G3 F3 E3
  147, 165, 147, 131,  // D3 E3 D3 C3
];

// Synth lead — sparse, atmospheric stabs (reversed melody hits)
const leadPattern = [
  '....A...D...A..',
  '....A...D...F..',
  '....A...D...A..',
  '....G...D...A..',
];

// Drum sounds
function playKick(punch) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(punch ? 180 : 150, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(25, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(punch ? 0.5 : 0.35, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  dryGain.gain.value = 0.7;
  wetGain.gain.value = 0.3;
  osc.connect(gain);
  gain.connect(dryGain);
  gain.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(reverbNode);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playHiHat(open) {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * (open ? 0.15 : 0.04);
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, open ? 1.2 : 4);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 8000;
  const gain = audioCtx.createGain();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  gain.gain.setValueAtTime(open ? 0.07 : 0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (open ? 0.15 : 0.04));
  dryGain.gain.value = 0.5;
  wetGain.gain.value = 0.5;
  src.connect(hp);
  hp.connect(gain);
  gain.connect(dryGain);
  gain.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(reverbNode);
  src.start();
}

function playSnare() {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * 0.12;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.5);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 4000;
  const gain = audioCtx.createGain();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  dryGain.gain.value = 0.6;
  wetGain.gain.value = 0.4;
  src.connect(bp);
  bp.connect(gain);
  gain.connect(dryGain);
  gain.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(reverbNode);
  src.start();
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();
  const oscDry = audioCtx.createGain();
  const oscWet = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(180, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.04);
  oscGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  oscGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
  oscDry.gain.value = 0.6;
  oscWet.gain.value = 0.4;
  osc.connect(oscGain);
  oscGain.connect(oscDry);
  oscGain.connect(oscWet);
  oscDry.connect(masterGain);
  oscWet.connect(reverbNode);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.06);
}

// Deep sub bass
function playSub(freq, dur) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  dryGain.gain.value = 0.6;
  wetGain.gain.value = 0.4;
  osc.connect(gain);
  gain.connect(dryGain);
  gain.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(reverbNode);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

// Cymbal sounds with reverb
function playCymbalCrash(intensity) {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * 4.5;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 0.5);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 4000;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 7000;
  bp.Q.value = 0.3;
  const gain = audioCtx.createGain();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  gain.gain.setValueAtTime(intensity * 0.42, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4.5);
  dryGain.gain.value = 0.3;
  wetGain.gain.value = 0.7;
  src.connect(hp);
  hp.connect(bp);
  bp.connect(gain);
  gain.connect(dryGain);
  gain.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(reverbNode);
  src.start();
}

function playCymbalReverse(intensity) {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * 2.5;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    // Reversed envelope — quiet attack, loud at end (riser)
    const env = Math.pow(i / bufferSize, 2);
    data[i] = (Math.random() * 2 - 1) * env;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 3000;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 6000;
  bp.Q.value = 0.3;
  const gain = audioCtx.createGain();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  gain.gain.setValueAtTime(intensity * 0.35, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
  dryGain.gain.value = 0.3;
  wetGain.gain.value = 0.7;
  src.connect(hp);
  hp.connect(bp);
  bp.connect(gain);
  gain.connect(dryGain);
  gain.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(reverbNode);
  src.start();
}

// Riser — long slow rising pitch noise sweep for transition
// Synth lead stab
function playLead(freq, dur) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc2.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc2.frequency.setValueAtTime(freq * 1.005, audioCtx.currentTime);
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + dur);
  filter.Q.value = 8;
  dryGain.gain.value = 0.5;
  wetGain.gain.value = 0.5;
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(filter);
  osc2.connect(filter);
  filter.connect(gain);
  gain.connect(dryGain);
  gain.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(reverbNode);
  osc.start();
  osc2.start();
  osc.stop(audioCtx.currentTime + dur);
  osc2.stop(audioCtx.currentTime + dur);
}

function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  musicIndex = 0;
  currentBar = 0;

  // Sequencer — 16th note grid
  let step = 0;

  musicInterval = setInterval(() => {
    if (game.over || game.won) { stopMusic(); return; }

    const bar = Math.floor(step / 16) % 8;  // 8-bar cycle
    const pos = step % 16;

    // Switch between amen break and DnB pattern every 4 bars
    const isAmen = bar < 4;
    const pattern = isAmen ? amenBreak : dnbPattern;
    const row = pattern[bar % 4];
    const hit = row[pos];

    // Drums
    if (hit === 'K') playKick(pos === 0 || pos === 8);
    if (hit === 'S') playSnare();
    if (hit === 'H') playHiHat(false);
    if (hit === 'O') playHiHat(true);

    // Bass arpeggios — 16th note patterns with semitone offsets
    {
      const bassRow = bassPatterns[bar % 4];
      const noteChar = bassRow[pos];
      if (noteChar !== '.' && noteChar !== undefined) {
        const semitone = BASS_NOTES[noteChar] || 0;
        const freq = BASS_ROOT * Math.pow(2, semitone / 12);
        playSub(freq, 0.15);
      }
    }

    // GREEN HILL ZONE REVERSED melody — halftime feel, every 5th note dropped
    // Supports: plain number (8th), 'd' suffix (dotted 8th = 1.5x), 'h' (half = 2x), 'q' (dotted quarter = 3x)
    if (pos % 2 === 0) {
      const rawMelody = ghvMelody[(step / 2) % ghvMelody.length];
      if (rawMelody !== 0) {
        let freq, dur;
        if (typeof rawMelody === 'string') {
          const suffix = rawMelody.slice(-1);
          freq = parseInt(rawMelody.slice(0, -1));
          dur = suffix === 'h' ? 0.2 : suffix === 'q' ? 0.3 : suffix === 'd' ? 0.15 : 0.1;
        } else {
          freq = rawMelody;
          dur = 0.1;
        }
        playTone(freq, dur, 'square', 0.12);
      }
      const bassIdx = (step / 2) % ghvBass.length;
      const bassNote = ghvBass[bassIdx];
      if (bassNote > 0) playTone(bassNote, 0.15, 'sine', 0.72);
    }

    // CYMBALS — bar 1: crash, bar 4: second crash, bar 7: final crash
    if (bar === 0 && pos === 0) playCymbalCrash(1.0);
    if (bar === 3 && pos === 0) playCymbalCrash(0.8);
    if (bar === 7 && pos === 0) playCymbalCrash(1.2);

    step = (step + 1) % (16 * 8);  // 8-bar loop
  }, SIXTEENTH);
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

function resetPlayer() {
  player.x = 100; player.y = 300;
  player.vx = 0; player.vy = 0;
  player.grounded = false; player.spinning = false;
  player.invincible = 0; player.facing = 1;
  player.coyoteTimer = 0; player.jumpBufferTimer = 0;
  player.speedTrail = [];
}

function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * spread, vy: (Math.random() - 0.5) * spread - 2,
      life: 25 + Math.random() * 15, color, size: 2 + Math.random() * 4
    });
  }
}

function spawnRingParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    particles2.push({
      x, y, vx: Math.cos(a) * 4, vy: Math.sin(a) * 4 - 2,
      life: 25, color: '#fbbf24', size: 3
    });
  }
}

function update() {
  if (game.over || game.won) return;

  game.time++;

  // Input
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;

  const jumpPressed = justPressed['Space'] || justPressed['ArrowUp'] || justPressed['KeyW'];
  const spinHeld = keys['ArrowDown'] || keys['KeyS'];

  // Jump buffer — remember jump press for a few frames
  if (jumpPressed) player.jumpBufferTimer = JUMP_BUFFER;
  if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;

  // Coyote time — allow jumping briefly after leaving a ledge
  if (player.grounded) {
    player.coyoteTimer = COYOTE_TIME;
  } else {
    if (player.coyoteTimer > 0) player.coyoteTimer--;
  }

  // Spin dash — press Down to charge, release Down to launch
  if (spinHeld && player.grounded) {
    if (!player.spinning) {
      // Start charging
      player.spinning = true;
      player.spinTimer = 0;
      player.vx *= 0.9;
    }
    // While holding Down, slow down and build charge
    player.vx *= 0.92;
    player.spinTimer++;
    if (player.spinTimer === 1) playSpinDash();
  } else if (player.spinning) {
    // Released Down — launch!
    const boost = SPIN_BOOST + Math.min(player.spinTimer * 0.5, 8);
    player.vx = player.facing * boost;
    player.vy = -3;
    player.grounded = false;
    player.spinning = false;
    player.spinTimer = 0;
    playJump();
    spawnParticles(player.x + player.w/2, player.y + player.h, '#22d3ee', 12, 8);
  } else {
    // Normal movement — Sonic 1 style: accel/decel, not multiplicative friction
    if (moveX !== 0) {
      const accel = player.grounded ? GROUND_ACCEL : AIR_ACCEL * AIR_CONTROL;
      player.vx += moveX * accel;
      player.facing = moveX;
    } else {
      // Deceleration: subtract a fixed amount each frame (not multiply)
      if (player.grounded) {
        if (Math.abs(player.vx) < GROUND_DECEL) {
          player.vx = 0;
        } else {
          player.vx -= Math.sign(player.vx) * GROUND_DECEL;
        }
      } else {
        // Air drag — very light
        if (Math.abs(player.vx) < AIR_DECEL) {
          player.vx = 0;
        } else {
          player.vx -= Math.sign(player.vx) * AIR_DECEL;
        }
      }
    }

    // Clamp to top speed (unless rolling/spinning which allows higher)
    const maxV = player.spinning ? TOP_ROLL_SPEED : MAX_SPEED;
    if (Math.abs(player.vx) > maxV) {
      player.vx = Math.sign(player.vx) * maxV;
    }
  }

  // Jump — press Space/Up/W (works anytime, cancels spin dash charge)
  if (player.jumpBufferTimer > 0 && player.coyoteTimer > 0) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    player.coyoteTimer = 0;
    player.jumpBufferTimer = 0;
    player.spinning = false;
    player.spinTimer = 0;
    playJump();
    spawnParticles(player.x + player.w/2, player.y + player.h, '#a3e635', 6, 4);
  }

  // Variable jump height — hold Space for full hop, release early for short hop
  if (!keys['Space'] && !keys['ArrowUp'] && !keys['KeyW'] && player.vy < -2) {
    player.vy *= 0.45; // Cut jump short — big difference between tap and hold
  }

  // Stomp — press Down in mid-air for a fast downward dash
  if (!player.grounded && (keys['ArrowDown'] || keys['KeyS']) && !player.stomping) {
    player.vy = STOMP_FORCE;
    player.stomping = true;
    player.vx *= 0.5; // kill some horizontal speed on stomp
    spawnParticles(player.x + player.w/2, player.y + player.h, '#22d3ee', 8, 6);
  }
  if (player.grounded) player.stomping = false;

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > STOMP_FORCE) player.vy = STOMP_FORCE; // cap fall speed during stomp

  // Clamp speed
  if (player.vx > MAX_SPEED) player.vx = MAX_SPEED;
  if (player.vx < -MAX_SPEED) player.vx = -MAX_SPEED;

  // Move X
  player.x += player.vx;

  // Collide X with platforms
  platforms.forEach(p => {
    if (rectCollide(player, p)) {
      if (player.vx > 0) {
        player.x = p.x - player.w;
      } else if (player.vx < 0) {
        player.x = p.x + p.w;
      }
      player.vx = 0;
    }
  });

  // Move Y
  player.y += player.vy;
  player.grounded = false;

  // Collide Y with platforms
  platforms.forEach(p => {
    if (rectCollide(player, p)) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  });

  // Speed trail effect
  if (Math.abs(player.vx) > 4) {
    player.speedTrail.push({ x: player.x + player.w/2, y: player.y + player.h/2, life: 8 });
  }
  player.speedTrail = player.speedTrail.filter(t => { t.life--; return t.life > 0; });

  // Collect rings
  rings.forEach(r => {
    if (!r.collected) {
      const dx = (player.x + player.w/2) - r.x;
      const dy = (player.y + player.h/2) - r.y;
      if (Math.sqrt(dx*dx + dy*dy) < r.r + 16) {
        r.collected = true;
        game.rings++;
        playRing();
        spawnRingParticles(r.x, r.y);
      }
    }
  });

  // Enemy collision
  enemies.forEach(e => {
    if (!e.alive) return;
    e.anim += 0.1;

    // Flying enemies (plane 1) — patrol 700px then turn around
    if (e.plane === 1) {
      e.homeX = e.homeX || e.x;
      e.x += e.vx;
      if (Math.abs(e.x - e.homeX) >= 350) {
        e.vx = -e.vx;
        e.dir = e.vx > 0 ? 1 : -1;
      }
      if (e.x < 50 || e.x > 6200) e.vx = -e.vx;
    } else {
    // Ground enemies — turn at platform edges
    // Check if enemy would be on platform NEXT frame — turn before walking off
    const nextX = e.x + e.vx;
    let onPlatformNext = false;
    platforms.forEach(p => {
      if (nextX + e.w > p.x && nextX < p.x + p.w && Math.abs((e.y + e.h) - p.y) < 8) {
        onPlatformNext = true;
      }
    });

    // Also check current position in case we need to reverse from overlap
    let onPlatformNow = false;
    platforms.forEach(p => {
      if (e.x + e.w > p.x && e.x < p.x + p.w && Math.abs((e.y + e.h) - p.y) < 8) {
        onPlatformNow = true;
      }
    });

    // Turn around if not on platform next frame, or if now is true (still on it), don't reverse
    if (!onPlatformNext && onPlatformNow) {
      // About to walk off — reverse
      e.vx = -e.vx;
    } else if (!onPlatformNow && !onPlatformNext) {
      // Completely off platform — reverse and nudge back onto it
      e.vx = -e.vx;
      e.x += e.vx;
    } else {
      // Move normally
      e.x += e.vx;
    }

    } // end ground enemy movement

    if (player.invincible <= 0 && rectCollide(player, e)) {
      // Airborne enemies (plane 1) — player always wins
      if (e.plane === 1) {
        e.alive = false;
        player.vy = -10;
        screenShake = 6;
        playEnemyKill();
        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#fbbf24', 16, 8);
      } else {
        // Ground enemies — stomp kill only when falling from above
        const playerBottom = player.y + player.h;
        const enemyTop = e.y;
        const isAbove = playerBottom < enemyTop + 15;
        const isFalling = player.vy > 0;
        if (isFalling && isAbove) {
        e.alive = false;
        player.vy = -10;
        screenShake = 6;
        playEnemyKill();
        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#f80', 16, 8);
      } else if (!player.spinning) {
        player.invincible = 90;
        player.vy = -9;
        player.vx = -player.facing * 7;
        screenShake = 8;
        playHit();
        game.lives--;
        if (game.lives <= 0) {
          game.over = true;
          stopMusic();
          playGameOver();
          document.getElementById('gameOver').style.display = 'flex';
          document.getElementById('overText').textContent = 'GAME OVER';
          document.getElementById('overSub').textContent = 'You collected ' + game.rings + ' rings';
        }
      } else {
        e.alive = false;
        player.vy = -8;
        screenShake = 6;
        playEnemyKill();
        spawnParticles(e.x + e.w/2, e.y + e.h/2, '#fbbf24', 20, 10);
      }
      } // end ground enemy else
    }
  });

  // Spike collision
  spikes.forEach(s => {
    if (player.invincible <= 0 && rectCollide(player, s)) {
      player.invincible = 90;
      player.vy = -12;
      player.vx = -player.facing * 9;
      screenShake = 10;
      playHit();
      game.lives--;
      if (game.lives <= 0) {
        game.over = true;
        stopMusic();
        playGameOver();
        document.getElementById('gameOver').style.display = 'flex';
        document.getElementById('overText').textContent = 'GAME OVER';
        document.getElementById('overSub').textContent = 'You collected ' + game.rings + ' rings';
      }
    }
  });

  // Spring collision — smaller collision rect (top 6px only)
  springs.forEach(s => {
    const springTopRect = { x: s.x + 4, y: s.y - 2, w: s.w - 8, h: 8 };
    const playerFeet = { x: player.x + 4, y: player.y + player.h - 4, w: player.w - 8, h: 4 };
    if (rectCollide(playerFeet, springTopRect) && player.vy > 0) {
      player.vy = SPRING_FORCE;
      s.compressed = 12;
      screenShake = 4;
      playSpring();
      spawnParticles(s.x + s.w/2, s.y, '#34d399', 10, 6);
    }
    s.compressed *= 0.82;
  });

  // Fall off screen
  if (player.y > 600) {
    game.lives--;
    screenShake = 12;
    playHit();
    if (game.lives <= 0) {
      game.over = true;
      stopMusic();
      playGameOver();
      document.getElementById('gameOver').style.display = 'flex';
      document.getElementById('overText').textContent = 'GAME OVER';
      document.getElementById('overSub').textContent = 'You collected ' + game.rings + ' rings';
    } else {
      resetPlayer();
    }
  }

  // Goal
  if (goal && player.x + player.w > goal.x && player.x < goal.x + goal.w) {
    game.won = true;
    stopMusic();
    playGoal();
    const allRings = game.rings >= rings.length;
    document.getElementById('gameOver').style.display = 'flex';
    document.getElementById('overText').textContent = allRings ? 'YOUR POES!' : 'LEVEL CLEAR!';
    document.getElementById('overSub').textContent = 'Rings: ' + game.rings + '/' + rings.length + ' | Time: ' + Math.floor(game.time / 60) + 's' + (allRings ? ' ★ PERFECT!' : '');
  }

  if (player.invincible > 0) player.invincible--;

  // Animation
  player.animTimer++;
  if (player.animTimer > 3) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }

  // Camera follow
  const targetCamX = player.x - W / 3;
  camera.x += (targetCamX - camera.x) * 0.15;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > 5400) camera.x = 5400;

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.85;
  if (screenShake < 0.3) screenShake = 0;

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    return p.life > 0;
  });
  particles2 = particles2.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--;
    return p.life > 0;
  });

  // Clear just-pressed
  for (let k in justPressed) delete justPressed[k];

  // Update HUD
  document.getElementById('score').textContent = 'Rings: ' + game.rings;
  document.getElementById('lives').textContent = 'Lives: ' + game.lives;
  document.getElementById('time').textContent = 'Time: ' + Math.floor(game.time / 60);
}

function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function draw() {
  // Apply screen shake
  ctx.save();
  if (screenShake > 0) {
    ctx.translate((Math.random() - 0.5) * screenShake * 2, (Math.random() - 0.5) * screenShake * 2);
  }

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(0.5, '#1a2a4a');
  grad.addColorStop(1, '#0f1f3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Parallax background hills
  drawHills(camera.x * 0.2, 350, '#0d2818', 80);
  drawHills(camera.x * 0.4, 400, '#0f3320', 60);
  drawHills(camera.x * 0.6, 430, '#143d28', 40);

  ctx.save();
  ctx.translate(-camera.x, 0);

  // Draw platforms
  platforms.forEach(p => {
    if (p.type === 'ground') {
      ctx.fillStyle = '#2d8a4e';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#3cb371';
      ctx.fillRect(p.x, p.y, p.w, 8);
      ctx.fillStyle = '#1e6b3a';
      for (let i = 0; i < p.w; i += 32) {
        ctx.fillRect(p.x + i, p.y + 16, 16, 16);
        ctx.fillRect(p.x + i + 16, p.y + 32, 16, 16);
      }
    } else if (p.type === 'float') {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#A0522D';
      ctx.fillRect(p.x, p.y, p.w, 6);
      ctx.fillStyle = '#CD853F';
      ctx.fillRect(p.x + 2, p.y + 2, p.w - 4, 2);
    }
  });

  // Draw spikes
  spikes.forEach(s => {
    ctx.fillStyle = '#c0c0c0';
    const spikes_count = Math.floor(s.w / 12);
    for (let i = 0; i < spikes_count; i++) {
      const sx = s.x + i * 12;
      ctx.beginPath();
      ctx.moveTo(sx, s.y + s.h);
      ctx.lineTo(sx + 6, s.y);
      ctx.lineTo(sx + 12, s.y + s.h);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = '#a0a0a0';
    for (let i = 0; i < spikes_count; i++) {
      const sx = s.x + i * 12;
      ctx.beginPath();
      ctx.moveTo(sx + 2, s.y + s.h);
      ctx.lineTo(sx + 6, s.y + 4);
      ctx.lineTo(sx + 10, s.y + s.h);
      ctx.closePath();
      ctx.fill();
    }
  });

  // Draw springs
  springs.forEach(s => {
    const compress = s.compressed;
    ctx.fillStyle = '#333';
    ctx.fillRect(s.x, s.y + s.h - 6, s.w, 6);
    ctx.fillStyle = '#22d3ee';
    ctx.fillRect(s.x + 4, s.y - compress, s.w - 8, 8);
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(s.x, s.y - compress - 4, s.w, 4);
    if (compress > 3) {
      ctx.fillStyle = 'rgba(34,211,238,0.3)';
      ctx.fillRect(s.x - 4, s.y - compress - 8, s.w + 8, compress + 12);
    }
  });

  // Draw rings
  rings.forEach(r => {
    if (r.collected) return;
    r.anim += 0.08;
    const scale = 0.7 + Math.sin(r.anim) * 0.3;
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.scale(scale, 1);
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, r.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = '#fde68a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, r.r - 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath();
    ctx.arc(-3, -3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Draw enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    if (e.plane === 1) {
      // Yellow flying enemy with wings
      const ex = e.x + e.w/2;
      const ey = e.y + e.h/2;
      const wingFlap = Math.sin(game.time * 0.15) * 6;
      // Wings
      ctx.fillStyle = '#a3e635';
      ctx.beginPath();
      ctx.moveTo(ex - 4, ey - 2);
      ctx.lineTo(ex - 22, ey - 10 + wingFlap);
      ctx.lineTo(ex - 18, ey + 4);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ex + 4, ey - 2);
      ctx.lineTo(ex + 22, ey - 10 + wingFlap);
      ctx.lineTo(ex + 18, ey + 4);
      ctx.closePath();
      ctx.fill();
      // Body (yellow)
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.ellipse(ex, ey + 2, e.w/2, e.h/2 - 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex + e.dir * 4, ey - 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(ex + e.dir * 6, ey - 2, 2.5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Ground enemy (red)
      ctx.fillStyle = '#dc2626';
      ctx.beginPath();
      ctx.ellipse(e.x + e.w/2, e.y + e.h/2 + 2, e.w/2, e.h/2 - 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(e.x + e.w/2 + e.dir * 4, e.y + 8, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(e.x + e.w/2 + e.dir * 6, e.y + 8, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#333';
      const wheelY = e.y + e.h - 4;
      ctx.beginPath();
      ctx.arc(e.x + 8, wheelY, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.x + e.w - 8, wheelY, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      const rot = e.anim * 3;
      for (let i = 0; i < 3; i++) {
        const a = rot + (i * Math.PI * 2 / 3);
        ctx.beginPath();
        ctx.moveTo(e.x + 8, wheelY);
        ctx.lineTo(e.x + 8 + Math.cos(a) * 5, wheelY + Math.sin(a) * 5);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.x + e.w - 8, wheelY);
        ctx.lineTo(e.x + e.w - 8 + Math.cos(a) * 5, wheelY + Math.sin(a) * 5);
        ctx.stroke();
      }
    }
  });

  // Draw goal — giant spinning ring
  if (goal) {
    const cx = goal.x + goal.w / 2;
    const cy = goal.y + goal.h / 2;
    const outerR = 45;
    const innerR = 30;
    const spin = game.time * 0.05;

    // Outer glow
    ctx.save();
    ctx.shadowColor = '#22d3ee';
    ctx.shadowBlur = 25;

    // Outer ring
    ctx.strokeStyle = '#22d3ee';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, spin, spin + Math.PI * 1.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, spin + Math.PI, spin + Math.PI * 2.6);
    ctx.stroke();

    // Inner ring
    ctx.strokeStyle = '#a3e635';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, -spin * 1.3, -spin * 1.3 + Math.PI * 1.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, -spin * 1.3 + Math.PI, -spin * 1.3 + Math.PI * 2.4);
    ctx.stroke();

    // Center sparkle
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.5 + Math.sin(game.time * 0.1) * 0.3;
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Draw speed trail
  player.speedTrail.forEach((t, i) => {
    ctx.globalAlpha = t.life / 8 * 0.4;
    ctx.fillStyle = '#22d3ee';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4 + (8 - t.life) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw player
  drawPlayer();

  // Draw particles
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 20);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
  particles2.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 15);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.restore(); // restore camera translate
  ctx.restore(); // restore screen shake
}

function drawHills(baseX, baseY, color, amplitude) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 4) {
    const worldX = x + baseX;
    const y = baseY + Math.sin(worldX * 0.003) * amplitude * 0.5 + Math.sin(worldX * 0.007) * amplitude * 0.3;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();
}

// Genesis palette
const PAL = {
  K: '#000000', // black outline
  B: '#0050D0', // blue body (Sonic blue)
  b: '#0030A0', // dark blue (spikes/shadow)
  S: '#F0C8A0', // skin/peach (belly, face)
  W: '#FFFFFF', // white (eyes, shoe stripe)
  R: '#E00000', // red (shoes)
  Y: '#F0E000', // yellow (shoe buckle)
  G: '#00C000', // green (grass/stomp effect)
  E: '#000000', // transparent/empty
};

// Draw a pixel grid sprite at (x,y) with given pixel size
function drawSprite(data, x, y, px) {
  for (let row = 0; row < data.length; row++) {
    for (let col = 0; col < data[row].length; col++) {
      const c = data[row][col];
      if (c === ' ' || c === '.' || c === 'E') continue;
      ctx.fillStyle = PAL[c] || '#ff00ff';
      ctx.fillRect(x + col * px, y + row * px, px, px);
    }
  }
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;
  const blink = player.invincible > 0 && Math.floor(player.invincible / 3) % 2 === 0;
  if (blink) return;

  ctx.save();
  ctx.translate(px + player.w/2, py + player.h/2);
  if (player.facing < 0) ctx.scale(-1, 1);

  // Choose frame based on state
  let frame;
  if (player.spinning) {
    frame = SONIC_SPIN;
  } else if (!player.grounded) {
    frame = SONIC_JUMP;
  } else {
    const speed = Math.abs(player.vx);
    if (speed > 3.5) {
      frame = SONIC_RUN;
    } else if (speed > 0.5) {
      // Walk cycle: alternate between walk1 and walk2
      frame = (Math.floor(player.animTimer / 4) % 2 === 0) ? SONIC_WALK1 : SONIC_WALK2;
    } else {
      frame = SONIC_IDLE;
    }
  }

  // Draw sprite (20 cols x 20 rows, 2px per tile = 40x40)
  const offsetX = -10; // center the 20-col sprite
  const offsetY = -2;  // align sprite bottom with hitbox bottom (feet)
  drawSprite(frame, offsetX, offsetY, 2);

  ctx.restore();
}

let lastTime = 0;
let accumulator = 0;
const FIXED_DT = 1000 / 60;
const TIME_SCALE = 0.5; // Half speed — tune this to feel right

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  const delta = (timestamp - lastTime) * TIME_SCALE;
  lastTime = timestamp;
  accumulator += delta;

  // Cap accumulator to prevent spiral of death
  if (accumulator > FIXED_DT * 5) accumulator = FIXED_DT * 5;

  while (accumulator >= FIXED_DT) {
    update();
    accumulator -= FIXED_DT;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

function restart() {
  game = { rings: 0, lives: 3, time: 0, over: false, won: false };
  particles = [];
  particles2 = [];
  screenShake = 0;
  buildLevel();
  resetPlayer();
  document.getElementById('gameOver').style.display = 'none';
}

buildLevel();
requestAnimationFrame(gameLoop);

// Splash screen
const splash = document.getElementById('splash');
let splashDone = false;

function dismissSplash() {
  if (splashDone) return;
  splashDone = true;
  splash.classList.add('fade-out');
  ensureAudio();
  startMusic();
  setTimeout(() => { splash.style.display = 'none'; }, 600);
}
splash.addEventListener('click', dismissSplash);
document.addEventListener('keydown', dismissSplash);

// Start music on first user interaction (browser autoplay policy)
const startAudio = function() {
  ensureAudio();
  startMusic();
  document.removeEventListener('click', startAudio);
  document.removeEventListener('keydown', startAudio);
};
document.addEventListener('click', startAudio);
document.addEventListener('keydown', startAudio);

// Restart button and Enter key
document.getElementById('restartBtn').addEventListener('click', function() {
  document.getElementById('gameOver').style.display = 'none';
  stopMusic();
  restart();
  startMusic();
});
document.addEventListener('keydown', function(e) {
  if (e.code === 'Enter' && game.over) {
    document.getElementById('gameOver').style.display = 'none';
    stopMusic();
    restart();
    startMusic();
  }
});
