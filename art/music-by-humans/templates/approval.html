<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approval Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <h1>Daily Music Links Approval</h1>
  <ul>
    {% for link in candidates %}
      <li>
        <h2>{{ link.title }}</h2>
        <p>Source: {{ link.source }}</p>
        <video width="320" height="240" controls>
          <source src='{{ link.video_url }}' type='video/mp4'>
          Your browser does not support the video tag.
        </video>
        <button onclick="location.href='{{ url_for('approve', link_id=link.id) }}'">Approve</button>
        <button onclick="location.href='{{ url_for('reject', link_id=link.id) }}'">Reject</button>
      </li>
    {% endfor %}
  </ul>
</body>
</html>
