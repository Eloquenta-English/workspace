<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nimble — Logo Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #e0f2fe; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 48px; }
h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 800; color: #f59e0b; letter-spacing: 2px; }
.section { text-align: center; }
.section h2 { font-size: .75rem; font-weight: 700; color: #4a6080; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 24px; }
.row { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; }
.card { background: #111827; border: 1px solid #1e3a5f; border-radius: 16px; padding: 40px 48px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
.card p { font-size: .75rem; color: #94a3b8; }
.logo-small { width: 200px; }
.logo-medium { width: 300px; }
.logo-large { width: 400px; }
.icon-only { width: 60px; height: 60px; }
.color-swatch { width: 60px; height: 60px; border-radius: 12px; border: 1px solid #1e3a5f; }
.dark-bg { background: #0a0e1a; }
.card-bg { background: #111827; }
.accent1 { background: #f59e0b; }
.accent2 { background: #dc2626; }
.text-main { background: #e0f2fe; }
.text-muted { background: #94a3b8; }
.dim { background: #4a6080; }
</style>
</head>

  <h1>Logo Preview</h1>
</div>

<div class="section">

  <div class="row">
    <div class="card">
      <div class="logo-large">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="nimbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Lightning bolt icon (nimbleness, speed, energy) -->
  <g transform="translate(8, 28)">
    <!-- Main bolt -->
    <polygon points="28,0 12,52 26,52 0,110 40,44 24,44" fill="url(#nimGrad)" />
    <!-- Bolt outline glow -->
    <polygon points="28,0 12,52 26,52 0,110 40,44 24,44" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5" />
    <!-- Small spark dots -->
    <circle cx="42" cy="38" r="3" fill="#fbbf24" opacity="0.8" />
    <circle cx="48" cy="30" r="2" fill="#fbbf24" opacity="0.5" />
    <circle cx="38" cy="48" r="2.5" fill="#fbbf24" opacity="0.6" />
  </g>
  
  <!-- Wordmark: NIMBLE -->
  <g transform="translate(80, 30)">
    <!-- N -->
    <text x="0" y="58" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-size="72" font-weight="900" fill="url(#nimGrad)" letter-spacing="2">N</text>
    <!-- rest of word -->
    <text x="58" y="58" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-size="72" font-weight="800" fill="#e0f2fe" letter-spacing="2">IMBLE</text>
  </g>
  
  <!-- Tagline -->
  <g transform="translate(88, 100)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-size="13" font-weight="500" fill="#94a3b8" letter-spacing="3">ENGLISH THAT ADAPTS</text>
  </g>
  
  <!-- Playful underline swoosh -->
  <path d="M88,108 Q200,118 340,106" fill="none" stroke="url(#nimbleGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7" />
</svg>
      </div>
      <p>Large (400x120)</p>
    </div>
  </div>
</div>
