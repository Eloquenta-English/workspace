<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Video Call — Articulate English</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#111827;--bg3:#161e2e;--bg4:#1a2436;
  --border:#2d3748;--border-light:#3d4f68;
  --text:#e8e8e8;--text-muted:#94a3b8;--text-dim:#4a6080;
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);--amber-glow:rgba(245,158,11,.3);
  --green:#34d399;--red-light:#fb7185;--violet:#a78bfa;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;position:relative}
button{font-family:inherit}

.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite;opacity:var(--op)}
@keyframes twinkle{0%,100%{opacity:var(--op)}50%{opacity:.1}}

/* ═══ SETUP SCREEN ═══ */
.setup-screen{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center}
.setup-screen.hidden{display:none}
.setup-box{width:420px;max-width:92vw;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center}
.setup-box h1{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;margin-bottom:8px;letter-spacing:2px}
.setup-box h1 span{color:var(--amber)}
.setup-box .subtitle{font-size:12px;color:var(--text-muted);margin-bottom:24px}

.setup-preview{width:100%;aspect-ratio:16/9;background:var(--bg3);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden;position:relative}
.setup-preview video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.setup-preview .no-video{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12px}

.setup-controls{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.setup-btn{display:flex;align-items:center;gap:8px;height:40px;padding:0 20px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'Orbitron',sans-serif;transition:all .15s}
.setup-icon{width:18px;height:18px;flex-shrink:0}
.setup-btn:hover{border-color:var(--amber);color:var(--amber)}
.setup-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.setup-btn.danger{border-color:var(--red-light);color:var(--red-light)}
.setup-btn.danger:hover{background:rgba(251,113,133,.1)}

/* INVITE SECTION */
.invite-section{margin-top:8px}
.invite-btn{width:100%;height:48px;border-radius:10px;border:1px solid var(--amber);background:var(--amber);color:var(--bg);font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px}
.invite-btn:hover{filter:brightness(1.1);box-shadow:0 0 24px var(--amber-glow)}
.invite-btn svg{width:18px;height:18px}

.link-display{display:none;margin-top:12px}
.link-display.show{display:flex;gap:8px}
.link-input{flex:1;height:40px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--amber);font-size:11px;outline:none;font-family:inherit;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{height:40px;padding:0 16px;border-radius:8px;border:1px solid var(--amber);background:var(--amber-dim);color:var(--amber);font-size:10px;font-weight:700;cursor:pointer;font-family:'Orbitron',sans-serif;white-space:nowrap;transition:all .15s}
.copy-btn:hover{box-shadow:0 0 12px var(--amber-glow)}
.copy-btn.copied{border-color:var(--green);color:var(--green)}

.status-msg{margin-top:10px;font-size:10px;color:var(--text-dim);min-height:16px}

/* ═══ CALL LAYOUT ═══ */
.call-layout{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}
.call-layout[style*="display: none"]{display:none!important}

.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:rgba(13,17,23,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;color:var(--amber);letter-spacing:2px;white-space:nowrap}
.logo span{color:var(--text)}
.room-info{flex:1;text-align:center;font-size:11px;color:var(--text-muted)}
.topbar-btn{height:32px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Orbitron',sans-serif;display:flex;align-items:center;gap:6px}
.topbar-btn:hover{border-color:var(--amber);color:var(--amber)}
.topbar-icon{width:14px;height:14px;flex-shrink:0}

/* ═══ MAIN AREA ═══ */
.main-area{flex:1;display:flex;overflow:hidden}

.video-panel{flex:1;display:flex;flex-direction:column;padding:16px;gap:12px;overflow:hidden}
.video-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0}
.video-box{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.video-box video{width:100%;height:100%;object-fit:cover}
.video-box.local video{transform:scaleX(-1)}
.video-label{position:absolute;bottom:8px;left:8px;padding:4px 10px;border-radius:6px;background:rgba(13,17,23,.7);backdrop-filter:blur(4px);font-size:10px;font-weight:700;color:var(--text-muted);font-family:'Orbitron',sans-serif}
.video-label .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.video-label .status-dot.active{background:var(--green);box-shadow:0 0 6px var(--green)}
.video-label .status-dot.inactive{background:var(--text-dim)}
.video-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-dim)}
.placeholder-icon{width:48px;height:48px;opacity:.3}
.video-placeholder .text{font-size:11px}
.video-box.connecting{border-color:var(--amber)}
.video-box.connected{border-color:var(--green);box-shadow:0 0 20px rgba(52,211,153,.1)}

/* ═══ CONTROLS BAR ═══ */
.controls-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;flex-shrink:0}
.ctrl-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text-muted);cursor:pointer;transition:all .2s;min-width:60px}
.ctrl-btn:hover{border-color:var(--amber);color:var(--amber);box-shadow:0 0 16px var(--amber-dim);transform:translateY(-1px)}
.ctrl-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.ctrl-btn.danger{border-color:var(--red-light);color:var(--red-light)}
.ctrl-btn.danger:hover{background:rgba(251,113,133,.12)}
.ctrl-icon{width:20px;height:20px;flex-shrink:0}
.ctrl-label{font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.call-timer{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:700;color:var(--text-dim);min-width:110px;text-align:center;letter-spacing:2px;line-height:1}
.call-timer.active{color:var(--green)}
.call-timer.warning{color:var(--amber);text-shadow:0 0 12px rgba(245,158,11,.4)}
.call-timer.danger{color:var(--red-light);text-shadow:0 0 20px rgba(251,113,133,.6);animation:timerThrob 1s ease-in-out infinite}
@keyframes timerThrob{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.08)}}

/* ═══ SIDEBAR ═══ */
.sidebar{width:280px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.sidebar-toggle{display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5}
.chat-msg.self{background:var(--amber-dim);border:1px solid rgba(245,158,11,.2);align-self:flex-end;color:var(--text)}
.chat-msg.other{background:var(--bg3);border:1px solid var(--border);align-self:flex-start;color:var(--text-muted)}
.chat-msg .sender{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.chat-msg.self .sender{color:var(--amber)}
.chat-msg.other .sender{color:var(--violet)}
.chat-msg .time{font-size:9px;color:var(--text-dim);margin-top:4px;text-align:right}
.chat-system{text-align:center;font-size:10px;color:var(--text-dim);padding:4px}
.chat-input-area{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;height:36px;padding:0 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none;font-family:inherit}
.chat-input:focus{border-color:var(--amber)}
.chat-send{height:36px;padding:0 14px;border-radius:8px;border:1px solid var(--amber);background:var(--amber);color:var(--bg);font-size:11px;font-weight:700;cursor:pointer;font-family:'Orbitron',sans-serif;transition:all .15s}
.chat-send:hover{filter:brightness(1.1);box-shadow:0 0 12px var(--amber-glow)}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;background:var(--amber);color:var(--bg);font-size:11px;font-weight:700;font-family:'Orbitron',sans-serif;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ═══ RESPONSIVE ═══ */
.chat-toggle-btn{display:none}
@media(max-width:700px){
  .sidebar{position:fixed;right:0;top:0;bottom:0;z-index:40;transform:translateX(100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .sidebar-toggle{display:block}
  .chat-toggle-btn{display:flex}
  .video-grid{grid-template-columns:1fr}
  .video-box.local{position:absolute;bottom:80px;right:16px;width:120px;height:90px;z-index:10;border-radius:8px}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>

<!-- ═══ SETUP SCREEN ═══ -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-box">
    <h1>ARTICULATE <span>ENGLISH</span></h1>
    <p class="subtitle">Video Call — Peer to Peer</p>

    <div class="setup-preview" id="setupPreview">
      <video id="previewVideo" autoplay muted playsinline></video>
      <div class="no-video" id="noVideoMsg">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.4"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <div style="margin-top:8px">Camera off</div>
      </div>
    </div>

    <div class="setup-controls">
      <button class="setup-btn active" id="camBtn" onclick="toggleCamera()">
        <svg class="setup-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Camera
      </button>
      <button class="setup-btn active" id="micBtn" onclick="toggleMic()">
        <svg class="setup-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        Microphone
      </button>
    </div>

    <div class="invite-section">
      <button class="invite-btn" onclick="generateInvite()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Generate Invite Link
      </button>
      <div class="link-display" id="linkDisplay">
        <input type="text" class="link-input" id="linkInput" readonly>
        <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy</button>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>
</div>

<!-- ═══ CALL LAYOUT ═══ -->
<div class="call-layout" id="callLayout" style="display:none">
  <div class="topbar">
    <div class="logo">ARTICULATE <span>ENGLISH</span></div>
    <div class="room-info" id="roomInfo">Connecting...</div>
    <button class="topbar-btn" onclick="copyInvite()">
      <svg class="topbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      Invite
    </button>
    <button class="topbar-btn danger" onclick="leaveCall()">
      <svg class="topbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Leave
    </button>
  </div>

  <div class="main-area">
    <div class="video-panel">
      <div class="video-grid">
        <div class="video-box local" id="localBox">
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="video-label"><span class="status-dot active"></span>You</div>
        </div>
        <div class="video-box" id="remoteBox">
          <div class="video-placeholder" id="remotePlaceholder">
            <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <div class="text">Waiting for peer...</div>
          </div>
          <video id="remoteVideo" autoplay playsinline style="display:none"></video>
          <div class="video-label" id="remoteLabel" style="display:none"><span class="status-dot inactive" id="remoteStatusDot"></span>Peer</div>
        </div>
      </div>

      <div class="controls-bar">
        <button class="ctrl-btn active" id="callMicBtn" onclick="callToggleMic()">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span class="ctrl-label">MIC</span>
        </button>
        <button class="ctrl-btn active" id="callCamBtn" onclick="callToggleCam()">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span class="ctrl-label">CAM</span>
        </button>
        <button class="ctrl-btn" id="screenShareBtn" onclick="toggleScreenShare()">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <span class="ctrl-label">SCREEN</span>
        </button>
        <button class="ctrl-btn chat-toggle-btn" id="chatToggleBtn" onclick="toggleSidebar()">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="ctrl-label">CHAT</span>
        </button>
        <div class="call-timer" id="callTimer">30:00</div>
        <button class="ctrl-btn danger" onclick="leaveCall()">
          <svg class="ctrl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/></svg>
          <span class="ctrl-label">END</span>
        </button>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Chat</div>
        <button class="sidebar-toggle" onclick="toggleSidebar()">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ═══ STARS ═══
function initStars(){
  var el=document.getElementById('stars');
  for(var i=0;i<60;i++){
    var s=document.createElement('div');s.className='star';
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px;--dur:'+(2+Math.random()*4)+'s;--op:'+(0.2+Math.random()*0.5);
    el.appendChild(s);
  }
}
initStars();

// ═══ TOAST ═══
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}

// ═══ STATE ═══
var localStream=null,remoteStream=null;
var roomCode='';
var camOn=true,micOn=true;
var callStartTime=null,timerInterval=null;
var isHost=false;
var peer=null,peerCall=null,peerDataConn=null,peerConnected=false;

// ═══ SETUP ═══
async function getMedia(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    document.getElementById('previewVideo').srcObject=localStream;
    document.getElementById('noVideoMsg').style.display='none';
    return true;
  }catch(e){
    document.getElementById('noVideoMsg').innerHTML='<div>Camera/Mic access denied</div>';
    return false;
  }
}
getMedia();

function toggleCamera(){
  if(!localStream)return;
  camOn=!camOn;
  localStream.getVideoTracks().forEach(function(t){t.enabled=camOn});
  document.getElementById('camBtn').classList.toggle('active',camOn);
  document.getElementById('callCamBtn').classList.toggle('active',camOn);
}
function toggleMic(){
  if(!localStream)return;
  micOn=!micOn;
  localStream.getAudioTracks().forEach(function(t){t.enabled=micOn});
  document.getElementById('micBtn').classList.toggle('active',micOn);
  document.getElementById('callMicBtn').classList.toggle('active',micOn);
}

// ═══ INVITE LINK ═══
function generateInvite(){
  // Generate a random room code
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  roomCode='';
  for(var i=0;i<8;i++) roomCode+=chars[Math.floor(Math.random()*chars.length)];
  var link=getInviteLink();
  document.getElementById('linkInput').value=link;
  document.getElementById('linkDisplay').classList.add('show');
  document.getElementById('statusMsg').textContent='Invite link generated — share it with your student';
  // Auto-join as host
  joinCall();
}
function getInviteLink(){
  var origin=window.location.origin;
  var path=window.location.pathname;
  var basePath=path.split('?')[0];
  if(!basePath.endsWith('/')) basePath=basePath.substring(0,basePath.lastIndexOf('/')+1);
  return origin+basePath+'?room='+roomCode;
}
function copyLink(){
  var input=document.getElementById('linkInput');
  input.select();
  navigator.clipboard.writeText(input.value);
  var btn=document.getElementById('copyBtn');
  btn.textContent='Copied!';
  btn.classList.add('copied');
  setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied')},2000);
}
function copyInvite(){
  var link=getInviteLink();
  navigator.clipboard.writeText(link);
  showToast('Invite link copied!');
}

// ═══ JOIN CALL ═══
function joinCall(){
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('callLayout').style.display='flex';
  document.getElementById('localVideo').srcObject=localStream;
  document.getElementById('roomInfo').textContent='Room: '+roomCode;
  startCall();
}

// ═══ PEERJS SIGNALING ═══
function startCall(){
  addSystemMessage('Connecting to PeerJS...');
  var roomPeerId='articulate-'+roomCode;
  peer=new Peer(roomPeerId,{debug:2,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  peer.on('open',function(id){addSystemMessage('Connected as room host — waiting for peer...');isHost=true;});
  peer.on('call',function(call){addSystemMessage('Incoming call...');peerCall=call;call.answer(localStream);call.on('stream',function(rs){handleRemoteStream(rs);});call.on('close',function(){addSystemMessage('Peer disconnected');resetRemoteVideo();});});
  peer.on('connection',function(conn){addSystemMessage('Data channel connected');peerDataConn=conn;conn.on('data',function(d){if(d.type==='chat')addChatMessage('Peer',d.msg,false);});conn.on('close',function(){peerDataConn=null});});
  peer.on('error',function(err){console.error('Peer error:',err);if(err.type==='unavailable-id'){connectAsSecondPeer();}else{addSystemMessage('Error: '+err.type);}});
}

function connectAsSecondPeer(){
  isHost=false;
  addSystemMessage('Room found — connecting as peer...');
  var myPeerId='articulate-'+roomCode+'-peer-'+Math.random().toString(36).substring(2,8);
  var myPeer=new Peer(myPeerId,{debug:2});
  myPeer.on('open',function(){
    addSystemMessage('Connected — calling room host...');
    var call=myPeer.call('articulate-'+roomCode,localStream);
    call.on('stream',function(remoteStream){handleRemoteStream(remoteStream);});
    call.on('close',function(){addSystemMessage('Peer disconnected');resetRemoteVideo();});
    peerCall=call;
    var conn=myPeer.connect('articulate-'+roomCode,{reliable:true});
    conn.on('open',function(){
      addSystemMessage('Data channel connected');
      peerDataConn=conn;
      conn.on('data',function(data){if(data.type==='chat')addChatMessage('Peer',data.msg,false);});
      conn.on('close',function(){peerDataConn=null});
    });
  });
  myPeer.on('error',function(err){
    console.error('Peer error:',err);
    addSystemMessage('Connection error: '+err.type);
  });
}

function handleRemoteStream(stream){
  remoteStream=stream;
  document.getElementById('remoteVideo').srcObject=remoteStream;
  document.getElementById('remoteVideo').style.display='block';
  document.getElementById('remotePlaceholder').style.display='none';
  document.getElementById('remoteLabel').style.display='block';
  document.getElementById('remoteStatusDot').classList.add('active');
  document.getElementById('remoteStatusDot').classList.remove('inactive');
  document.getElementById('remoteBox').classList.add('connected');
  peerConnected=true;
  startTimer();
  addSystemMessage('Peer connected!');
}
function resetRemoteVideo(){
  document.getElementById('remoteVideo').srcObject=null;
  document.getElementById('remoteVideo').style.display='none';
  document.getElementById('remotePlaceholder').style.display='flex';
  document.getElementById('remoteLabel').style.display='none';
  document.getElementById('remoteBox').classList.remove('connected');
  peerConnected=false;
  stopTimer();
}

// ═══ CALL CONTROLS ═══
function callToggleMic(){
  micOn=!micOn;
  if(localStream) localStream.getAudioTracks().forEach(function(t){t.enabled=micOn});
  document.getElementById('callMicBtn').classList.toggle('active',micOn);
  document.getElementById('micBtn').classList.toggle('active',micOn);
}
function callToggleCam(){
  camOn=!camOn;
  if(localStream) localStream.getVideoTracks().forEach(function(t){t.enabled=camOn});
  document.getElementById('callCamBtn').classList.toggle('active',camOn);
  document.getElementById('camBtn').classList.toggle('active',camOn);
}
async function toggleScreenShare(){
  try{
    var screenStream=await navigator.mediaDevices.getDisplayMedia({video:true});
    var screenTrack=screenStream.getVideoTracks()[0];
    if(peerCall&&peerCall.peerConnection){
      var sender=peerCall.peerConnection.getSenders().find(function(s){return s.track&&s.track.kind==='video'});
      if(sender) sender.replaceTrack(screenTrack);
    }
    document.getElementById('localVideo').srcObject=screenStream;
    document.getElementById('screenShareBtn').classList.add('active');
    screenTrack.onended=function(){
      if(localStream){
        if(peerCall&&peerCall.peerConnection){
          var camTrack=localStream.getVideoTracks()[0];
          var sender2=peerCall.peerConnection.getSenders().find(function(s){return s.track&&s.track.kind==='video'});
          if(sender2) sender2.replaceTrack(camTrack);
        }
        document.getElementById('localVideo').srcObject=localStream;
        document.getElementById('screenShareBtn').classList.remove('active');
      }
    };
  }catch(e){console.error('Screen share error:',e)}
}

function leaveCall(){
  if(peerCall) peerCall.close();
  if(peer) peer.destroy();
  if(localStream) localStream.getTracks().forEach(function(t){t.stop()});
  peerConnected=false;isHost=false;peerCall=null;peer=null;peerDataConn=null;
  stopTimer();
  document.getElementById('setupScreen').classList.remove('hidden');
  document.getElementById('callLayout').style.display='none';
  document.getElementById('remoteVideo').srcObject=null;
  document.getElementById('remoteVideo').style.display='none';
  document.getElementById('remotePlaceholder').style.display='flex';
  document.getElementById('remoteLabel').style.display='none';
  document.getElementById('remoteBox').classList.remove('connected');
  document.getElementById('chatMessages').innerHTML='';
  document.getElementById('linkDisplay').classList.remove('show');
  document.getElementById('statusMsg').textContent='';
  localStream=null;remoteStream=null;
  getMedia();
}

// ═══ TIMER ═══
var SESSION_DURATION=30*60;
var sessionEndTime=null;
function startTimer(){
  callStartTime=Date.now();
  sessionEndTime=callStartTime+SESSION_DURATION*1000;
  document.getElementById('callTimer').classList.add('active');
  document.getElementById('callTimer').classList.remove('warning','danger');
  timerInterval=setInterval(updateTimer,1000);
  updateTimer();
}
function updateTimer(){
  var now=Date.now();
  var remaining=Math.max(0,Math.floor((sessionEndTime-now)/1000));
  var m=Math.floor(remaining/60);var s=remaining%60;
  var timerEl=document.getElementById('callTimer');
  timerEl.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  timerEl.classList.remove('warning','danger');
  if(remaining<=120&&remaining>0){timerEl.classList.add('danger')}
  else if(remaining<=300&&remaining>0){timerEl.classList.add('warning')}
  if(remaining<=0){clearInterval(timerInterval);timerEl.textContent='00:00'}
}
function stopTimer(){
  clearInterval(timerInterval);
  document.getElementById('callTimer').textContent='30:00';
  document.getElementById('callTimer').classList.remove('active','warning','danger');
}

// ═══ CHAT ═══
function sendChat(){
  var input=document.getElementById('chatInput');
  var msg=input.value.trim();
  if(!msg)return;
  addChatMessage('You',msg,true);
  input.value='';
  if(peerDataConn&&peerDataConn.open){peerDataConn.send({type:'chat',msg:msg})}
}
function addChatMessage(sender,msg,self){
  var div=document.createElement('div');
  div.className='chat-msg '+(self?'self':'other');
  var senderDiv=document.createElement('div');senderDiv.className='sender';senderDiv.textContent=sender;
  var textDiv=document.createElement('div');textDiv.className='text';textDiv.textContent=msg;
  var timeDiv=document.createElement('div');timeDiv.className='time';timeDiv.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  div.appendChild(senderDiv);div.appendChild(textDiv);div.appendChild(timeDiv);
  var msgs=document.getElementById('chatMessages');
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function addSystemMessage(msg){
  var div=document.createElement('div');div.className='chat-system';div.textContent=msg;
  var msgs=document.getElementById('chatMessages');
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}

// ═══ AUTO-JOIN FROM URL ═══
(function(){
  var room='';
  var params=new URLSearchParams(window.location.search);
  room=params.get('room');
  if(!room){
    var path=window.location.pathname.replace(/^\/+/,'');
    if(path&&path!=='index.html'&&path.length>=4){room=path.toUpperCase()}
  }
  if(room){
    room=room.toUpperCase().replace(/[^A-Z0-9]/g,'');
    roomCode=room;
    var checkMedia=setInterval(function(){
      if(localStream){clearInterval(checkMedia);joinCall()}
    },500);
    setTimeout(function(){clearInterval(checkMedia)},10000);
  }
})();
</script>
