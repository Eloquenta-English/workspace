<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Advice — Speaking Lesson | William Thomason English</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow-x:hidden;min-height:100vh;height:auto}
.slide{display:none;width:100vw;min-height:100vh;height:auto;position:relative;flex-direction:column;justify-content:center;align-items:center}
.slide.active{display:flex}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.3) saturate(1.15)}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.25) 40%,rgba(0,0,0,.55) 100%)}
.slide-content{position:relative;z-index:2;max-width:820px;padding:40px;text-align:center;max-height:calc(100vh - 120px);overflow-y:auto}
.slide-number{position:absolute;top:24px;left:28px;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase}
.slide-category{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(251,191,36,.15);color:#fbbf24;margin-bottom:20px;border:1px solid rgba(251,191,36,.25)}
.slide h1{font-size:3.2rem;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:8px}
.slide h2{font-size:1.5rem;font-weight:600;line-height:1.4;margin-bottom:16px;color:rgba(255,255,255,.9)}
.slide p{font-size:1.1rem;color:rgba(255,255,255,.6);line-height:1.7;max-width:600px;margin:0 auto}
.vocab-word{border-bottom:2px dotted rgba(251,191,36,.5);cursor:help;color:#fbbf24;font-weight:600;position:relative;transition:border-color .2s}
.vocab-word:hover{border-bottom-color:#fbbf24}
.vocab-word .tt{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 14px;min-width:200px;max-width:300px;font-size:13px;font-weight:400;color:#e2e8f0;line-height:1.5;text-align:left;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:100;transition:opacity .25s,visibility .25s;pointer-events:none}
.vocab-word .tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#334155}
.vocab-word .tt strong{display:block;color:#fbbf24;font-weight:700;font-size:14px;margin-bottom:3px}
.vocab-word:hover .tt{visibility:visible;opacity:1}
.nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center}
.nav-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.25)}
.nav-dots{display:flex;gap:6px;align-items:center;padding:0 8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.nav-dot.active{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.5)}
.nav-dot:hover{background:rgba(255,255,255,.5)}
.progress{position:fixed;top:0;left:0;right:0;z-index:60;background:rgba(255,255,255,.06);height:10px}
.progress-bar{height:100%;background:linear-gradient(90deg,#fbbf24,#22d3ee);transition:width .5s ease-out;border-radius:0 5px 5px 0;box-shadow:0 0 14px rgba(251,191,36,.4),0 0 6px rgba(34,211,238,.3)}
.slide-footer{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px}
.logo{color:#fff;font-weight:700;letter-spacing:.5px}
.logo .o{color:#a3e635}
.warmup-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(52,211,153,.12);color:#34d399;margin-bottom:16px;border:1px solid rgba(52,211,153,.25)}
.hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:20px;font-style:italic}
.question-list{text-align:left;max-width:650px;margin:0 auto}
.question-list li{color:rgba(255,255,255,.7);font-size:1.05rem;line-height:1.8;margin-bottom:10px;list-style:decimal}
.question-list li .vocab-word{font-size:1.05rem}
@media(max-width:640px){
  .slide h1{font-size:2rem}
  .slide h2{font-size:1.15rem}
  .slide p{font-size:.95rem}
  .slide-content{padding:24px}
}
</style>
</head>
<body>
<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div id="slides-container"></div>
<div class="nav">
  <button class="nav-btn" onclick="prevSlide()">&#9664;</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn" onclick="nextSlide()">&#9654;</button>
</div>
<script>
var SLIDES = [

  {
    bg:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1920&q=80",
    category:"Speaking Lesson",
    title:"Advice",
    subtitle:"",
    text:"A 30-minute speaking lesson about giving and receiving advice. For B1/B2 learners.",
    isTitle:true
  },

  {
    bg:"https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1920&q=80",
    category:"Warm-up",
    title:"Who do you rely on the most for advice?",
    subtitle:"",
    text:"",
    isWarmup:true
  },

  {
    bg:"https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1920&q=80",
    category:"Asking for Advice",
    title:"How do you usually go about getting guidance?",
    subtitle:"",
    text:"What sort of <span class='vocab-word'>advice<span class='tt'><strong>advice</strong><br>An opinion or recommendation about what someone should do. Uncountable noun — we say \"some advice\" not \"an advice\".</span></span> do you typically <span class='vocab-word'>seek<span class='tt'><strong>seek</strong><br>To look for or try to find something. Formal register — \"seek advice\" is more formal than \"ask for advice\".</span></span> from others? Do you <span class='vocab-word'>turn to<span class='tt'><strong>turn to</strong><br>To ask someone for help or support when you have a problem. Implies the person is someone you trust.</span></span> certain people first, or does it depend on the situation?",
    vocab:[{word:"advice",def:"An opinion or recommendation about what someone should do. Uncountable — say \"some advice\" not \"an advice\"."},{word:"seek",def:"To look for or try to find something. Formal register."},{word:"turn to",def:"To ask someone for help or support."}],
    questions:["Who do you rely on the most for advice?","What sort of advice do you usually seek from others?","Are there certain topics that you feel uncomfortable asking for advice on?","Do you ever search online for advice rather than asking someone?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1552664730-d307ca884978?w=1920&q=80",
    category:"Opinions & Preferences",
    title:"Do you generally value other people's counsel?",
    subtitle:"",
    text:"Do you <span class='vocab-word'>value<span class='tt'><strong>value</strong><br>To think something is important or useful. \"I value your opinion\" = I think your opinion matters.</span></span> other people's <span class='vocab-word'>counsel<span class='tt'><strong>counsel</strong><br>Advice, especially from a professional or someone experienced. More formal than \"advice\".</span></span>, or do you tend to <span class='vocab-word'>prefer<span class='tt'><strong>prefer</strong><br>To like one thing more than another. \"I prefer to work alone\" = I like working alone more.</span></span> to <span class='vocab-word'>work things out<span class='tt'><strong>work things out</strong><br>To solve a problem or understand something by thinking about it yourself.</span></span> for yourself?",
    vocab:[{word:"value",def:"To think something is important or useful."},{word:"counsel",def:"Advice, especially from a professional. Formal."},{word:"prefer",def:"To like one thing more than another."},{word:"work things out",def:"To solve a problem by thinking about it yourself."}],
    questions:["Do you generally value other people's advice or do you tend to prefer to work things out for yourself?","Whose opinion matters most to you when making a big decision?","Have you ever ignored someone's advice and regretted it?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?w=1920&q=80",
    category:"Giving Advice",
    title:"What do you mostly advise your friends on?",
    subtitle:"",
    text:"What do you <span class='vocab-word'>mostly<span class='tt'><strong>mostly</strong><br>For the most part; usually. \"I mostly eat at home\" = I usually eat at home.</span></span> <span class='vocab-word'>advise<span class='tt'><strong>advise</strong><br>To tell someone what you think they should do. Verb form of \"advice\". \"I advise you to start early.\"</span></span> your friends on? Do you think you <span class='vocab-word'>give good advice<span class='tt'><strong>give good advice</strong><br>To offer helpful suggestions. Note: \"advice\" is uncountable — say \"good advice\" not \"a good advice\".</span></span>?",
    vocab:[{word:"mostly",def:"For the most part; usually."},{word:"advise",def:"To tell someone what you think they should do. Verb form of advice."},{word:"give good advice",def:"To offer helpful suggestions. Advice is uncountable."}],
    questions:["What do you mostly advise your friends on?","Do you think you give good advice?","How do you react when someone doesn't follow your advice?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1521791136064-7986c2920216?w=1920&q=80",
    category:"Being Proactive",
    title:"Are you proactive in offering guidance?",
    subtitle:"",
    text:"Are you <span class='vocab-word'>proactive<span class='tt'><strong>proactive</strong><br>Taking action before a problem happens, rather than waiting. A very common word in business English.</span></span> in <span class='vocab-word'>offering<span class='tt'><strong>offer</strong><br>To say you are willing to help or give something. \"Can I offer you some advice?\"</span></span> guidance, or do you mostly <span class='vocab-word'>wait until<span class='tt'><strong>wait until</strong><br>To delay doing something until a particular time or event.</span></span> you're <span class='vocab-word'>asked<span class='tt'><strong>ask</strong><br>To request information or help. \"She asked me for directions.\"</span></span>?",
    vocab:[{word:"proactive",def:"Taking action before a problem happens. Common in business English."},{word:"offer",def:"To say you are willing to help or give something."},{word:"wait until",def:"To delay until a particular time."},{word:"ask",def:"To request information or help."}],
    questions:["Are you proactive in offering advice or do you mostly wait until you're asked?","Is it better to offer help or wait for people to ask?","Have you ever given unsolicited advice that was well received?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1501139083538-0139583c060f?w=1920&q=80",
    category:"Scenario Practice",
    title:"What would you say to someone who is always late?",
    subtitle:"",
    text:"Imagine a colleague who is <span class='vocab-word'>consistently<span class='tt'><strong>consistently</strong><br>Happening in the same way over time. \"He is consistently late\" = He is always late, without exception.</span></span> late to meetings. How would you <span class='vocab-word'>approach<span class='tt'><strong>approach</strong><br>To begin to deal with or talk about a situation. \"I need to approach him about this\" = I need to talk to him.</span></span> the topic? What <span class='vocab-word'>phrasing<span class='tt'><strong>phrasing</strong><br>The particular words you choose to express something. \"That's a polite phrasing\" = Those are polite words.</span></span> would you use?",
    vocab:[{word:"consistently",def:"Happening in the same way over time."},{word:"approach",def:"To begin to deal with or talk about a situation."},{word:"phrasing",def:"The particular words you choose to express something."}],
    questions:["What advice would you give someone who is always late?","How do you tell someone they need to be more punctual without being rude?","Would you speak to them privately or in front of others?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=1920&q=80",
    category:"Scenario Practice",
    title:"What would you say to someone who cannot save money?",
    subtitle:"",
    text:"A friend tells you they spend everything they earn and have <span class='vocab-word'>nothing left over<span class='tt'><strong>nothing left over</strong><br>No money remaining after all expenses are paid.</span></span> at the end of each month. What <span class='vocab-word'>practical<span class='tt'><strong>practical</strong><br>Real and useful, not just theoretical. \"Let me give you some practical tips.\"</span></span> <span class='vocab-word'>suggestions<span class='tt'><strong>suggestion</strong><br>An idea or plan that someone puts forward for consideration. Countable — \"a suggestion\" or \"some suggestions\".</span></span> could you offer?",
    vocab:[{word:"nothing left over",def:"No money remaining after expenses."},{word:"practical",def:"Real and useful, not just theoretical."},{word:"suggestion",def:"An idea put forward for consideration. Countable."}],
    questions:["What advice would you give someone who can't save money well?","What practical tips would help someone manage their finances better?","How do you bring up money problems with a friend without offending them?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=1920&q=80",
    category:"Scenario Practice",
    title:"What would you say to someone whose relationship has just ended?",
    subtitle:"",
    text:"A close friend calls you after a <span class='vocab-word'>breakup<span class='tt'><strong>breakup</strong><br>The end of a romantic relationship. Informal — \"They broke up last week.\"</span></span>. They are feeling <span class='vocab-word'>devastated<span class='tt'><strong>devastated</strong><br>Extremely upset or shocked. Stronger than \"sad\" — \"I was devastated when I heard the news.\"</span></span>. What words of <span class='vocab-word'>comfort<span class='tt'><strong>comfort</strong><br>Words or actions that make someone feel less worried or sad. \"I tried to comfort her.\"</span></span> would you offer?",
    vocab:[{word:"breakup",def:"The end of a romantic relationship. Informal."},{word:"devastated",def:"Extremely upset or shocked. Stronger than sad."},{word:"comfort",def:"Words or actions that make someone feel less worried."}],
    questions:["What advice would you give someone whose relationship has just broken up?","How do you comfort someone who is going through a difficult time?","Is it better to listen or to offer solutions when a friend is upset?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=1920&q=80",
    category:"Scenario Practice",
    title:"What would you say to someone who is struggling academically?",
    subtitle:"",
    text:"A classmate is <span class='vocab-word'>failing<span class='tt'><strong>failing</strong><br>Not passing exams or courses. \"I'm failing maths\" = I am not doing well enough to pass.</span></span> their exams and feels <span class='vocab-word'>overwhelmed<span class='tt'><strong>overwhelmed</strong><br>Feeling like a situation is too much to handle. \"I have so much work — I feel overwhelmed.\"</span></span>. How would you <span class='vocab-word'>encourage<span class='tt'><strong>encourage</strong><br>To tell someone they can do something, or to give them confidence. \"She encouraged me to keep trying.\"</span></span> them?",
    vocab:[{word:"failing",def:"Not passing exams or courses."},{word:"overwhelmed",def:"Feeling like a situation is too much to handle."},{word:"encourage",def:"To give someone confidence or tell them they can do something."}],
    questions:["What advice would you give someone who is failing in their studies?","How do you encourage someone who has lost motivation?","What study strategies would you recommend to a struggling student?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1541781774459-bb2af2f05b55?w=1920&q=80",
    category:"Scenario Practice",
    title:"What would you say to someone who cannot sleep well?",
    subtitle:"",
    text:"A friend mentions they have been <span class='vocab-word'>tossing and turning<span class='tt'><strong>tossing and turning</strong><br>Moving restlessly in bed because you cannot sleep. Idiomatic expression.</span></span> every night. They feel <span class='vocab-word'>exhausted<span class='tt'><strong>exhausted</strong><br>Extremely tired, with no energy left. Stronger than \"tired\".</span></span> during the day. What <span class='vocab-word'>remedies<span class='tt'><strong>remedy</strong><br>A solution or treatment for a problem. \"Do you have a remedy for insomnia?\"</span></span> or <span class='vocab-word'>habits<span class='tt'><strong>habit</strong><br>Something you do regularly, often without thinking. \"I have a habit of checking my phone before bed.\"</span></span> would you recommend?",
    vocab:[{word:"tossing and turning",def:"Moving restlessly in bed because you cannot sleep."},{word:"exhausted",def:"Extremely tired, with no energy left."},{word:"remedy",def:"A solution or treatment for a problem."},{word:"habit",def:"Something you do regularly."}],
    questions:["What advice would you give someone who can't sleep well at night?","What habits help you get a good night's sleep?","Have you ever tried any natural remedies for insomnia?"]
  },

  {
    bg:"https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?w=1920&q=80",
    category:"Wrap-up",
    title:"Well done!",
    subtitle:"Advice — Speaking Lesson",
    text:"Practice these questions with a partner. Try to speak for at least 2 minutes on each topic. Use the vocabulary words in your answers!",
    isEnd:true
  }
];

var current = 0;

function renderSlides() {
  var container = document.getElementById('slides-container');
  var dots = document.getElementById('navDots');
  var html = '';
  var dotsHtml = '';

  SLIDES.forEach(function(s, i) {
    html += '<div class="slide' + (i === 0 ? ' active' : '') + '" id="slide-' + i + '">' +
      '<div class="slide-bg" style="background-image:url(' + s.bg + ')"></div>' +
      '<span class="slide-number">' + (i + 1) + ' / ' + SLIDES.length + '</span>' +
      '<div class="slide-content">';

    if (s.isTitle) {
      html += '<span class="slide-category">' + s.category + '</span>';
      html += '<h1>' + s.title + '</h1>';
      html += '<p>' + s.text + '</p>';
    } else if (s.isWarmup) {
      html += '<span class="warmup-badge">&#128293; Warm-up</span>';
      html += '<h2>' + s.title + '</h2>';
      if (s.subtitle) html += '<p style="color:rgba(255,255,255,.7);font-size:1.05rem">' + s.subtitle + '</p>';
    } else if (s.isEnd) {
      html += '<span class="slide-category">' + s.category + '</span>';
      html += '<h1>' + s.title + '</h1>';
      html += '<h2>' + s.subtitle + '</h2>';
      html += '<p>' + s.text + '</p>';
    } else {
      html += '<span class="slide-category">' + s.category + '</span>';
      html += '<h2>' + s.title + '</h2>';
      if (s.subtitle) html += '<p style="color:rgba(255,255,255,.7);font-size:.95rem;margin-bottom:12px">' + s.subtitle + '</p>';
      html += '<p>' + s.text + '</p>';
      if (s.questions) {
        html += '<div class="question-list"><ol>';
        s.questions.forEach(function(q) {
          html += '<li>' + q + '</li>';
        });
        html += '</ol></div>';
      }
    }

    html += '</div>';
    html += '<div class="slide-footer"> <span class="logo">William Thomason <span class="o">English</span></span> Speaking Lesson — Advice</div>';
    html += '</div>';

    dotsHtml += '<div class="nav-dot' + (i === 0 ? ' active' : '') + '" onclick="goTo(' + i + ')"></div>';
  });

  container.innerHTML = html;
  dots.innerHTML = dotsHtml;
}

function showSlide(n) {
  if (n < 0 || n >= SLIDES.length) return;
  document.querySelectorAll('.slide').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-dot').forEach(function(d){ d.classList.remove('active'); });
  document.getElementById('slide-' + n).classList.add('active');
  document.querySelectorAll('.nav-dot')[n].classList.add('active');
  current = n;
  document.getElementById('progressBar').style.width = (((current + 1) / SLIDES.length) * 100) + '%';
}

function nextSlide() { showSlide(current + 1); }
function prevSlide() { showSlide(current - 1); }
function goTo(n) { showSlide(n); }

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});

var touchStartX = 0;
document.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', function(e) {
  var diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) { diff > 0 ? nextSlide() : prevSlide(); }
});

renderSlides();
</script>
