<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>English Conversation Questions — Speaking Lesson | William Thomason English</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Blogger+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1c1c1c;--bg2:#161616;--bg3:#222222;
  --bg-card:#232323;--border:#333333;--border-light:#444444;
  --text:#e8e8e8;--text-muted:#999999;--text-dim:#666666;
  --accent:#a3e635;--accent-rgb:163,230,53;
  --bg-rgb:28,28,28;
  --amber:#fbbf24;--green:#34d399;--violet:#a78bfa;--rose:#fb7185;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Blogger Sans','Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;height:auto}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(var(--bg-rgb),.92);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 20px;gap:16px;backdrop-filter:blur(16px)}
.top-spacer{height:52px}
.logo-link{display:inline-flex;align-items:center;gap:8px;text-decoration:none;transition:opacity .2s}
.logo-link:hover{opacity:.8}
.logo-txt{font-size:18px;font-weight:700;letter-spacing:-.3px;color:#f1f5f9}
.logo-txt .accent{color:var(--accent)}
.tagline{font-size:11px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;border-left:1px solid var(--border);padding-left:14px}
.nav-links{margin-left:auto;display:flex;gap:4px}
.nav-link{color:var(--text-muted);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:8px;transition:all .15s}
.nav-link:hover{color:var(--text);background:var(--bg3)}
.progress{position:fixed;top:52px;left:0;right:0;z-index:60;background:rgba(255,255,255,.04);height:5px}
.progress-fill{height:100%;background:linear-gradient(90deg,#fcbe6a,#a3e635);transition:width .5s ease-out;border-radius:0 3px 3px 0;box-shadow:0 0 10px rgba(163,230,53,.3)}
.slide{display:none;width:100%;position:relative}
.slide.active{display:block}
.slide-bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center top;filter:brightness(.18) saturate(1.3);transition:background-image .8s ease}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(var(--bg-rgb),.97) 0,rgba(var(--bg-rgb),.15) 35%,rgba(var(--bg-rgb),.4) 65%,rgba(var(--bg-rgb),.97) 100%)}
@keyframes kenburns{0%{transform:scale(1) translateY(0)}100%{transform:scale(1.25) translateY(-8%)}}
.slide-bg.ken{animation:kenburns 25s ease-in-out infinite alternate}
.slide-inner{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0px 60px 140px}
.slide-count{position:fixed;top:72px;left:28px;font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;z-index:5}
.slide-label{display:inline-block;padding:5px 16px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px;border:1px solid}
.slide h1{font-size:clamp(2rem,5vw,3.8rem);font-weight:900;letter-spacing:-1.5px;line-height:1.1;margin-bottom:14px}
.slide h2{font-size:clamp(1.1rem,2.5vw,1.6rem);font-weight:600;line-height:1.4;margin-bottom:20px;color:rgba(255,255,255,.85)}
.slide-intro{font-size:1.05rem;color:var(--text-muted);line-height:1.8;max-width:580px;margin:0 auto 8px}
.vocab-word{border-bottom:2px dotted rgba(var(--accent-rgb),.4);cursor:pointer;color:var(--accent);font-weight:600;position:relative;transition:all .15s}
.vocab-word:hover{border-bottom-color:var(--accent);text-shadow:0 0 12px rgba(var(--accent-rgb),.3)}
.vocab-word.open{border-bottom-style:solid;color:#fff}
.vocab-pop{position:fixed;z-index:200;display:none;pointer-events:auto}
.vocab-pop.show{display:block}
.vocab-pop-inner{background:var(--bg-card);border:1px solid var(--border-light);border-radius:12px;padding:14px 18px;min-width:240px;max-width:320px;box-shadow:0 12px 40px rgba(0,0,0,.6)}
.vocab-pop-word{display:block;color:var(--accent);font-weight:700;font-size:15px;margin-bottom:4px}
.vocab-pop-def{display:block;color:var(--text-muted);font-size:13px;line-height:1.6;font-weight:400}
.vocab-pop-close{position:absolute;top:6px;right:8px;color:var(--text-dim);font-size:16px;cursor:pointer;padding:2px 6px;line-height:1;transition:color .15s}
.vocab-pop-close:hover{color:var(--text)}
.q-list{text-align:left;max-width:660px;margin:24px auto 0;display:flex;flex-direction:column;gap:14px}
.q-item{background:rgba(var(--bg-rgb),.65);border:1px solid var(--border);border-radius:14px;padding:20px 24px;font-size:15px;line-height:1.7;display:flex;align-items:flex-start;gap:14px;transition:border-color .2s,background .2s}
.q-item:hover{border-color:rgba(var(--accent-rgb),.25);background:rgba(var(--bg-rgb),.85)}
.q-num{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:50%;background:rgba(var(--accent-rgb),.1);color:var(--accent);font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.q-text{color:rgba(255,255,255,.85)}
.warmup-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(52,211,153,.1);color:#34d399;margin-bottom:18px;border:1px solid rgba(52,211,153,.2)}
.slide-spacer-top{height:12vh}
.slide-spacer-bottom{height:16vh}
.nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:10px;align-items:center;background:rgba(var(--bg-rgb),.92);backdrop-filter:blur(12px);padding:10px 20px;border-radius:40px;border:1px solid var(--border)}
.nav-btn{width:42px;height:42px;border-radius:50%;background:rgba(var(--bg-rgb),.8);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700}
.nav-btn:hover{background:rgba(var(--accent-rgb),.2);border-color:rgba(var(--accent-rgb),.4);transform:scale(1.08)}
.nav-btn:active{transform:scale(.95)}
.nav-dots{display:flex;gap:6px;align-items:center;padding:0 8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);cursor:pointer;transition:all .2s}
.nav-dot.active{background:var(--accent);box-shadow:0 0 8px rgba(var(--accent-rgb),.5)}
.nav-dot:hover{background:rgba(255,255,255,.4);transform:scale(1.2)}
@media(max-width:640px){
  .slide h1{font-size:1.7rem}
  .slide h2{font-size:1rem}
  .slide-intro{font-size:.9rem}
  .slide-inner{padding:80px 24px 120px}
  .q-item{font-size:13px;padding:14px 16px}
  .nav{bottom:16px;padding:8px 14px}
  .tagline{display:none}
}
</style>
</head>
<body>
<div class="top-bar">
  <a href="#" class="logo-link"><span class="logo-txt">William Thomason <span class="accent">English</span></span></a>
  <span class="tagline">Speaking Lesson</span>
  <div class="nav-links">
    <a href="#" class="nav-link">Home</a>
    <a href="#" class="nav-link">Dashboard</a>
    <a href="#" class="nav-link">All Lessons</a>
  </div>
</div>
<div class="top-spacer"></div>
<div class="progress"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
<div id="slides-container"></div>
<div class="nav">
  <button class="nav-btn" id="btnPrev">&#9668;</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn" id="btnNext">&#9658;</button>
</div>
<div class="vocab-pop" id="vocabPop">
  <div class="vocab-pop-inner">
    <span class="vocab-pop-close" id="vocabPopClose">&times;</span>
    <span class="vocab-pop-word" id="vocabPopWord"></span>
    <span class="vocab-pop-def" id="vocabPopDef"></span>
  </div>
</div>
<script>
var VOCAB={"fluency": "The ability to speak smoothly and easily without hesitation.", "discussion": "A conversation about a topic, where different ideas are shared.", "enjoy": "To take pleasure in something; to like doing something.", "personality": "The combination of characteristics that form a person's character.", "introverted": "More focused on internal thoughts; preferring quiet environments.", "extroverted": "Outgoing and energized by social interaction.", "develop": "To grow or cause something to grow over time.", "routine": "A regular, fixed sequence of actions done as a habit.", "structured": "Organized and planned in a clear way.", "flexible": "Able to change or adapt easily to different conditions.", "ideal": "Perfect or most suitable for a particular purpose.", "culture": "The customs, arts, and social institutions of a group of people.", "advantage": "A condition giving a greater chance of success.", "surprising": "Unexpected; causing a feeling of surprise.", "traditional": "Following a long-established custom or style.", "influenced": "Affected by something; shaped by external factors.", "unusual": "Not common or ordinary; rare or unique.", "ambition": "A strong desire to achieve something, requiring determination.", "technology": "The application of scientific knowledge for practical purposes.", "communication": "Exchanging information or ideas between people.", "compulsory": "Required by law or rule; mandatory.", "communicate": "To share or exchange information, ideas, or feelings."};
var SLIDES=[
  {
    bg:"https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1200&q=80",
    minH:"300vh",
    cat:"Speaking Lesson",
    catB:"background:rgba(163,230,53,.12);color:#a3e635;border-color:rgba(163,230,53,.25)",
    title:"English Conversation",
    subtitle:"Questions for ESL Learners",
    text:"A collection of discussion questions to improve your speaking <span class='vocab-word' data-def='fluency'>fluency</span>. Suitable for A2–B2 level learners.",
    isTitle:true,
  },
  {
    bg:"https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=1200&q=80",
    minH:"300vh",
    cat:"Warm-up",
    catB:"background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.2)",
    title:"Let’s get started",
    subtitle:"",
    text:"",
    isWarmup:true,
    warmupQ:[
      "What's your name and where are you from?",
      "How long have you been studying English?",
      "What do you <span class='vocab-word' data-def='enjoy'>enjoy</span> most about learning a new language?",
      "What do you hope to achieve with your English skills?",
    ],
  },
  {
    bg:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&q=80",
    minH:"400vh",
    cat:"About You",
    catB:"background:rgba(163,230,53,.12);color:#a3e635;border-color:rgba(163,230,53,.25)",
    title:"Tell me about yourself",
    subtitle:"",
    text:"",
    isTitle:false,
    questions:[
      "What do you do for work or study? Describe a typical day.",
      "What are your hobbies? How much free time do you have for them?",
      "Describe your <span class='vocab-word' data-def='personality'>personality</span>. Are you more <span class='vocab-word' data-def='introverted'>introverted</span> or <span class='vocab-word' data-def='extroverted'>extroverted</span>?",
      "What is something you are really good at? How did you <span class='vocab-word' data-def='develop'>develop</span> that skill?",
    ],
  },
  {
    bg:"https://images.unsplash.com/photo-1516961642265-531546e84af2?w=1200&q=80",
    minH:"400vh",
    cat:"Daily Life",
    catB:"background:rgba(245,158,11,.12);color:#f59e0b;border-color:rgba(245,158,11,.25)",
    title:"Daily routines & lifestyle",
    subtitle:"",
    text:"",
    isTitle:false,
    questions:[
      "What time do you usually wake up? Has your <span class='vocab-word' data-def='routine'>routine</span> changed over the years?",
      "Do you prefer a <span class='vocab-word' data-def='structured'>structured</span> schedule or a <span class='vocab-word' data-def='flexible'>flexible</span> day? Why?",
      "How do you usually spend your evenings? Has this changed since you were younger?",
      "Describe your <span class='vocab-word' data-def='ideal'>ideal</span> weekend. What makes it perfect for you?",
    ],
  },
  {
    bg:"https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1200&q=80",
    minH:"400vh",
    cat:"Travel & Places",
    catB:"background:rgba(168,85,247,.12);color:#a78bfa;border-color:rgba(168,85,247,.25)",
    title:"Travel & places",
    subtitle:"",
    text:"",
    isTitle:false,
    questions:[
      "What is the most beautiful place you have ever visited? Describe it.",
      "Do you prefer traveling alone or with others? What are the <span class='vocab-word' data-def='advantage'>advantages</span> of each?",
      "If you could live anywhere in the world, where would it be and why?",
      "What is something <span class='vocab-word' data-def='surprising'>surprising</span> you learned about another <span class='vocab-word' data-def='culture'>culture</span> while traveling?",
    ],
  },
  {
    bg:"https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200&q=80",
    minH:"400vh",
    cat:"Food & Culture",
    catB:"background:rgba(251,113,133,.1);color:#fb7185;border-color:rgba(251,113,133,.2)",
    title:"Food, culture & traditions",
    subtitle:"",
    text:"",
    isTitle:false,
    questions:[
      "What is a <span class='vocab-word' data-def='traditional'>traditional</span> dish from your country? Can you describe how it is made?",
      "Has your diet changed over the years? What <span class='vocab-word' data-def='influenced'>influenced</span> that change?",
      "Do you enjoy trying food from other cultures? What is the most <span class='vocab-word' data-def='unusual'>unusual</span> thing you have eaten?",
      "Describe a typical family meal in your household. Who cooks? Who cleans?",
    ],
  },
  {
    bg:"https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=1200&q=80",
    minH:"400vh",
    cat:"Work & Ambitions",
    catB:"background:rgba(163,230,53,.12);color:#a3e635;border-color:rgba(163,230,53,.25)",
    title:"Work, goals & ambitions",
    subtitle:"",
    text:"",
    isTitle:false,
    questions:[
      "What would your dream job look like? Describe it in detail.",
      "Do you think people should change careers multiple times, or stick to one path?",
      "What is a goal you are working towards right now? What steps are you taking?",
      "How has <span class='vocab-word' data-def='technology'>technology</span> changed the way people work in your field?",
    ],
  },
  {
    bg:"https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=1200&q=80",
    minH:"400vh",
    cat:"Society & Opinions",
    catB:"background:rgba(167,139,250,.12);color:#a78bfa;border-color:rgba(167,139,250,.25)",
    title:"Society & opinions",
    subtitle:"",
    text:"",
    isTitle:false,
    questions:[
      "Do you think social media has improved or damaged human <span class='vocab-word' data-def='communication'>communication</span>? Explain.",
      "Should learning a foreign language be <span class='vocab-word' data-def='compulsory'>compulsory</span> in schools? At what age should it start?",
      "What is one thing about modern life that you would change if you could?",
      "How do you think the world will be different in 50 years?",
    ],
  },
  {
    bg:"https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=1200&q=80",
    minH:"300vh",
    cat:"Wrap-up",
    catB:"background:rgba(163,230,53,.12);color:#a3e635;border-color:rgba(163,230,53,.25)",
    title:"Well done!",
    subtitle:"English Conversation Questions — Speaking Lesson",
    text:"Practice these questions with a partner. Try to speak for at least 2 minutes on each question. Don’t worry about making mistakes — focus on <span class='vocab-word' data-def='communicate'>communicate</span> your ideas!",
    isEnd:true,
  },
];

var current=0;

function renderSlides(){
  var c=document.getElementById('slides-container');
  var dots=document.getElementById('navDots');
  var html='',dotsHtml='';
  SLIDES.forEach(function(s,i){
    html+='<div class="slide'+(i===0?' active':'')+'" id="slide-'+i+'" style="min-height:'+s.minH+'">';
    html+='<div class="slide-bg ken" id="sbg-'+i+'" style="background-image:url('+s.bg+')"></div>';
    html+='<span class="slide-count">'+(i+1)+' / '+SLIDES.length+'</span>';
    html+='<div class="slide-inner">';
    html+='<div class="slide-spacer-top"></div>';
    if(s.isTitle){
      html+='<span class="slide-label" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h1>'+s.title+'</h1>';
      html+='<p class="slide-intro">'+s.text+'</p>';
    } else if(s.isWarmup){
      html+='<span class="warmup-badge">Warm-up</span>';
      html+='<h2>'+s.title+'</h2>';
      if(s.warmupQ){
        html+='<div class="q-list">';
        s.warmupQ.forEach(function(q,j){
          html+='<div class="q-item"><span class="q-num">'+(j+1)+'</span><span class="q-text">'+q+'</span></div>';
        });
        html+='</div>';
      }
    } else if(s.isEnd){
      html+='<span class="slide-label" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h1>'+s.title+'</h1>';
      html+='<h2>'+s.subtitle+'</h2>';
      html+='<p class="slide-intro">'+s.text+'</p>';
    } else {
      html+='<span class="slide-label" style="background:'+s.catB+'">'+s.cat+'</span>';
      html+='<h2>'+s.title+'</h2>';
      if(s.questions){
        html+='<div class="q-list">';
        s.questions.forEach(function(q,j){
          html+='<div class="q-item"><span class="q-num">'+(j+1)+'</span><span class="q-text">'+q+'</span></div>';
        });
        html+='</div>';
      }
    }
    html+='<div class="slide-spacer-bottom"></div>';
    html+='</div>';
    html+='</div>';
    dotsHtml+='<div class="nav-dot'+(i===0?' active':'')+'" onclick="goTo('+i+')"></div>';
  });
  c.innerHTML=html;
  dots.innerHTML=dotsHtml;
}

function showSlide(n){
  if(n<0||n>=SLIDES.length)return;
  var visible=document.querySelector('.slide-bg.ken');
  if(visible)visible.classList.remove('ken');
  document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active')});
  document.querySelectorAll('.nav-dot').forEach(function(d){d.classList.remove('active')});
  var el=document.getElementById('slide-'+n);
  el.classList.add('active');
  var bg=document.getElementById('sbg-'+n);
  if(bg)bg.classList.add('ken');
  document.querySelectorAll('.nav-dot')[n].classList.add('active');
  current=n;
  document.getElementById('progressBar').style.width=((current+1)/SLIDES.length*100)+'%';
}

function goTo(n){showSlide(n)}

document.getElementById('btnPrev').addEventListener('click',function(){showSlide(current-1)});
document.getElementById('btnNext').addEventListener('click',function(){showSlide(current+1)});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();showSlide(current+1)}
  if(e.key==='ArrowLeft'){e.preventDefault();showSlide(current-1)}
});

var tx=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX});
document.addEventListener('touchend',function(e){
  var d=tx-e.changedTouches[0].clientX;
  if(Math.abs(d)>50){d>0?showSlide(current+1):showSlide(current-1)}
});


// Shift+wheel = prev/next slide
document.addEventListener('wheel',function(e){
  if(!e.shiftKey) return;
  e.preventDefault();
  if(e.deltaY>0) showSlide(current+1);
  else if(e.deltaY<0) showSlide(current-1);
},{passive:false});

var pop=document.getElementById('vocabPop');
var popWord=document.getElementById('vocabPopWord');
var popDef=document.getElementById('vocabPopDef');
document.addEventListener('click',function(e){
  var vw=e.target.closest('.vocab-word');
  if(vw){
    e.stopPropagation();
    var key=vw.getAttribute('data-def');
    var def=VOCAB[key]||key;
    popWord.textContent=key;
    popDef.textContent=def;
    var r=vw.getBoundingClientRect();
    pop.style.top=(r.top-10)+'px';
    pop.style.left=r.left+'px';
    pop.style.transform='translateY(-100%)';
    pop.classList.add('show');
    vw.classList.add('open');
    vw.setAttribute('data-open','1');
  } else if(!e.target.closest('.vocab-pop')){
    pop.classList.remove('show');
    document.querySelectorAll('.vocab-word[data-open]').forEach(function(el){el.removeAttribute('data-open');el.classList.remove('open')});
  }
});
document.getElementById('vocabPopClose').addEventListener('click',function(){
  pop.classList.remove('show');
  document.querySelectorAll('.vocab-word[data-open]').forEach(function(el){el.removeAttribute('data-open');el.classList.remove('open')});
});

renderSlides();
</script>
</body>
</html>
