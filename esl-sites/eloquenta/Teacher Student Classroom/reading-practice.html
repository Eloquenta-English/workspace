<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reading Practice — Alice in Wonderland</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--bg2:#111827;--bg3:#1e293b;--border:#374151;--text:#f1f5f9;--dim:#94a3b8;--muted:#64748b;--cyan:#22d3ee;--green:#34d399;--amber:#fbbf24;--rose:#fb7185;--violet:#a78bfa}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.back{color:var(--dim);text-decoration:none;font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid var(--border)}
.back:hover{color:var(--cyan);border-color:var(--cyan)}
.title{font-size:16px;font-weight:700;flex:1}
.main{max-width:900px;margin:0 auto;padding:24px 20px}
.level-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.level-btn{height:36px;padding:0 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer}
.level-btn:hover{border-color:var(--text)}
.level-btn.active{background:var(--cyan);border-color:var(--cyan);color:var(--bg)}
.chapter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.chtab{height:32px;padding:0 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:12px;font-weight:600;cursor:pointer}
.chtab.active{background:rgba(34,211,238,.12);border-color:var(--cyan);color:var(--cyan)}
.tts-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;flex-wrap:wrap}
.tts-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.tts-btn{height:32px;padding:0 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
.tts-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.tts-btn.playing{background:rgba(34,211,238,.12);border-color:var(--cyan);color:var(--cyan)}
.tts-ctrl{display:flex;align-items:center;gap:6px}
.tts-ctrl label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.tts-ctrl input[type="range"]{width:70px;accent-color:var(--cyan)}
.tts-speed-val{font-size:11px;font-weight:600;color:var(--cyan);min-width:30px;text-align:right}
.tts-progress{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;min-width:60px}
.tts-progress-fill{height:100%;background:var(--cyan);width:0%;transition:width .25s}
.voice-select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:11px;padding:4px 8px;outline:none;cursor:pointer;max-width:160px}
.voice-select:focus{border-color:var(--cyan)}
.reading-area{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:24px;position:relative}
.chapter-title{font-size:1.4rem;font-weight:800;margin-bottom:4px;line-height:1.2}
.chapter-author{font-size:12px;color:var(--muted);margin-bottom:16px;font-style:italic}
.passage-text{font-family:'Merriweather',serif;font-size:1.05rem;line-height:1.9;color:var(--dim);letter-spacing:.2px;text-align:justify}
.passage-text .vocab{color:var(--amber);cursor:help;border-bottom:1px dashed rgba(251,191,36,.4);position:relative}
.passage-text .vocab:hover{border-bottom-color:var(--amber)}
.passage-text .vocab .vtip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.passage-text .vocab:hover .vtip{opacity:1}
.passage-text .sentence{border-radius:3px;padding:1px 0;transition:background .3s}
.speaking-line{background:rgba(34,211,238,.08)!important;border-left:3px solid var(--cyan);padding-left:12px!important;margin-left:-15px;border-radius:0 4px 4px 0}
.word{display:inline;transition:background .15s;border-radius:2px;padding:1px 2px;margin:-1px -2px;cursor:pointer}
.word:hover{background:rgba(34,211,238,.12)}
.word.speaking{background:rgba(34,211,238,.2)!important;color:var(--cyan);font-weight:600}
.word.vocab-word{color:var(--amber);cursor:help;border-bottom:1px dashed rgba(251,191,36,.4)}
.word.vocab-word:hover{border-bottom-color:var(--amber)}
.word.vocab-word .vtip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.word.vocab-word:hover .vtip{opacity:1}
.reading-time{font-size:11px;color:var(--muted);text-align:right;margin-top:16px}
.questions{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px}
.q-header{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.q-score{font-size:12px;color:var(--muted);margin-left:auto}
.question{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.question:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.q-text{font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.5}
.q-num{color:var(--cyan);margin-right:6px}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;transition:all .15s}
.opt:hover{border-color:var(--cyan)}
.opt.sel{background:rgba(34,211,238,.08);border-color:var(--cyan)}
.opt.correct{background:rgba(52,211,153,.1);border-color:var(--green);color:var(--green)}
.opt.wrong{background:rgba(251,113,133,.1);border-color:var(--rose);color:var(--rose)}
.opt .letter{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--bg3);text-align:center;font-size:11px;font-weight:700;line-height:22px;flex-shrink:0}
.short-answer{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;resize:vertical;min-height:60px;font-family:'Inter',sans-serif}
.short-answer:focus{border-color:var(--cyan)}
.submit-row{display:flex;gap:8px;justify-content:center;margin-top:20px}
.btn{height:40px;padding:0 24px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn.primary{background:var(--cyan);border-color:var(--cyan);color:var(--bg)}
.results{display:none;text-align:center;padding:40px 20px}
.results.show{display:block}
.results h2{font-size:1.6rem;font-weight:800;margin-bottom:8px}
.res-stats{display:flex;gap:16px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.rstat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 20px;min-width:100px}
.rstat .val{font-size:1.5rem;font-weight:800;display:block}
.rstat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.start-msg{text-align:center;padding:60px 20px}
.start-msg h2{font-size:1.6rem;font-weight:800;margin-bottom:8px}
.start-msg p{color:var(--dim);margin-bottom:24px}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back">&larr; Back</a>
  <div class="title">Reading Practice — Alice in Wonderland</div>
</div>
<div class="main">
  <div class="level-bar" id="levelBar">
    <button class="level-btn active" onclick="setLevel('a1',this)">A1 Beginner</button>
    <button class="level-btn" onclick="setLevel('a2',this)">A2 Elementary</button>
    <button class="level-btn" onclick="setLevel('b1',this)">B1 Intermediate</button>
    <button class="level-btn" onclick="setLevel('b2',this)">B2 Upper Intermediate</button>
  </div>
  <div class="chapter-tabs" id="chapterTabs"></div>
  <div class="tts-bar" id="ttsBar" style="display:none">
    <span class="tts-label">TTS</span>
    <button class="tts-btn" id="ttsPlayBtn" onclick="toggleTTS()">&#9654; Play</button>
    <button class="tts-btn" onclick="stopTTS()">&#9632; Stop</button>
    <button class="tts-btn" onclick="pauseTTS()" id="ttsPauseBtn" style="display:none">&#10074;&#10074;</button>
    <select class="voice-select" id="voiceSelect" onchange="ttsVoice=this.value">
      <option value="">Loading voices...</option>
    </select>
    <div class="tts-ctrl">
      <label>Speed</label>
      <input type="range" id="ttsRate" min="40" max="150" value="85" oninput="updateTTSRate(this.value)">
      <span class="tts-speed-val" id="ttsSpeedVal">0.85x</span>
    </div>
    <div class="tts-progress"><div class="tts-progress-fill" id="ttsProgressFill"></div></div>
    <label style="font-size:9px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer">
      <input type="checkbox" id="ttsWordMode" onchange="ttsWordMode=this.checked" style="accent-color:var(--cyan)">
      Word mode
    </label>
  </div>
  <div class="start-msg" id="startMsg">
    <h2>Alice in Wonderland</h2>
    <p>Read chapters from Lewis Carroll's classic, with vocabulary support and comprehension questions. Use the TTS button to listen with realistic text-to-speech.</p>
    <button class="btn primary" onclick="startQuiz()">Start Reading</button>
  </div>
  <div id="quizArea" style="display:none">
    <div class="reading-area" id="readingArea"></div>
    <div class="questions" id="questionsArea"></div>
    <div class="results" id="resultsArea"></div>
  </div>
</div>
<script>
var LEVEL='a1',CHAPTER=0,questions=[],answers=[],submitted=false,readStart=0;
var ttsUtterance=null,ttsPlaying=false,ttsPaused=false,ttsVoice='',ttsSentences=[],ttsCurrentSentence=0;

function loadVoices(){
  var sel=document.getElementById('voiceSelect');
  var voices=window.speechSynthesis.getVoices();
  if(!voices.length){setTimeout(loadVoices,200);return}
  sel.innerHTML='';
  var preferred=['Google US English','Google UK English Female','Google UK English Male','Samantha','Alex','Victoria','Daniel','Karen','Moira','Tessa','Microsoft Zira','Microsoft David','en-US','en-GB'];
  var good=[],other=[];
  voices.forEach(function(v){
    var name=v.name;
    var isPreferred=preferred.some(function(p){return name.indexOf(p)!==-1});
    if(isPreferred)good.push(v);else other.push(v);
  });
  var sorted=good.concat(other);
  sorted.forEach(function(v,i){
    var opt=document.createElement('option');
    opt.value=v.name;
    opt.textContent=v.name+(v.default?' (default)':'');
    if(i===0)opt.selected=true;
    sel.appendChild(opt);
  });
  if(sorted.length>0)ttsVoice=sorted[0].name;
}
if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged=loadVoices;
}

function toggleTTS(){
  if(ttsPlaying&&!ttsPaused){pauseTTS();return}
  if(ttsPaused){resumeTTS();return}
  startTTS();
}

function startTTS(){
  if(!('speechSynthesis' in window)){alert('Text-to-speech not supported.');return}
  var p=CHAPTERS[LEVEL][CHAPTER];
  speechSynthesis.cancel();
  ttsPaused=false;
  ttsCurrentSentence=0;
  ttsCurrentWord=0;
  ttsSentences=p.text.split(/(?<=[.!?])\s+/);
  ttsWordMode=document.getElementById('ttsWordMode').checked;
  speakNext();
}

function speakNext(){
  if(ttsCurrentSentence>=ttsSentences.length){stopTTS();return}
  var sentence=ttsSentences[ttsCurrentSentence];
  if(ttsWordMode){
    var words=sentence.split(/\s+/);
    if(ttsCurrentWord>=words.length){
      ttsCurrentSentence++;
      ttsCurrentWord=0;
      highlightWord(ttsCurrentSentence-1,-1,false);
      speakNext();
      return;
    }
    var word=words[ttsCurrentWord];
    ttsUtterance=new SpeechSynthesisUtterance(word);
    ttsUtterance.rate=parseInt(document.getElementById('ttsRate').value)/100;
    ttsUtterance.lang='en-US';
    if(ttsVoice){
      var voices=window.speechSynthesis.getVoices();
      var v=voices.find(function(x){return x.name===ttsVoice});
      if(v)ttsUtterance.voice=v;
    }
    ttsUtterance.onend=function(){
      highlightWord(ttsCurrentSentence,ttsCurrentWord,false);
      ttsCurrentWord++;
      speakNext();
    };
    ttsUtterance.onerror=function(){stopTTS();};
    highlightWord(ttsCurrentSentence,ttsCurrentWord,true);
    speechSynthesis.speak(ttsUtterance);
    ttsPlaying=true;
    updateTTSUI();
  } else {
    ttsUtterance=new SpeechSynthesisUtterance(sentence);
    ttsUtterance.rate=parseInt(document.getElementById('ttsRate').value)/100;
    ttsUtterance.lang='en-US';
    if(ttsVoice){
      var voices=window.speechSynthesis.getVoices();
      var v=voices.find(function(x){return x.name===ttsVoice});
      if(v)ttsUtterance.voice=v;
    }
    ttsUtterance.onend=function(){
      ttsCurrentSentence++;
      highlightSentence(ttsCurrentSentence-1,false);
      speakNext();
    };
    ttsUtterance.onerror=function(){stopTTS();};
    highlightSentence(ttsCurrentSentence,true);
    speechSynthesis.speak(ttsUtterance);
    ttsPlaying=true;
    updateTTSUI();
  }
}

function pauseTTS(){speechSynthesis.pause();ttsPaused=true;updateTTSUI();}
function resumeTTS(){speechSynthesis.resume();ttsPaused=false;updateTTSUI();}

function stopTTS(){
  speechSynthesis.cancel();
  ttsPlaying=false;ttsPaused=false;ttsUtterance=null;ttsCurrentSentence=0;ttsCurrentWord=0;
  document.getElementById('ttsProgressFill').style.width='0%';
  document.querySelectorAll('.speaking-line').forEach(function(el){el.classList.remove('speaking-line')});
  document.querySelectorAll('.word.speaking').forEach(function(el){el.classList.remove('speaking')});
  updateTTSUI();
}

function updateTTSRate(val){document.getElementById('ttsSpeedVal').textContent=(val/100).toFixed(1)+'x';}

function highlightSentence(idx,active){
  var lines=document.querySelectorAll('.passage-text .sentence');
  lines.forEach(function(el,i){
    if(i===idx)el.classList.toggle('speaking-line',active);
    else if(i<idx)el.classList.remove('speaking-line');
  });
  if(active&&lines[idx]){
    var r=lines[idx].getBoundingClientRect();
    if(r.top<80||r.top>window.innerHeight-100)lines[idx].scrollIntoView({behavior:'smooth',block:'center'});
  }
  var pct=Math.min(100,Math.round((idx+1)/ttsSentences.length*100));
  document.getElementById('ttsProgressFill').style.width=pct+'%';
}

function highlightWord(si,wi,active){
  var words=document.querySelectorAll('.word');
  words.forEach(function(el){
    if(el.dataset.si==si&&el.dataset.wi==wi)el.classList.toggle('speaking',active);
    else if(el.dataset.si<si||(el.dataset.si==si&&el.dataset.wi<wi))el.classList.remove('speaking');
  });
  if(active&&wi>=0){
    var el=document.querySelector('.word[data-si="'+si+'"][data-wi="'+wi+'"]');
    if(el){
      var r=el.getBoundingClientRect();
      if(r.top<80||r.top>window.innerHeight-100)el.scrollIntoView({behavior:'smooth',block:'center'});
    }
  }
  var totalWords=0,spoken=0;
  var sentences=CHAPTERS[LEVEL][CHAPTER].text.split(/(?<=[.!?])\s+/);
  sentences.forEach(function(s,i){
    var w=s.split(/\s+/).length;
    if(i<si)spoken+=w;
  });
  spoken+=wi+1;
  sentences.forEach(function(s){totalWords+=s.split(/\s+/).length;});
  var pct=Math.min(100,Math.round(spoken/totalWords*100));
  document.getElementById('ttsProgressFill').style.width=pct+'%';
}

function speakWord(word){
  if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(word.replace(/[^a-zA-Z']/g,''));
  u.rate=0.8;
  u.lang='en-US';
  if(ttsVoice){
    var voices=window.speechSynthesis.getVoices();
    var v=voices.find(function(x){return x.name===ttsVoice});
    if(v)u.voice=v;
  }
  speechSynthesis.speak(u);
}

function updateTTSUI(){
  var btn=document.getElementById('ttsPlayBtn');
  var pauseBtn=document.getElementById('ttsPauseBtn');
  if(ttsPlaying&&!ttsPaused){btn.textContent='&#9632; Stop';btn.classList.add('playing');pauseBtn.style.display='inline-flex';}
  else if(ttsPaused){btn.textContent='&#9654; Resume';btn.classList.add('playing');pauseBtn.style.display='inline-flex';}
  else{btn.textContent='&#9654; Play';btn.classList.remove('playing');pauseBtn.style.display='none';}
}

var CHAPTERS={
  "a1": [
    {
      "title": "Chapter 1: Down the Rabbit-Hole (Part 1)",
      "author": "Lewis Carroll (1865) \u2014 Adapted for A1",
      "text": "Alice was beginning to get very tired of sitting by her sister on the bank, and of having nothing to do. Once or twice she had looked into the book her sister was reading, but it had no pictures or conversations in it. \"And what is the use of a book,\" thought Alice, \"without pictures or conversations?\"\n\nSo she was thinking about this, and she was very sleepy. Suddenly a white rabbit with pink eyes ran close by her. Alice did not think this was very strange. But when the rabbit took a watch out of its pocket and looked at it, Alice jumped to her feet. She ran across the field after the rabbit. She saw it go down a large rabbit-hole under the hedge.\n\nAlice followed the rabbit down the hole. She fell very slowly. She had plenty of time to look around her. She saw bookshelves on the walls. She picked up a jar from a shelf. It was empty. She put it down on another shelf.\n\n\"Well!\" thought Alice. \"After a fall like this, I will not be afraid of falling down stairs. How brave they will all think me at home!\"\n\nDown, down, down. Would the fall never end? \"I wonder how many miles I have fallen?\" she said aloud. \"I must be getting somewhere near the centre of the earth.\"\n\nAlice fell for a long time. Then she suddenly landed on a heap of sticks and dry leaves. She was not hurt. She jumped to her feet and looked up. It was dark above her. There was a long passage in front of her, and the White Rabbit was still in sight.\n\nAlice ran down the passage. She turned the corner. The Rabbit was gone. Alice found herself in a long, low hall. There were doors all around the hall, but they were all locked. She walked sadly down the middle, wondering how she was ever to get out again.\n\nSuddenly she found a little three-legged table. On it was a tiny golden key. Alice tried the key in all the doors, but it did not open any of them. Then she saw a small door, about fifteen inches high. She tried the little key in the lock. It opened!\n\nAlice looked through the door. She saw the most beautiful garden you ever saw. She wanted to get out of the dark hall and walk among the bright flowers. But she was too big. She could not even get her head through the door.\n\n\"Oh, how I wish I could shut up like a telescope!\" thought Alice. \"If only I knew how to begin.\"\n\nShe went back to the table. She found a little bottle with a label that said \"DRINK ME.\" She drank it. It tasted very nice. And soon she began to get smaller and smaller.",
      "vocab": {
        "tired": "feeling that you want to rest",
        "bank": "the side of a river",
        "strange": "unusual or surprising",
        "hedge": "a line of bushes",
        "suddenly": "quickly and without warning",
        "heap": "a pile of things",
        "sadly": "in an unhappy way",
        "locked": "closed with a key",
        "inches": "a small unit of measurement (about 2.5 cm)",
        "telescope": "a tool for seeing far away things",
        "label": "a piece of paper with writing on it",
        "aloud": "speaking so others can hear",
        "brave": "not afraid",
        "centre": "the middle point"
      },
      "q": [
        {
          "t": "Why was Alice tired?",
          "o": [
            "She was sick",
            "She had nothing to do",
            "She was running",
            "She was hungry"
          ],
          "a": 1
        },
        {
          "t": "What was strange about the White Rabbit?",
          "o": [
            "It was very big",
            "It had pink eyes and took out a watch",
            "It could talk",
            "It wore a dress"
          ],
          "a": 1
        },
        {
          "t": "What did Alice find on the three-legged table?",
          "o": [
            "A book",
            "A golden key",
            "A bottle of water",
            "A map"
          ],
          "a": 1
        },
        {
          "t": "Why couldn't Alice go through the small door?",
          "o": [
            "It was locked",
            "She was too big",
            "The key didn't fit",
            "There was a wall"
          ],
          "a": 1
        },
        {
          "t": "What happened when Alice drank from the bottle?",
          "o": [
            "She got bigger",
            "She got smaller",
            "She fell asleep",
            "She could fly"
          ],
          "a": 1
        },
        {
          "t": "What did Alice wish she could do?",
          "o": [
            "Fly",
            "Become small like a telescope",
            "Find her sister",
            "Go home"
          ],
          "a": 1
        }
      ]
    },
    {

function setLevel(l,btn){
  LEVEL=l;CHAPTER=0;submitted=false;
  document.querySelectorAll('.level-btn').forEach(function(b){b.classList.remove('active')});
  if(btn)btn.classList.add('active');
  buildChapterTabs();
}

function buildChapterTabs(){
  var tabs=document.getElementById('chapterTabs');
  var p=CHAPTERS[LEVEL];
  tabs.innerHTML='';
  if(!p||p.length===0){tabs.innerHTML='<span style="color:var(--muted);font-size:12px">No chapters for this level yet.</span>';return}
  p.forEach(function(ch,i){
    var b=document.createElement('button');
    b.className='chtab'+(i===0?' active':'');
    b.textContent=ch.title.split(':')[0];
    b.title=ch.title;
    b.onclick=function(){CHAPTER=i;loadChapter();document.querySelectorAll('.chtab').forEach(function(x){x.classList.remove('active')});b.classList.add('active');};
    tabs.appendChild(b);
  });
}

function loadChapter(){
  var p=CHAPTERS[LEVEL][CHAPTER];
  document.getElementById('ttsBar').style.display='flex';
  var html='<div class="chapter-title">'+p.title+'</div>';
  if(p.author) html+='<div class="chapter-author">'+p.author+'</div>';
  html+='<div class="passage-text">';
  var sentences=p.text.split(/(?<=[.!?])\s+/);
  sentences.forEach(function(s,si){
    html+='<span class="sentence">';
    var words=s.split(/\s+/);
    words.forEach(function(w,wi){
      var clean=w.toLowerCase().replace(/[^a-z]/g,'');
      var isVocab=p.vocab&&p.vocab[clean];
      if(isVocab){
        html+='<span class="word vocab-word" data-si="'+si+'" data-wi="'+wi+'" onclick="speakWord(\''+w.replace(/'/g,"\\'")+'\')">'+w+'<span class="vtip"><strong>'+clean+'</strong>: '+p.vocab[clean]+'</span></span> ';
      } else {
        html+='<span class="word" data-si="'+si+'" data-wi="'+wi+'" onclick="speakWord(\''+w.replace(/'/g,"\\'")+'\')">'+w+'</span> ';
      }
    });
    html+='</span> ';
  });
  html+='</div>';
  html+='<div class="reading-time">Reading time: <span id="readTimer">0:00</span></div>';
  document.getElementById('readingArea').innerHTML=html;
  readStart=Date.now();
  var ti=setInterval(function(){
    var el=document.getElementById('readTimer');
    if(!el){clearInterval(ti);return}
    var s=Math.floor((Date.now()-readStart)/1000);
    el.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  },1000);
  buildQuestions();
}

function buildQuestions(){
  var p=CHAPTERS[LEVEL][CHAPTER];
  questions=p.q;
  answers={};
  var html='<div class="q-header">Comprehension Questions <span class="q-score" id="qScore"></span></div>';
  questions.forEach(function(q,i){
    html+='<div class="question" id="q'+i+'">';
    html+='<div class="q-text"><span class="q-num">'+(i+1)+'.</span>'+q.t+'</div>';
    if(q.o==='free'){
      html+='<textarea class="short-answer" id="ans'+i+'" placeholder="Type your answer here..."></textarea>';
    } else {
      html+='<div class="opts">';
      q.o.forEach(function(opt,j){
        html+='<div class="opt" id="q'+i+'o'+j+'" onclick="selectOpt('+i+','+j+')"><span class="letter">'+String.fromCharCode(65+j)+'</span>'+opt+'</div>';
      });
      html+='</div>';
    }
    html+='<div id="feedback'+i+'" style="margin-top:8px;font-size:13px;display:none"></div>';
    html+='</div>';
  });
  document.getElementById('questionsArea').innerHTML=html;
}

function selectOpt(qi,oi){
  submitted=false;
  var q=questions[qi];
  if(q.o==='free')return;
  for(var j=0;j<q.o.length;j++){document.getElementById('q'+qi+'o'+j).classList.remove('sel');}
  document.getElementById('q'+qi+'o'+oi).classList.add('sel');
  answers[qi]=oi;
}

function startQuiz(){
  document.getElementById('startMsg').style.display='none';
  document.getElementById('quizArea').style.display='block';
  document.getElementById('ttsBar').style.display='flex';
  buildChapterTabs();
  loadChapter();
}

function submitAnswers(){
  submitted=true;
  var correct=0;
  questions.forEach(function(q,i){
    var fb=document.getElementById('feedback'+i);
    fb.style.display='block';
    if(q.o==='free'){
      var ans=document.getElementById('ans'+i).value.trim();
      if(ans.length>0){correct++;fb.style.color='var(--green)';fb.textContent='Your answer: '+ans;}
      else{fb.style.color='var(--muted)';fb.textContent='No answer given.';}
      document.getElementById('ans'+i).readOnly=true;
      fb.innerHTML+='<br><span style="color:var(--dim)">Expected: '+q.a+'</span>';
    } else {
      for(var j=0;j<q.o.length;j++){
        var el=document.getElementById('q'+i+'o'+j);
        el.classList.remove('sel');
        if(j===q.a)el.classList.add('correct');
        if(answers[i]===j&&j!==q.a)el.classList.add('wrong');
      }
      if(answers[i]===q.a){correct++;fb.style.color='var(--green)';fb.textContent='Correct!';}
      else{fb.style.color='var(--rose)';fb.textContent='Incorrect. The answer is: '+q.o[q.a];}
    }
  });
  document.getElementById('qScore').textContent=correct+'/'+questions.length+' correct';
  setTimeout(function(){
    document.getElementById('resultsArea').classList.add('show');
    document.getElementById('resultsArea').innerHTML='<h2>Results</h2>'+statHtml(correct, questions.length)+'<button class="btn primary" onclick="restartQuiz()">Try Another Chapter</button>';
  },500);
}

function statHtml(c,t){
  var pct=Math.round(c/t*100);
  return '<div class="res-stats"><div class="rstat"><span class="val">'+pct+'%</span><span class="lbl">Score</span></div><div class="rstat"><span class="val">'+c+'</span><span class="lbl">Correct</span></div><div class="rstat"><span class="val">'+(t-c)+'</span><span class="lbl">Wrong</span></div></div>';
}

function restartQuiz(){
  document.getElementById('resultsArea').classList.remove('show');
  document.getElementById('questionsArea').innerHTML='';
  answers={};submitted=false;
  loadChapter();
}
</script>
