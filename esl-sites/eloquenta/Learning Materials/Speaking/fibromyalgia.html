<html lang="en">

<title>Fibromyalgia — Clinical Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e14;--surface:#111520;--surface2:#181d2a;--border:#1e2536;--text:#e0e6f0;--text-muted:#8892a4;--text-dim:#4a5568;--accent:#60a5fa;--accent2:#38bdf8;--accent3:#a78bfa;--teal:#2dd4bf;--rose:#f472b6}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
.topbar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:12px 32px;background:rgba(11,14,20,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topbar-title{font-family:'Source Serif 4',serif;font-size:1rem;font-weight:600;color:var(--text);letter-spacing:-.2px}
.topbar-title span{color:var(--accent)}
.topbar-sub{font-size:.6rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.topbar-progress{display:flex;align-items:center;gap:12px}
.topbar-counter{font-size:.65rem;color:var(--text-dim);font-weight:500}
.topbar-bar{width:80px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.topbar-bar-fill{height:100%;background:linear-gradient(90deg,#38bdf8,#60a5fa);border-radius:2px;transition:width .4s ease}
.slide{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 40px 80px;position:relative}
.slide-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.slide-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(.18) saturate(.6) hue-rotate(15deg);animation:kenBurns 25s ease-in-out infinite alternate}
@keyframes kenBurns{0%{transform:scale(1) translate(0,0)}50%{transform:scale(1.05) translate(-.3%,-.3%)}100%{transform:scale(1.02) translate(.3%,.3%)}}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,14,20,.75) 0%,rgba(11,14,20,.45) 40%,rgba(11,14,20,.85) 100%)}
.slide-content{position:relative;z-index:2;max-width:820px;width:100%;text-align:center}
.slide-label{display:inline-block;padding:4px 14px;border-radius:4px;font-size:.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;border:1px solid}
.slide h1{font-family:'Source Serif 4',serif;font-size:3rem;font-weight:600;line-height:1.15;margin-bottom:16px;letter-spacing:-.3px}
.slide h2{font-family:'Source Serif 4',serif;font-size:1.8rem;font-weight:600;line-height:1.25;margin-bottom:12px}
.slide h3{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:8px}
.slide p{font-size:1rem;color:var(--text-muted);line-height:1.8;max-width:640px;margin:0 auto}
.slide .lead{font-size:1.15rem;color:var(--text);line-height:1.8;font-weight:300}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:28px;text-align:left}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px}
.card h3{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:8px}
.card p{font-size:.82rem;color:var(--text-muted);line-height:1.7;margin:0}
.card .num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;font-size:.65rem;font-weight:700;margin-bottom:10px;border:1px solid}
.stats-row{display:flex;justify-content:center;gap:40px;margin-top:28px;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:'Source Serif 4',serif;font-size:2.2rem;font-weight:600;color:var(--accent);line-height:1}
.stat-label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:6px}
.fancy-list{text-align:left;max-width:600px;margin:24px auto 0;display:flex;flex-direction:column;gap:12px}
.fancy-list-item{display:flex;gap:14px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px}
.fancy-list-item .bullet{flex-shrink:0;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;margin-top:2px;border:1px solid}
.fancy-list-item p{font-size:.88rem;color:var(--text-muted);line-height:1.6;margin:0}
.quote{border-left:3px solid var(--accent);padding:18px 24px;margin:24px auto;max-width:600px;text-align:left;background:var(--surface);border-radius:0 8px 8px 0}
.quote p{font-family:'Source Serif 4',serif;font-size:1.05rem;font-style:italic;color:var(--text);line-height:1.7;margin:0}
.quote .attribution{font-size:.7rem;color:var(--text-dim);margin-top:10px;font-style:normal;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:1px}
.timeline{text-align:left;max-width:560px;margin:24px auto 0;display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--border)}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{flex-shrink:0;width:10px;height:10px;border-radius:50%;margin-top:5px}
.timeline-content h4{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:4px}
.timeline-content p{font-size:.78rem;color:var(--text-muted);line-height:1.6;margin:0}
.nav{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:10px;align-items:center;background:rgba(11,14,20,.75);backdrop-filter:blur(8px);padding:8px 16px;border-radius:30px;border:1px solid var(--border)}
.nav-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:var(--surface);border-color:var(--accent)}
.nav-dots{display:flex;gap:5px;align-items:center}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);cursor:pointer;transition:all .2s}
.nav-dot.active{background:var(--accent)}
.nav-dot:hover{background:var(--text-muted)}
.progress{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--surface2);height:4px}
.progress-bar{height:100%;background:linear-gradient(90deg,#38bdf8,#60a5fa);transition:width .4s ease}
@media(max-width:700px){
  .topbar{padding:10px 16px}
  .slide{padding:80px 20px 70px}
  .slide h1{font-size:2rem}
  .slide h2{font-size:1.4rem}
  .card-grid{grid-template-columns:1fr;gap:12px}
  .stats-row{gap:20px}
  .stat-num{font-size:1.6rem}
  .nav{bottom:20px}
}
</style>

<script>
var SLIDES=[
{bg:"https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=1920&q=80",label:"Clinical Briefing",labelStyle:"background:rgba(96,165,250,.08);color:#60a5fa;border-color:rgba(96,165,250,.2)",title:"Fibromyalgia",subtitle:"Pathophysiology, diagnostic challenges, and evidence-based management",text:"A concise clinical overview for healthcare professionals, patients, and caregivers.",type:"title"},
{bg:"https://images.unsplash.com/photo-1559757175-5700dde675bc?w=1920&q=80",label:"Definition and Pathophysiology",labelStyle:"background:rgba(56,189,248,.08);color:#38bdf8;border-color:rgba(56,189,248,.2)",title:"A central sensitisation syndrome",text:"Fibromyalgia is a chronic pain disorder characterised by widespread musculoskeletal pain, fatigue, sleep disturbance, and cognitive dysfunction. Prevalence is 2-8% globally, with marked female predominance.",type:"cards",cards:[
{title:"Central Sensitisation",text:"The CNS amplifies nociceptive signalling. Functional neuroimaging demonstrates measurable alterations in pain processing -- the phenomenon is neurobiologically real.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{title:"No Structural Pathology",text:"Unlike inflammatory arthritides, fibromyalgia produces no joint destruction. Standard investigations are typically unremarkable -- a source of diagnostic difficulty.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{title:"Systemic Involvement",text:"Pain is the cardinal symptom, but the condition frequently encompasses fatigue, cognitive impairment, headache, IBS, and mood disturbance.",color:"rgba(45,212,191,.12);color:#2dd4bf"}
]},
{bg:"https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=1920&q=80",label:"Epidemiology",labelStyle:"background:rgba(167,139,250,.08);color:#a78bfa;border-color:rgba(167,139,250,.2)",title:"Prevalence and diagnostic delay",text:"Fibromyalgia is among the most common chronic pain conditions in clinical practice, yet remains frequently underdiagnosed.",type:"stats",stats:[
{num:"2-8%",label:"global prevalence"},
{num:"75-90%",label:"female predominance"},
{num:"3-6 yrs",label:"mean diagnostic delay"},
{num:"~50%",label:"comorbid depression or anxiety"}
]},
{bg:"https://images.unsplash.com/photo-1544027993-37dbfe43562a?w=1920&q=80",label:"Clinical Presentation",labelStyle:"background:rgba(244,114,182,.08);color:#f472b6;border-color:rgba(244,114,182,.2)",title:"The patient experience",text:"Patients describe a constellation of symptoms that fluctuate in severity and significantly impair quality of life.",type:"quote",quote:"The pain is often described as a deep, pervasive ache -- comparable to severe influenza-related myalgia -- that persists without remission. Patients report this is compounded by unrefreshing sleep, cognitive fog, and profound fatigue disproportionate to activity level.",attribution:"Adapted from patient-reported outcome literature"},
{bg:"https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=1920&q=80",label:"Symptom Profile",labelStyle:"background:rgba(56,189,248,.08);color:#38bdf8;border-color:rgba(56,189,248,.2)",title:"A multi-system disorder",text:"Fibromyalgia presents with a broad symptom constellation. The following domains are most commonly affected.",type:"list",items:[
{text:"Widespread pain -- bilateral, above and below the waist; described as burning, throbbing, or aching. Tender points on examination.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{text:"Fatigue -- not relieved by rest; patients report waking unrefreshed despite adequate sleep duration.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{text:"Cognitive dysfunction -- impaired concentration, word-finding difficulty, and short-term memory deficits (fibro fog).",color:"rgba(45,212,191,.12);color:#2dd4bf"},
{text:"Sleep disturbance -- difficulty initiating and maintaining sleep; polysomnography shows alpha-wave intrusion during NREM stage 3.",color:"rgba(167,139,250,.12);color:#a78bfa"},
{text:"Allodynia and hyperalgesia -- heightened sensitivity to mechanical, thermal, and chemical stimuli.",color:"rgba(244,114,182,.12);color:#f472b6"}
]},
{bg:"https://images.unsplash.com/photo-1584820927498-cfe5211fd8bf?w=1920&q=80",label:"Diagnostic Pathway",labelStyle:"background:rgba(45,212,191,.08);color:#2dd4bf;border-color:rgba(45,212,191,.2)",title:"A protracted diagnostic journey",text:"There is no definitive biomarker. Diagnosis is clinical, based on symptom criteria and exclusion of alternative diagnoses.",type:"timeline",timeline:[
{text:"Onset -- Symptoms may follow physical trauma, surgery, infection, or psychosocial stressor. Insidious onset without identifiable trigger is also common.",color:"#60a5fa"},
{text:"Initial presentation -- Standard investigations are typically normal. Patients may be reassured that nothing is wrong or offered antidepressants empirically.",color:"#38bdf8"},
{text:"Referral pathway -- Patients commonly see multiple specialists -- rheumatology, neurology, psychiatry, pain medicine -- over several years.",color:"#2dd4bf"},
{text:"Diagnostic criteria -- 2016 ACR revised criteria: widespread pain index >=7, symptom severity scale >=5, symptoms present >=3 months, no alternative diagnosis.",color:"#a78bfa"},
{text:"Mean delay -- 3 to 6 years from symptom onset to formal diagnosis. Many patients consult 3-5 clinicians before receiving an accurate diagnosis.",color:"#f472b6"}
]},
{bg:"https://images.unsplash.com/photo-1582750433449-648ed127bb54?w=1920&q=80",label:"Therapeutic Limitations",labelStyle:"background:rgba(244,114,182,.08);color:#f472b6;border-color:rgba(244,114,182,.2)",title:"Why conventional management is insufficient",text:"Fibromyalgia occupies an interdisciplinary space that does not map neatly onto any single medical specialty.",type:"cards",cards:[
{title:"No Objective Biomarker",text:"Unlike diabetes or rheumatoid arthritis, there is no definitive laboratory or imaging test. This complicates both diagnosis and clinical trial design.",color:"rgba(244,114,182,.12);color:#f472b6"},
{title:"Limited Pharmacotherapy",text:"Only three agents carry FDA approval. Most prescribing is off-label, with modest effect sizes and significant adverse effect profiles.",color:"rgba(45,212,191,.12);color:#2dd4bf"},
{title:"Insufficient Training",text:"Medical education allocates minimal time to fibromyalgia. Many clinicians still regard it as a diagnosis of exclusion or somatic symptom disorder.",color:"rgba(167,139,250,.12);color:#a78bfa"},
{title:"Research Underfunding",text:"Despite its prevalence, fibromyalgia receives disproportionately low research funding relative to conditions of comparable disease burden.",color:"rgba(56,189,248,.12);color:#38bdf8"}
]},
{bg:"https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=1920&q=80",label:"Current Evidence",labelStyle:"background:rgba(56,189,248,.08);color:#38bdf8;border-color:rgba(56,189,248,.2)",title:"Neurobiological mechanisms",text:"Neuroimaging and neurophysiological research have substantially advanced our understanding of fibromyalgia pathophysiology.",type:"list",items:[
{text:"Central sensitisation -- Dorsal horn neurons and supraspinal pain-processing regions demonstrate hyperexcitability. Reproducible on functional MRI and quantitative sensory testing.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{text:"Neuroinflammation -- PET studies demonstrate activated microglia and elevated central inflammatory markers in fibromyalgia cohorts.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{text:"Small fibre neuropathy -- Up to 50% of patients show reduced intraepidermal nerve fibre density on skin biopsy, suggesting a peripheral contribution.",color:"rgba(45,212,191,.12);color:#2dd4bf"},
{text:"HPA axis dysregulation -- Hypothalamic-pituitary-adrenal axis function is frequently abnormal, with blunted cortisol responses and altered diurnal rhythm.",color:"rgba(167,139,250,.12);color:#a78bfa"}
]},
{bg:"https://images.unsplash.com/photo-1585435557343-3b092031a831?w=1920&q=80",label:"Pharmacotherapy",labelStyle:"background:rgba(45,212,191,.08);color:#2dd4bf;border-color:rgba(45,212,191,.2)",title:"What pharmacotherapy offers and its limitations",text:"Current drug therapies provide partial symptom relief for a subset of patients. None address the underlying pathophysiology.",type:"cards",cards:[
{title:"Approved agents",text:"Duloxetine, milnacipran, and pregabalin carry FDA indication. Off-label options include low-dose naltrexone, gabapentin, and tricyclic antidepressants. NNT values are modest.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{title:"Multidisciplinary pain services",text:"Combined pharmacological, physiotherapeutic, and psychological intervention represents the gold standard. Access is often limited by waiting times.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{title:"Treatment discontinuation",text:"Approximately 40-60% of patients discontinue pharmacotherapy within 12 months due to adverse effects or inadequate efficacy.",color:"rgba(244,114,182,.12);color:#f472b6"}
]},
{bg:"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=1920&q=80",label:"Self-Management",labelStyle:"background:rgba(96,165,250,.08);color:#60a5fa;border-color:rgba(96,165,250,.2)",title:"Evidence-based self-management strategies",text:"Non-pharmacological interventions demonstrate the strongest evidence base. Current guidelines recommend these as first-line approaches.",type:"list",items:[
{text:"Graded aerobic exercise -- The single most evidence-supported intervention. Low-impact aerobic activity should be initiated at low intensity and progressed by approximately 10% per week.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{text:"Sleep hygiene optimisation -- Consistent sleep-wake scheduling, cool dark environment, screen avoidance before bed, and caffeine restriction after noon.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{text:"Stress reduction -- MBSR, yoga, and CBT have Grade A evidence for pain reduction and functional improvement.",color:"rgba(45,212,191,.12);color:#2dd4bf"},
{text:"Activity pacing -- Learning to balance activity and rest to avoid the boom-bust cycle is a critical self-management skill.",color:"rgba(167,139,250,.12);color:#a78bfa"},
{text:"Dietary modification -- No specific diet has been validated, but reduction in processed foods, refined sugar, and alcohol is supported by observational data.",color:"rgba(244,114,182,.12);color:#f472b6"}
]},
{bg:"https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=1920&q=80",label:"Exercise Prescription",labelStyle:"background:rgba(96,165,250,.08);color:#60a5fa;border-color:rgba(96,165,250,.2)",title:"The most effective intervention available",text:"Regular physical activity addresses central sensitisation, improves sleep architecture, reduces fatigue, and improves mood.",type:"cards",cards:[
{title:"Start conservatively",text:"Five minutes of walking is an appropriate starting point. The goal is consistency, not intensity. Progression by 10% per week is reasonable.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{title:"Aquatic exercise",text:"Warm-water pool-based exercise is often the optimal entry point. Buoyancy reduces mechanical joint loading and warm water provides analgesic benefit.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{title:"Yoga and tai chi",text:"Both have Level 1 evidence in fibromyalgia RCTs. Tai chi demonstrates pain reduction comparable to aerobic exercise in head-to-head studies.",color:"rgba(45,212,191,.12);color:#2dd4bf"},
{title:"Activity monitoring",text:"A simple diary recording activity type, duration, and next-day symptom response helps identify individual thresholds.",color:"rgba(167,139,250,.12);color:#a78bfa"}
]},
{bg:"https://images.unsplash.com/photo-1511295742362-92c96b1cf484?w=1920&q=80",label:"Sleep and Stress",labelStyle:"background:rgba(167,139,250,.08);color:#a78bfa;border-color:rgba(167,139,250,.2)",title:"Two pillars of symptom management",text:"Sleep disruption and chronic stress are both drivers and consequences of fibromyalgia symptom flares.",type:"list",items:[
{text:"Sleep architecture disruption -- Polysomnography demonstrates alpha-wave intrusion during slow-wave sleep, resulting in non-restorative sleep despite adequate time in bed.",color:"rgba(167,139,250,.12);color:#a78bfa"},
{text:"CBT for insomnia -- Superior to pharmacotherapy for sleep disturbance in fibromyalgia. Addresses maladaptive cognitions and behaviours perpetuating insomnia.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{text:"Stress-pain axis -- Psychological stress activates the HPA axis, amplifying central sensitisation. MBSR has demonstrated 30% pain reduction in controlled trials.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{text:"Vagal tone -- Diaphragmatic breathing, cold facial immersion, and resonant frequency breathing activate the parasympathetic nervous system.",color:"rgba(45,212,191,.12);color:#2dd4bf"}
]},
{bg:"https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=1920&q=80",label:"For Caregivers and Family",labelStyle:"background:rgba(45,212,191,.08);color:#2dd4bf;border-color:rgba(45,212,191,.2)",title:"Supporting a person with fibromyalgia",text:"Fibromyalgia affects the entire family system. Partners and close friends often struggle to understand why the patient cannot simply push through their symptoms.",type:"list",items:[
{text:"Validate their experience -- This is the single most important action. The patient has likely been told by multiple clinicians that investigations are normal. Your belief is therapeutic.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{text:"Educate yourself -- Understanding central sensitisation fundamentally changes how you interpret pain reports. Read peer-reviewed sources rather than anecdotal accounts.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{text:"Avoid minimising language -- Phrases such as but you look well or everyone gets tired are invalidating. Instead: I believe you. How can I help today?",color:"rgba(45,212,191,.12);color:#2dd4bf"},
{text:"Support pacing behaviour -- Gently encourage rest before symptom exacerbation. Help plan activities with scheduled rest periods.",color:"rgba(167,139,250,.12);color:#a78bfa"},
{text:"Maintain your own wellbeing -- Caregiver burnout is well-documented. Seek your own support -- whether professional, peer-based, or through dedicated personal time.",color:"rgba(244,114,182,.12);color:#f472b6"}
]},
{bg:"https://images.unsplash.com/photo-1516534775068-ba3e7458af70?w=1920&q=80",label:"Clinical Communication",labelStyle:"background:rgba(244,114,182,.08);color:#f472b6;border-color:rgba(244,114,182,.2)",title:"Language matters",text:"Communication patterns -- both clinical and interpersonal -- significantly influence patient outcomes and therapeutic alliance.",type:"cards",cards:[
{title:"Avoid",text:"Have you tried this supplement or diet? -- Implies the patient is responsible for finding their own solution. They have likely tried multiple approaches without success.",color:"rgba(244,114,182,.12);color:#f472b6"},
{title:"Avoid",text:"You just need to exercise more or think positively. -- Exercise is beneficial but not curative. Positive thinking does not alter neuroinflammation.",color:"rgba(45,212,191,.12);color:#2dd4bf"},
{title:"Avoid",text:"I get tired too or everyone has aches. -- Fibromyalgia pain and fatigue are qualitatively distinct from normal physiological experiences.",color:"rgba(167,139,250,.12);color:#a78bfa"},
{title:"Recommended",text:"I believe you. How can I help today? It is appropriate to rest. I am here. -- Simple, validating statements that strengthen therapeutic alliance.",color:"rgba(96,165,250,.12);color:#60a5fa"}
]},
{bg:"https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=1920&q=80",label:"Prognosis",labelStyle:"background:rgba(96,165,250,.08);color:#60a5fa;border-color:rgba(96,165,250,.2)",title:"Reasons for cautious optimism",text:"Fibromyalgia is not degenerative. It does not reduce life expectancy. For many patients, symptoms improve meaningfully over time.",type:"list",items:[
{text:"30-40% of patients report clinically significant improvement within 2-5 years of diagnosis, particularly those who adopt consistent exercise and stress management.",color:"rgba(96,165,250,.12);color:#60a5fa"},
{text:"Active research pipeline -- Neuroinflammation, gut-brain axis dysfunction, and small fibre neuropathy are active investigation areas with novel therapeutic targets in clinical trials.",color:"rgba(56,189,248,.12);color:#38bdf8"},
{text:"Low-dose naltrexone -- An off-label therapy showing promise in fibromyalgia RCTs. It modulates microglial activation and has a favourable adverse effect profile.",color:"rgba(45,212,191,.12);color:#2dd4bf"},
{text:"Patient expertise -- Longitudinal evidence suggests patients who develop deep self-knowledge of their condition achieve the best long-term outcomes.",color:"rgba(167,139,250,.12);color:#a78bfa"}
]},
{bg:"https://images.unsplash.com/photo-1516534775068-ba3e7458af70?w=1920&q=80",label:"Key Points",labelStyle:"background:rgba(96,165,250,.08);color:#60a5fa;border-color:rgba(96,165,250,.2)",title:"Five key points to retain",text:"",type:"takeaways",takeaways:[
"Fibromyalgia is a neurobiological condition with measurable CNS changes -- it is not psychosomatic",
"Conventional pharmacotherapy has limited efficacy because the underlying mechanisms are complex and incompletely understood",
"Exercise, sleep optimisation, and stress management have the strongest evidence base -- exceeding any single pharmacological intervention",
"Activity pacing is critical: the boom-bust cycle is the most common self-management error and the most important pattern to address",
"Validation and belief from clinicians, family, and caregivers is itself a therapeutic intervention with measurable impact on outcomes"
]}
];

    html+='<div class="slide-content">';
    if(s.label) html+='<span class="slide-label" style="'+s.labelStyle+'">'+s.label+'</span>';
    if(s.title) html+='<h1>'+s.title+'</h1>';
    if(s.subtitle) html+='<h2>'+s.subtitle+'</h2>';
    if(s.text) html+='<p'+(s.type==='title'?' class="lead"':'')+'>'+s.text+'</p>';
    if(s.type==='title'){
      html+='<div style="margin-top:32px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">';
      html+='<span style="padding:6px 16px;border-radius:4px;background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.15);font-size:.7rem;color:#60a5fa;font-weight:500">16 slides</span>';
      html+='<span style="padding:6px 16px;border-radius:4px;background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);font-size:.7rem;color:#38bdf8;font-weight:500">Evidence-informed</span>';
      html+='<span style="padding:6px 16px;border-radius:4px;background:rgba(45,212,191,.06);border:1px solid rgba(45,212,191,.15);font-size:.7rem;color:#2dd4bf;font-weight:500">~8 min</span>';
      html+='</div>';
    }
    if(s.type==='cards' && s.cards){
      html+='<div class="card-grid">';
      s.cards.forEach(function(card){
        html+='<div class="card">';
        html+='<span class="num" style="'+card.color+'">&#8226;</span>';
        html+='<h3>'+card.title+'</h3>';
        html+='<p>'+card.text+'</p>';
        html+='</div>';
      });
      html+='</div>';
    }
    if(s.type==='stats' && s.stats){
      html+='<div class="stats-row">';
      s.stats.forEach(function(stat){
        html+='<div class="stat"><div class="stat-num">'+stat.num+'</div><div class="stat-label">'+stat.label+'</div></div>';
      });
      html+='</div>';
    }
    if(s.type==='quote' && s.quote){
      html+='<div class="quote">';
      html+='<p>"'+s.quote+'"</p>';
      if(s.attribution) html+='<div class="attribution">&mdash; '+s.attribution+'</div>';
      html+='</div>';
    }
    if(s.type==='list' && s.items){
      html+='<div class="fancy-list">';
      s.items.forEach(function(item){
        html+='<div class="fancy-list-item"><span class="bullet" style="'+item.color+'">&#8226;</span><p>'+item.text+'</p></div>';
      });
      html+='</div>';
    }
    if(s.type==='timeline' && s.timeline){
      html+='<div class="timeline">';
      s.timeline.forEach(function(t){
        html+='<div class="timeline-item"><div class="timeline-dot" style="background:'+t.color+'"></div><div class="timeline-content">'+t.text+'</div></div>';
      });
      html+='</div>';
    }
    if(s.type==='takeaways' && s.takeaways){
      html+='<div class="fancy-list">';
      s.takeaways.forEach(function(t,i){
        html+='<div class="fancy-list-item"><span class="bullet" style="background:rgba(96,165,250,.12);color:#60a5fa;border-color:rgba(96,165,250,.2)">'+(i+1)+'</span><p>'+t+'</p></div>';
      });
      html+='</div>';
    }
    html+='</div></div>';
    dotsHtml+='<div class="nav-dot'+(i===0?' active':'')+'" onclick="goTo('+i+')"></div>';
  });
  container.innerHTML=html;
  dots.innerHTML=dotsHtml;
}
function updateProgress(){
  var pct=((current+1)/SLIDES.length*100);
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('topbarBarFill').style.width=pct+'%';
  document.getElementById('topbarCounter').textContent=(current+1)+' / '+SLIDES.length;
}
function showSlide(n){
  if(n<0||n>=SLIDES.length)return;
  document.getElementById('slide-'+current).classList.remove('active');
  current=n;
  document.getElementById('slide-'+current).classList.add('active');
  document.querySelectorAll('.nav-dot').forEach(function(el,i){el.classList.toggle('active',i===n)});
  updateProgress();
}
function nextSlide(){showSlide(current+1)}
function prevSlide(){showSlide(current-1)}
function goTo(n){showSlide(n)}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextSlide()}
  if(e.key==='ArrowLeft'){e.preventDefault();prevSlide()}
});
renderSlides();
</script>
