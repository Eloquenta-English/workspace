<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lifestyle & Society — Speaking Lesson | WTE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a1a;color:#e2e8f0;overflow-x:hidden;min-height:100vh;height:auto}

/* Top Bar - minimal, only Back to Lessons */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;height:48px;background:rgba(26,26,26,.95);backdrop-filter:blur(8px);border-bottom:1px solid #333;display:flex;align-items:center;padding:0 20px;gap:16px}
.top-bar a{color:#a3e635;text-decoration:none;font-size:13px;font-weight:600;transition:color .15s}
.top-bar a:hover{color:#d9f99d}
.wte-logo{font-size:16px;font-weight:700;color:#f1f5f9}
.wte-logo .o{color:#a3e635}

/* Slides */
.slide{display:none;width:100vw;min-height:100vh;height:auto;position:relative;flex-direction:column;justify-content:center;align-items:center}
.slide.active{display:flex}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center;animation:kenburns 25s ease-in-out infinite alternate;filter:brightness(.28) saturate(1.2)}
@keyframes kenburns{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.12) translate(-2%,-3%)}}
.slide-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(26,26,26,.92) 0%,rgba(26,26,26,.15) 40%,rgba(26,26,26,.5) 100%)}
.slide-content{position:relative;z-index:2;width:100%;max-width:100%;padding:40px 60px;text-align:center;max-height:calc(100vh - 120px);overflow-y:auto;box-sizing:border-box}
.slide-number{position:absolute;top:72px;left:28px;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.3);text-transform:uppercase;z-index:3}
.slide-category{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;border:1px solid}
.slide h1{font-size:3rem;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-bottom:8px}
.slide h2{font-size:1.6rem;font-weight:700;line-height:1.3;margin-bottom:20px;color:#e2e8f0}
.slide p{font-size:1.05rem;color:rgba(255,255,255,.6);line-height:1.7;max-width:900px;margin:0 auto}

/* Question list */
.q-list{display:flex;flex-direction:column;gap:20px;margin-top:24px;text-align:left;max-width:100%;margin-left:auto;margin-right:auto}
.q-item{display:flex;gap:14px;align-items:flex-start;font-size:1.15rem;line-height:1.6;color:rgba(255,255,255,.85);padding:16px 20px;background:rgba(255,255,255,.04);border-radius:12px;border:1px solid rgba(255,255,255,.06);transition:background .15s}
.q-item:hover{background:rgba(255,255,255,.07)}
.q-item .num{flex-shrink:0;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid rgba(163,230,53,.3);background:rgba(163,230,53,.1);color:#a3e635;margin-top:2px}

/* Vocab words */
.vocab-word{border-bottom:2px dotted rgba(251,191,36,.5);cursor:help;color:#fbbf24;font-weight:600;position:relative}
.vocab-word:hover{border-bottom-color:#fbbf24}
.tt{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#232323;border:1px solid #444;border-radius:8px;padding:10px 14px;font-size:12px;color:#e2e8f0;white-space:nowrap;z-index:10;opacity:0;pointer-events:none;transition:opacity .15s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.vocab-word:hover .tt{opacity:1;pointer-events:auto}

/* Warmup */
.warmup-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:20px;background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}

/* Progress */
.progress{position:fixed;top:48px;left:0;right:0;z-index:99;height:3px;background:rgba(255,255,255,.06)}
.progress-bar{height:100%;background:linear-gradient(90deg,#a3e635,#84cc16);transition:width .3s ease;border-radius:0 2px 2px 0}

/* Bottom Nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(26,26,26,.95);backdrop-filter:blur(8px);border-top:1px solid #333;padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:12px}
.nav-btn{width:40px;height:40px;border-radius:10px;border:1px solid #444;background:#232323;color:#e2e8f0;font-size:16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{border-color:#a3e635;color:#a3e635;background:rgba(163,230,53,.08)}
.nav-dots{display:flex;gap:6px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.nav-dot.active{background:#a3e635;transform:scale(1.3)}

/* Slide footer */
.slide-footer{position:absolute;bottom:60px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,.2);z-index:3}

/* Hint */
.hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:12px;font-style:italic}
</style>
</head>
<body>

<div class="top-bar">
  <a href="speaking-lessons.html">Back to Lessons</a>
</div>

<div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div id="slides-container"></div>
<div class="nav">
  <button class="nav-btn" onclick="prevSlide()"><span>&#9664;</span></button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn" onclick="nextSlide()"><span>&#9654;</span></button>
</div>

<script>
var SLIDES=[
{bg:"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=1920&q=80",cat:"Lesson Aims",catB:"rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.25)",isTitle:true,title:"Lesson Aims",subtitle:"Daily routine and health vocabulary",text:"In this lesson, you will master essential vocabulary for discussing lifestyle and health habits. <br><br><strong>Key Vocabulary:</strong><br>1. health-conscious 2. junk food 3. sleep schedule 4. sedentary 5. balanced diet 6. physical activity 7. mental well-being 8. stress management 9. routine 10. habits"},
{bg:"https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=1920&q=80",cat:"Warm-up",catB:"rgba(251,191,36,.12);color:#fbbf24;border-color:rgba(251,191,36,.25)",title:"How do you live?",subtitle:"",isWarmup:true,warmupQ:["Are you a morning person or a night owl?","How many hours of sleep do you usually get?","What is the first thing you do when you wake up?"]},
{bg:"https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=1920&q=80",cat:"Health & Fitness",catB:"rgba(163,230,53,.12);color:#a3e635;border-color:rgba(163,230,53,.25)",title:"Health and fitness habits",subtitle:"",questions:["How often do you exercise? What type of physical activity do you enjoy most?","Do you think people in your country are generally <span class='vocab-word'>health-conscious<span class='tt'><strong>health-conscious</strong><br>Paying attention to staying healthy through diet, exercise, and lifestyle choices.</span></span>? Why or why not?","What is your relationship with <span class='vocab-word'>junk food<span class='tt'><strong>junk food</strong><br>Food that is high in calories but low in nutritional value, like chips, candy, and fast food.</span></span>? Do you try to avoid it?","How has your <span class='vocab-word'>sleep schedule<span class='tt'><strong>sleep schedule</strong><br>The regular pattern of when you go to bed and wake up each day.</span></span> changed over the years?"]},
{bg:"https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=1920&q=80",cat:"Relationships",catB:"rgba(251,191,36,.12);color:#fbbf24;border-color:rgba(251,191,36,.25)",title:"Friends, family and relationships",subtitle:"",questions:["How often do you see your extended family? Do you think family bonds are stronger or weaker than previous generations?","What qualities do you most value in a <span class='vocab-word'>friend<span class='tt'><strong>friend</strong><br>A person you know well and like, who is not a family member.</span></span>? Have your criteria changed as you have gotten older?","Do you prefer a small circle of close friends or a large network of <span class='vocab-word'>acquaintances<span class='tt'><strong>acquaintances</strong><br>People you know slightly but are not especially close to.</span></span>?","How has technology changed the way people maintain relationships in your experience?"]},
{bg:"https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=1920&q=80",cat:"Social Media",catB:"rgba(167,139,250,.15);color:#a78bfa;border-color:rgba(167,139,250,.3)",title:"Social media and digital life",subtitle:"",questions:["How much time do you spend on social media each day? Do you think it is too much?","Do you think social media has improved or damaged human communication? Explain your view.","Have you ever <span class='vocab-word'>taken a break<span class='tt'><strong>taken a break</strong><br>To stop using something temporarily — in this case, to stop using social media for a period of time.</span></span> from social media? What was the experience like?","Should there be a minimum age for having social media accounts? What age would you choose?"]},
{bg:"https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=1920&q=80",cat:"Cities vs Countryside",catB:"rgba(52,211,153,.12);color:#34d399;border-color:rgba(52,211,153,.25)",title:"Where would you rather live?",subtitle:"",questions:["Do you live in a city, a suburb, or the countryside? What are the <span class='vocab-word'>pros and cons<span class='tt'><strong>pros and cons</strong><br>The advantages and disadvantages of something — the good points and the bad points.</span></span> of your area?","If you could move anywhere, would you choose a big city or a small village? Why?","How has <span class='vocab-word'>urbanization<span class='tt'><strong>urbanization</strong><br>The process of more people moving from rural areas to cities, causing cities to grow larger.</span></span> changed your region over the past 20 years?","What do you think makes a city a good place to live? What would your ideal city look like?"]},
{bg:"https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?w=1920&q=80",cat:"Modern Life",catB:"rgba(163,230,53,.12);color:#a3e635;border-color:rgba(163,230,53,.25)",title:"Modern life and stress",subtitle:"",questions:["Do you think life today is more <span class='vocab-word'>stressful<span class='tt'><strong>stressful</strong><br>Causing feelings of anxiety, pressure, or worry.</span></span> than it was for previous generations? Why?","What do you do to <span class='vocab-word'>unwind<span class='tt'><strong>unwind</strong><br>To relax and release tension after a busy or stressful period.</span></span> after a long day or a difficult week?","Is work-life balance achievable in your profession, or is it just an ideal?","What is one thing about modern life that you would change if you could?"]},
{bg:"https://images.unsplash.com/photo-1498243691581-b145c3f54a5a?w=1920&q=80",cat:"Wrap-up",catB:"rgba(163,230,53,.12);color:#a3e635;border-color:rgba(163,230,53,.25)",title:"Well done!",subtitle:"Lifestyle and Society — Speaking Lesson",text:"Practice these questions with a partner. Try to speak for at least 2 minutes on each topic."}
];
var current=0;

function renderSlides(){
  var c=document.getElementById('slides-container');
  var d=document.getElementById('navDots');
  var h='',dh='';
  SLIDES.forEach(function(s,i){
    h+='<div class="slide'+(i===0?' active':'')+'" id="slide-'+i+'">';
    h+='<div class="slide-bg" style="background-image:url('+s.bg+')"></div>';
    h+='<span class="slide-number">'+(i+1)+' / '+SLIDES.length+'</span>';
    h+='<div class="slide-content">';
    if(s.isTitle){
      h+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      h+='<h1>'+s.title+'</h1>';
      h+='<h2>'+s.subtitle+'</h2>';
      h+='<p>'+s.text+'</p>';
      h+='<p class="hint">Hover over highlighted words to see definitions</p>';
    }else if(s.isWarmup){
      h+='<span class="warmup-badge">Warm-up</span>';
      h+='<h2>'+s.title+'</h2>';
      if(s.warmupQ){
        h+='<div class="q-list">';
        s.warmupQ.forEach(function(q,j){
          h+='<div class="q-item"><span class="num">'+(j+1)+'</span>'+q+'</div>';
        });
        h+='</div>';
      }
    }else{
      h+='<span class="slide-category" style="background:'+s.catB+'">'+s.cat+'</span>';
      h+='<h2>'+s.title+'</h2>';
      if(s.questions){
        h+='<div class="q-list">';
        s.questions.forEach(function(q,j){
          h+='<div class="q-item"><span class="num">'+(j+1)+'</span>'+q+'</div>';
        });
        h+='</div>';
      }
    }
    h+='</div>';
    h+='<div class="slide-footer">WTE — Lifestyle & Society</div>';
    h+='</div>';
    dh+='<div class="nav-dot'+(i===0?' active':'')+'" onclick="goTo('+i+')"></div>';
  });
  c.innerHTML=h;
  d.innerHTML=dh;
}

function showSlide(n){
  if(n<0||n>=SLIDES.length)return;
  document.querySelectorAll('.slide').forEach(function(s){s.classList.remove('active')});
  document.querySelectorAll('.nav-dot').forEach(function(d){d.classList.remove('active')});
  document.getElementById('slide-'+n).classList.add('active');
  document.querySelectorAll('.nav-dot')[n].classList.add('active');
  current=n;
  document.getElementById('progressBar').style.width=(((current+1)/SLIDES.length)*100)+'%';
}

function nextSlide(){showSlide(current+1)}
function prevSlide(){showSlide(current-1)}
function goTo(n){showSlide(n)}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextSlide()}
  if(e.key==='ArrowLeft'){e.preventDefault();prevSlide()}
});

var tx=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;});
document.addEventListener('touchend',function(e){
  var d=tx-e.changedTouches[0].clientX;
  if(Math.abs(d)>50){d>0?nextSlide():prevSlide()}
});

var wheelTimer=0;
document.addEventListener('wheel',function(e){
  e.preventDefault();
  var now=Date.now();
  if(now-wheelTimer<600)return;
  wheelTimer=now;
  if(e.deltaY>0)nextSlide();else if(e.deltaY<0)prevSlide();
},{passive:false});

renderSlides();
</script>
</body></html>
