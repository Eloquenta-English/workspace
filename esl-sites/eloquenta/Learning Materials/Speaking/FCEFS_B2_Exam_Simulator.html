<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCEFS B2 Oral Exam Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        .slide { min-width: 100vw; flex-shrink: 0; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; height: auto; }
        .timer { font-size: 2rem; margin: 20px 0; }
        .progress { height: 10px; background: rgba(255, 255, 255, .06); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #7dd3fc, #38bdf8); }
        .nav { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 20px; }
        .nav-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, .1); border: 1px solid rgba(255, 255, 255, .2); color: #fff; font-size: 18px; cursor: pointer; transition: all .15s;}
        .nav-btn:hover { background: rgba(255, 255, 255, .25); }
    </style>
</head>
<body>
<div class="slide" id="slide-0">
    <h1>Travel Question</h1>
    <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1920&q=80" alt="Travel Image" style="width:100%;">
    <p>What do you think is the most important aspect of planning a trip?</p>
    <div class="timer" id="prepTimer">Prep Time: <span id="prepTime">60</span> seconds</div>
    <div class="timer" id="answerTimer">Answer Time: <span id="answerTime">120</span> seconds</div>
    <div class="nav">
        <button class="nav-btn" onclick="prevSlide()">◀</button>
        <div class="nav-dots"><div class="nav-dot" onclick="goTo(0)"></div><div class="nav-dot" onclick="goTo(1)"></div></div>
        <button class="nav-btn" onclick="nextSlide()">▶</button>
    </div>
</div>

<script>
var SLIDES=[
    {bg:"https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1920&q=80", title:"Travel Question", question:"What do you think is the most important aspect of planning a trip?"},
];

var current=0;

function renderSlides() {
    var slide = SLIDES[current];
    document.getElementById('slide-0').innerHTML = `<h1>${slide.title}</h1>` + `<img src='${slide.bg}' alt='Travel Image' style='width:100%;'>` + `<p>${slide.question}</p>`;
}

function nextSlide() { current++; renderSlides(); }
function prevSlide() { current--; renderSlides(); }

renderSlides();
</script>
<!-- Donate Section — inconspicuous, bottom of page -->
<div id="donate-bar" style="text-align:center;padding:12px 0 8px;font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.5px;border-top:1px solid rgba(255,255,255,0.06);margin-top:auto">
  <span style="margin-right:10px">Support this project</span>
  <a href="https://paypal.me/williamgraythomason" target="_blank" rel="noopener" style="display:inline-block;background:#0070ba;color:#fff;padding:4px 12px;border-radius:4px;text-decoration:none;font-weight:600;font-size:11px;margin:0 4px">PayPal</a>
  <a href="https://wise.com/payme/williamgraythomason" target="_blank" rel="noopener" style="display:inline-block;background:#9fe870;color:#163300;padding:4px 12px;border-radius:4px;text-decoration:none;font-weight:600;font-size:11px;margin:0 4px">Wise</a>
</div>
</body>
</html>
