<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<title>Lesson Summary — Eloquenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;330;400;450;500;540;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_feedback-figma.css">
<style>
.summary-header { text-align:center; padding-bottom:6px; }
.summary-header h1 { font-size:1.7rem; font-weight:600; color:var(--cs-accent); margin-bottom:6px; }
.summary-header p { color:var(--cs-text-muted); font-size:.9rem; }
.badge { display:inline-block; padding:5px 12px; border-radius:50px; background:var(--cs-accent-dim); color:var(--cs-accent); font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
.section-title { font-size:.85rem; text-transform:uppercase; letter-spacing:1.4px; color:var(--cs-accent); font-weight:700; margin-bottom:12px; }
.ratings-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(100px,1fr)); gap:10px; }
.rating-card { text-align:center; padding:14px; background:rgba(255,255,255,.03); border:1px solid var(--cs-border); border-radius:var(--radius-sm); }
.rating-card .label { font-size:.6rem; text-transform:uppercase; letter-spacing:1px; color:var(--cs-text-muted); margin-bottom:6px; display:block; }
.rating-card .stars { color:var(--cs-accent); font-size:1.1rem; letter-spacing:2px; }
.homework-list { display:flex; flex-direction:column; gap:10px; }
.hw-card { padding:16px; background:rgba(255,255,255,.03); border:1px solid var(--cs-border); border-radius:var(--radius-sm); display:flex; flex-direction:column; gap:6px; }
.hw-label { display:inline-block; padding:4px 10px; border-radius:50px; background:var(--cs-accent-dim); color:var(--cs-accent); font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.8px; width:fit-content; }
.hw-title { font-size:1rem; font-weight:600; color:var(--cs-text); }
.hw-url { font-size:.78rem; color:var(--cs-text-muted); word-break:break-all; }
.hw-url a { color:var(--cs-accent); text-decoration:none; }
.text-block { white-space:pre-wrap; color:var(--cs-text-muted); font-size:.95rem; line-height:1.65; }
.empty { color:var(--cs-text-muted); font-style:italic; }
.praise-box { padding:20px; text-align:center; border:1px solid var(--cs-accent); border-radius:var(--radius-card); background:var(--cs-accent-dim); margin:14px 0; }
.praise-box h2 { font-size:1.25rem; color:var(--cs-accent); margin-bottom:6px; }
.praise-box p { color:var(--cs-text); font-size:1rem; }
.footer { text-align:center; margin-top:24px; font-size:.75rem; color:var(--cs-text-muted); }
.footer a { color:var(--cs-accent); text-decoration:none; }
@media print { body { background:#fff; color:#000; } .card { border:1px solid #ccc; } .hw-url a { color:#000; } }
@media(max-width:480px){ .summary-header h1 { font-size:1.3rem; } .ratings-grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<div class="bg-hero"></div>
<div class="overlay"></div>

<nav class="nav">
  <a href="../index.html" class="nav-logo">ELOQUENTA <span>FEEDBACK</span></a>
  <button class="theme-cycle-btn" id="themeCycleBtn" title="Cycle theme"><span class="theme-dot" id="themeDot"></span></button>
</nav>

<div class="container">
  <div id="summary">
    <div class="card summary-header">
      <span class="badge" id="levelBadge">B2</span>
      <h1 id="studentName">Lesson Summary</h1>
      <p id="lessonMeta"></p>
    </div>

    <div class="card" id="ratingsCard">
      <div class="section-title">Quick evaluation</div>
      <div class="ratings-grid" id="ratingsGrid"></div>
    </div>

    <div class="card" id="focusCard">
      <div class="section-title">Focus of the lesson</div>
      <p id="focusText" class="text-block"></p>
    </div>

    <div class="card" id="vocabCard">
      <div class="section-title">Language seen</div>
      <p id="vocabText" class="text-block"></p>
    </div>

    <div class="card" id="homeworkCard">
      <div class="section-title">Homework</div>
      <div class="homework-list" id="homeworkList"></div>
    </div>

    <div class="card" id="nextCard">
      <div class="section-title">Next session focus</div>
      <p id="nextText" class="text-block"></p>
    </div>

    <div id="praiseBox" class="praise-box" style="display:none">
      <h2>🎉 Well done!</h2>
      <p id="praiseText"></p>
    </div>

    <div class="card" id="commentsCard" style="display:none">
      <div class="section-title">Additional comments</div>
      <p id="commentsText" class="text-block"></p>
    </div>
  </div>

  <div class="footer">
    <p>Powered by <a href="https://eloquenta-english.github.io/workspace/esl-sites/eloquenta/index.html">Eloquenta</a></p>
  </div>
</div>

<script src="_feedback-engine.js"></script>
<script>
(function(){
  var E = window.FeedbackEngine;

  // Theme cycle
  var THEME_ORDER=['dark','light'];
  function applyTheme(theme){
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeDot').style.background = getComputedStyle(document.documentElement).getPropertyValue('--cs-accent').trim();
    try{localStorage.setItem('eloquent-theme', theme);}catch(e){}
  }
  document.getElementById('themeCycleBtn').addEventListener('click',function(){
    var saved=localStorage.getItem('eloquent-theme')||'dark';
    applyTheme(THEME_ORDER[(THEME_ORDER.indexOf(saved)+1)%THEME_ORDER.length]);
  });
  applyTheme(localStorage.getItem('eloquent-theme')||'dark');

  var hash = location.search.replace(/^\?s=/, '');
  var data = hash ? E.decodeSummary(hash) : null;

  if (!data) {
    document.getElementById('summary').innerHTML = '<div class="card"><p class="empty">No feedback data found. Ask your teacher to send you the summary link.</p></div>';
    return;
  }

  document.getElementById('levelBadge').textContent = data.level || 'B2';
  document.getElementById('studentName').textContent = (data.studentName || 'Student') + ' — Lesson Summary';
  document.getElementById('lessonMeta').textContent = (data.lessonDate || '') + (data.topic ? ' | ' + data.topic : '');

  var ratingsGrid = document.getElementById('ratingsGrid');
  var ratings = data.ratings || {};
  var labels = {fluency:'Fluency', accuracy:'Accuracy', pronunciation:'Pronunciation', comprehension:'Comprehension', participation:'Participation'};
  Object.keys(labels).forEach(function(key){
    var val = ratings[key] || 0;
    var card = document.createElement('div');
    card.className = 'rating-card';
    card.innerHTML = '<span class="label">'+labels[key]+'</span><div class="stars">'+'★'.repeat(val)+'</div>';
    ratingsGrid.appendChild(card);
  });

  document.getElementById('focusText').textContent = data.focus || '—';
  document.getElementById('vocabText').textContent = data.vocabulary || '—';
  document.getElementById('nextText').textContent = data.nextFocus || '—';

  var homeworkList = document.getElementById('homeworkList');
  if (data.homework && data.homework.length) {
    data.homework.forEach(function(hw){
      var card = document.createElement('div');
      card.className = 'hw-card';
      card.innerHTML = ''+
        '<span class="hw-label">'+hw.label+'</span>'+
        '<div class="hw-title">'+(hw.title || 'Homework')+'</div>'+
        '<div class="hw-url"><a href="'+hw.url+'" target="_blank" rel="noopener">'+hw.url+'</a></div>';
      homeworkList.appendChild(card);
    });
  } else {
    homeworkList.innerHTML = '<p class="empty">No homework assigned.</p>';
  }

  if (data.praise) {
    document.getElementById('praiseBox').style.display = 'block';
    document.getElementById('praiseText').textContent = data.praise;
  }

  if (data.comments) {
    document.getElementById('commentsCard').style.display = 'block';
    document.getElementById('commentsText').textContent = data.comments;
  }
})();
</script>
</body>
</html>
