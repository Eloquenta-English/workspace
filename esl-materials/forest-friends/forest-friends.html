<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forest Friends — Vocabulary Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="forest-friends.css">
</head>
<body>

<header class="forest-header">
  <button class="back-btn" onclick="goBack()">◀ BACK</button>
  <h1>🌲 FOREST FRIENDS</h1>
  <div style="width:60px"></div>
</header>

<div id="app">
  <div id="topic-select">
    <div class="topic-title">SELECT YOUR ARENA</div>
    <div class="topic-grid" id="topic-grid"></div>
  </div>

  <div id="game-area">
    <div id="game-area-bg"></div>
    <div id="game-area-inner">
      <div class="topic-label" id="topic-label"></div>

      <!-- TTS Voice Bar -->
      <div class="voice-bar" id="voice-bar">
        <label>🔊 Voice</label>
        <select class="voice-select" id="voice-select"></select>
        <label>🌐 L1</label>
        <select class="voice-select lang-select" id="lang-select"></select>
        <button class="btn-speak" id="btn-speak" onclick="speakQuestion()">▶ SPEAK</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-info"><span id="progress-text">1 / 20</span><span id="score-text">Score: 0</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="character-box">
        <div class="character-orb" id="char"></div>
        <div class="speech-bubble" id="activity"></div>
      </div>
      <div class="options" id="options"></div>
    </div>
  </div>
</div>

<script src="forest-friends-data.js"></script>
<script src="forest-friends.js"></script>
</body>
</html>
