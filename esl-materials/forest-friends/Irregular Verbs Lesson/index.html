<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Irregular Verbs Lesson</title><style>body { font-family: Arial, sans-serif; } #quiz-container { max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); } button { background-color: #4CAF50; color: #fff; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; } button:hover { background-color: #3e8e41; }</style></head><body><h1>Irregular Verbs Quiz</h1><div id="quiz-container"></div><script>// Add JavaScript code hereconst quizData = [{question: 'What is the past tense of "go"?', options: ['went', 'gone', 'going'], answer: 'went'}, {question: 'What is the past tense of "take"?', options: ['took', 'taken', 'taking'], answer: 'took'}]; const checkAnswer = (selectedOption, correctAnswer) => { if (selectedOption === correctAnswer) { alert('Correct!'); } else { alert('Incorrect. Try again!'); } }; quizData.forEach((item, index) => { const questionElement = document.createElement('div'); questionElement.innerHTML = `<p>${item.question}</p>${item.options.map(option => `<button onclick="checkAnswer('${option}', '${item.answer}')">${option}</button>`).join('')}`; quizContainer.appendChild(questionElement); });</script></body></html>
