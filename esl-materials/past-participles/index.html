<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARTICIPLE_CORE // Neural Knowledge Base</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --cyber-black: #0a0a0f;
            --cyber-dark: #1a1a2e;
            --text-glow: 0 0 10px rgba(0, 242, 255, 0.7);
            --border-glow: 0 0 15px rgba(188, 19, 254, 0.5);
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--cyber-black);
            color: #e0e0ff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(188, 19, 254, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            transition: filter 0.5s ease;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 1000;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: var(--border-glow);
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--neon-blue);
            text-shadow: var(--text-glow);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .kb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .kb-card {
            background: var(--cyber-dark);
            border: 1px solid var(--neon-purple);
            padding: 1.5rem;
            border-radius: 0 20px 0 20px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.2);
        }

        .kb-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--border-glow);
            border-color: var(--neon-blue);
        }

        .kb-card h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-pink);
            margin-top: 0;
            border-bottom: 1px solid var(--neon-pink);
            padding-bottom: 0.5rem;
        }

        .verb-list {
            font-family: 'JetBrains Mono', monospace;
            list-style: none;
            padding: 0;
            font-size: 0.9rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .verb-list li {
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
        }

        .verb-list span { color: var(--neon-blue); }

        .exercise-zone {
            background: rgba(26, 26, 46, 0.6);
            border: 3px solid var(--neon-blue);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--text-glow);
            position: relative;
        }

        .exercise-header {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            color: var(--neon-blue);
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .match-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cyber-btn {
            background: var(--cyber-dark);
            border: 2px solid var(--neon-purple);
            color: white;
            padding: 1rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .cyber-btn:hover {
            background: var(--neon-purple);
            color: black;
            box-shadow: var(--border-glow);
        }

        .cyber-btn.selected {
            background: var(--neon-blue);
            color: black;
            border-color: white;
            box-shadow: var(--text-glow);
        }

        .cyber-btn.correct {
            background: #00ff88;
            color: black;
            border-color: #00ff88;
        }

        .cyber-btn.wrong {
            background: #ff0055;
            color: white;
            border-color: #ff0055;
        }

        /* Metronome Styling */
        .metronome-panel {
            background: rgba(26, 26, 46, 0.8);
            border: 2px solid var(--neon-pink);
            padding: 1.5rem;
            border-radius: 20px;
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .metronome-controls {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .bpm-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .metronome-btn {
            background: var(--neon-pink);
            color: black;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            padding: 1rem 2rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .metronome-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .metronome-btn.active {
            background: #00f2ff;
            color: black;
        }

        .settings-panel {
            margin-top: 3rem;
            padding: 1rem;
            border-top: 1px solid var(--neon-purple);
            display: flex;
            align-items: center;
            gap: 2rem;
            font-family: 'JetBrains Mono', monospace;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 200px;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: var(--cyber-dark);
            border: 1px solid var(--neon-blue);
            border-radius: 4px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            background: var(--neon-pink);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-pink);
            margin-top: -7px;
        }

        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--neon-blue);
            color: black;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            padding: 2px 10px;
            display: flex;
            justify-content: space-between;
            z-index: 1100;
        }

        .boot-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--cyber-black);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .boot-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .start-btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            padding: 1.5rem 3rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--text-glow);
            letter-spacing: 3px;
        }

        .start-btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid var(--cyber-dark);
            border-top: 3px solid var(--neon-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .glitch {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: white;
            position: relative;
        }
        
        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body id="app-body">

    <div id="boot-overlay" class="boot-overlay">
        <div class="boot-content">
            <h1 class="glitch" data-text="SYSTEM_BOOT">SYSTEM_BOOT</h1>
            <div class="loader"></div>
            <button class="start-btn" onclick="enterApp()">INITIALIZE ENGINE</button>
        </div>
    </div>

    <header>
        <h1 id="main-title">PARTICIPLE_CORE // v1.0</h1>
        <p style="color: var(--neon-pink); font-family: 'JetBrains Mono';">Neural Knowledge Base & Skill Calibration</p>
    </header>

    <div class="container">
        
        <div class="kb-grid" id="kb-container"></div>

        <div class="exercise-zone">
            <div class="exercise-header">MATCHING_PROTOCOL: SYNC VERBS</div>
            <div class="match-container">
                <div class="column" id="col-a"></div>
                <div class="column" id="col-b"></div>
            </div>
        </div>

        <div class="settings-panel">
            <span style="font-family: 'JetBrains Mono';">NEURAL_SENSITIVITY:</span>
            <input type="range" id="sensitivity-slider" min="0" max="100" value="0">
            <span id="stability-text" style="color: var(--neon-pink); font-family: 'JetBrains Mono';">CORE_STABILITY: OK</span>
        </div>
    </div>

    <div class="status-bar">
        <span id="status-left">SYS: ACTIVE</span>
        <span>SESS_ID: 0x8842_PARTICIPLE</span>
        <span>ENCODING: UTF-8 / CYBERPUNK</span>
    </div>

    <script>
        const allVerbs = [
            { a: 'Arise', b: 'Arisen' }, { a: 'Awake', b: 'Awoken' }, { a: 'Be', b: 'Been' }, { a: 'Beat', b: 'Beaten' },
            { a: 'Become', b: 'Become' }, { a: 'Begin', b: 'Begun' }, { a: 'Bend', b: 'Bent' }, { a: 'Bet', b: 'Bet' },
            { a: 'Bid', b: 'Bid' }, { a: 'Bind', b: 'Bound' }, { a: 'Bite', b: 'Bitten' }, { a: 'Bleed', b: 'Bled' },
            { a: 'Blow', b: 'Blown' }, { a: 'Break', b: 'Broken' }, { a: 'Bring', b: 'Brought' }, { a: 'Build', b: 'Built' },
            { a: 'Burn', b: 'Burnt' }, { a: 'Burst', b: 'Burst' }, { a: 'Buy', b: 'Bought' }, { a: 'Cast', b: 'Cast' },
            { a: 'Catch', b: 'Caught' }, { a: 'Choose', b: 'Chosen' }, { a: 'Cling', b: 'Clung' }, { a: 'Come', b: 'Come' },
            { a: 'Cost', b: 'Cost' }, { a: 'Creep', b: 'Crept' }, { a: 'Cut', b: 'Cut' }, { a: 'Deal', b: 'Dealt' },
            { a: 'Dig', b: 'Dug' }, { a: 'Do', b: 'Done' }, { a: 'Draw', b: 'Drawn' }, { a: 'Dream', b: 'Dreamt' },
            { a: 'Drink', b: 'Drunk' }, { a: 'Drive', b: 'Driven' }, { a: 'Eat', b: 'Eaten' }, { a: 'Fall', b: 'Fallen' },
            { a: 'Feed', b: 'Fed' }, { a: 'Feel', b: 'Felt' }, { a: 'Fight', b: 'Fought' }, { a: 'Find', b: 'Found' },
            { a: 'Fly', b: 'Flown' }, { a: 'Forget', b: 'Forgotten' }, { a: 'Forgive', b: 'Forgiven' }, { a: 'Freeze', b: 'Frozen' },
            { a: 'Get', b: 'Gotten' }, { a: 'Give', b: 'Given' }, { a: 'Go', b: 'Gone' }, { a: 'Grind', b: 'Ground' },
            { a: 'Grow', b: 'Grown' }, { a: 'Hang', b: 'Hung' }, { a: 'Have', b: 'Had' }, { a: 'Hear', b: 'Heard' },
            { a: 'Hide', b: 'Hidden' }, { a: 'Hit', b: 'Hit' }, { a: 'Hold', b: 'Held' }, { a: 'Hurt', b: 'Hurt' },
            { a: 'Keep', b: 'Kept' }, { a: 'Kneel', b: 'Knelt' }, { a: 'Know', b: 'Known' }, { a: 'Lay', b: 'Laid' }
        ];

        function enterApp() {
            document.getElementById('boot-overlay').classList.add('hidden');
        }

        // Theme Inversion Logic
        const sensitivitySlider = document.getElementById('sensitivity-slider');
        sensitivitySlider.addEventListener('input', (e) => {
            const val = e.target.value;
            const stabilityText = document.getElementById('stability-text');
            document.getElementById('app-body').style.filter = `invert(${val / 100}) hue-rotate(${val * 1.8}deg)`;
            
            if (val > 80) {
                stabilityText.textContent = "CORE_STABILITY: CRITICAL";
                stabilityText.style.color = "var(--neon-blue)";
            } else if (val > 40) {
                stabilityText.textContent = "CORE_STABILITY: UNSTABLE";
                stabilityText.style.color = "yellow";
            } else {
                stabilityText.textContent = "CORE_STABILITY: OK";
                stabilityText.style.color = "var(--neon-pink)";
            }
        });

        let selectedA = null;
        let selectedB = null;
        let matchesFound = 0;

        function init() {
            const kbContainer = document.getElementById('kb-container');
            const categories = {
                "High Frequency": allVerbs.slice(0, 20),
                "The Invariants": allVerbs.filter(v => v.a === v.b),
                "Complex Shifts": allVerbs.slice(20, 40),
                "The Vault": allVerbs.slice(40)
            };

            for (const [cat, verbs] of Object.entries(categories)) {
                const card = document.createElement('div');
                card.className = 'kb-card';
                card.innerHTML = `<h3>${cat}</h3><ul class="verb-list">${verbs.map(v => `<li>${v.a} <span>${v.b}</span></li>`).join('')}</ul>`;
                kbContainer.appendChild(card);
            }
            loadNewExercise();
        }

        function loadNewExercise() {
            const colA = document.getElementById('col-a');
            const colB = document.getElementById('col-b');
            colA.innerHTML = '';
            colB.innerHTML = '';
            matchesFound = 0;

            const currentSet = [...allVerbs].sort(() => 0.5 - Math.random()).slice(0, 5);
            const shuffledA = [...currentSet].sort(() => 0.5 - Math.random());
            const shuffledB = [...currentSet].sort(() => 0.5 - Math.random());

            shuffledA.forEach(pair => {
                const btn = document.createElement('button');
                btn.className = 'cyber-btn';
                btn.textContent = pair.a;
                btn.onclick = () => selectA(btn, pair.b);
                colA.appendChild(btn);
            });

            shuffledB.forEach(pair => {
                const btn = document.createElement('button');
                btn.className = 'cyber-btn';
                btn.textContent = pair.b;
                btn.onclick = () => selectB(btn, pair.b);
                colB.appendChild(btn);
            });
        }

        function selectA(btn, value) {
            document.querySelectorAll('#col-a .cyber-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedA = { btn, value };
            checkMatch();
        }

        function selectB(btn, value) {
            document.querySelectorAll('#col-b .cyber-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedB = { btn, value };
            checkMatch();
        }

        function checkMatch() {
            if (selectedA && selectedB) {
                if (selectedA.value === selectedB.value) {
                    selectedA.btn.classList.add('correct');
                    selectedB.btn.classList.add('correct');
                    matchesFound++;
                    if(matchesFound === 5) {
                        setTimeout(() => {
                            alert('CORE SYNC COMPLETE! Re-calibrating...');
                            loadNewExercise();
                        }, 500);
                    }
                } else {
                    const a = selectedA.btn;
                    const b = selectedB.btn;
                    a.classList.add('wrong');
                    b.classList.add('wrong');
                    setTimeout(() => {
                        a.classList.remove('wrong');
                        b.classList.remove('wrong');
                    }, 500);
                }
                selectedA = null;
                selectedB = null;
                setTimeout(() => {
                    document.querySelectorAll('.cyber-btn').forEach(b => b.classList.remove('selected'));
                }, 500);
            }
        }

        init();
    </script>
